name: Split project workspace

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  refactor:
    if: github.event.issue.title == '[automation] Split project workspace orchestration'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Split and validate ProjectWorkspace
        shell: bash
        run: |
          set -o pipefail
          {
            node scripts/split-project-workspace.mjs
            npm run format
            npm run check
            npm run build:budget
          } 2>&1 | tee /tmp/project-workspace-split.log

      - name: Publish validated code
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git restore --worktree -- tsconfig.json
          rm -f next-env.d.ts
          rm scripts/split-project-workspace.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/workspace scripts/split-project-workspace.mjs
          git diff --cached --check
          git commit -m "refactor: separate project workspace orchestration [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
          gh issue comment "${{ github.event.issue.number }}" --body "Validation passed and the ProjectWorkspace orchestration split was published to main."

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo 'ProjectWorkspace split validation failed. No validated implementation was published.'
            echo
            echo '<details><summary>Relevant log tail</summary>'
            echo
            echo '```text'
            if [ -f /tmp/project-workspace-split.log ]; then
              tail -n 160 /tmp/project-workspace-split.log
            else
              echo 'Validation log was not created.'
            fi
            echo '```'
            echo '</details>'
          } > /tmp/project-workspace-split-comment.md
          gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/project-workspace-split-comment.md
