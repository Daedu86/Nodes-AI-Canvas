name: Phase 7 diagnostic

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      VERCEL_ENV: preview
      NODES_PERSISTENCE_BACKEND: file
      AUTH_ENABLE_DEV_CREDENTIALS: "0"
      OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
      OPENROUTER_REQUIRE_USER_KEY: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Mark verifier started
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=pending -f context='diag7/started' -f description='Phase 7 verifier started'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Run core gates
        id: core
        continue-on-error: true
        run: |
          npm run format:check
          npm run typecheck
          npm run test:unit
          npm run test:coverage
          npm run test:critical-coverage
          npm run build
          npm run audit:production
          npm run audit:all

      - name: Publish core result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          OUTCOME: ${{ steps.core.outcome }}
        run: |
          if [ "$OUTCOME" = "success" ]; then state=success; else state=failure; fi
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state="$state" -f context='diag7/core' -f description="Core gates: ${OUTCOME}"

      - name: Install Playwright browser
        if: steps.core.outcome == 'success'
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        id: e2e
        if: steps.core.outcome == 'success'
        continue-on-error: true
        run: npm run test:e2e -- --workers=1

      - name: Publish E2E result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          CORE: ${{ steps.core.outcome }}
          E2E: ${{ steps.e2e.outcome }}
        run: |
          if [ "$CORE" != "success" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=error -f context='diag7/e2e' -f description='E2E skipped because core failed'
          elif [ "$E2E" = "success" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=success -f context='diag7/e2e' -f description='E2E passed'
          else
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=failure -f context='diag7/e2e' -f description="E2E: ${E2E}"
          fi
