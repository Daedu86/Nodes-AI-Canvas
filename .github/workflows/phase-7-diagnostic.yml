name: Phase 7 diagnostic

on:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      VERCEL_ENV: preview
      NODES_PERSISTENCE_BACKEND: file
      AUTH_ENABLE_DEV_CREDENTIALS: "0"
      OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
      OPENROUTER_REQUIRE_USER_KEY: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --fund=false
      - name: Diagnose non-browser gates
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          publish() {
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
              -f state="$1" -f context="$2" -f description="$3"
          }
          encode() {
            printf '%s' "$1" | cut -c1-72 | base64 -w0 | tr '+/' '-_' | tr -d '='
          }
          run_gate() {
            local name="$1" command="$2" log="$3"
            set +e
            bash -lc "$command" > "$log" 2>&1
            local code=$?
            set -e
            if [ "$code" -eq 0 ]; then
              publish success "diag7/${name}/ok" "${name} passed"
            else
              local summary
              summary=$(grep -E 'error TS[0-9]+:|Type error:|Failed to compile|AssertionError|FAIL|Error:' "$log" | head -3 | tr '\n\r' '  ')
              [ -n "$summary" ] || summary=$(tail -8 "$log" | tr '\n\r' '  ')
              publish failure "diag7/${name}/$(encode "$summary")" "${name} failed (${code})"
            fi
          }

          set -e
          run_gate lint "npm run format:check" lint.log
          run_gate typecheck "npm run typecheck" typecheck.log
          run_gate unit "npm run test:unit" unit.log
          run_gate coverage "npm run test:coverage" coverage.log
          run_gate critical-coverage "npm run test:critical-coverage" critical.log
          run_gate build "npm run build" build.log
          run_gate audit-production "npm run audit:production" audit-production.log
          run_gate audit-all "npm run audit:all" audit-all.log

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run and publish E2E status
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set +e
          npm run test:e2e -- --workers=1 > e2e.log 2>&1
          code=$?
          if [ "$code" -eq 0 ]; then
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
              -f state=success -f context='diag7/e2e/ok' -f description='E2E passed'
          else
            summary=$(grep -E '^[[:space:]]*[0-9]+\)|Error:|Timed out|failed' e2e.log | head -3 | tr '\n\r' '  ')
            [ -n "$summary" ] || summary=$(tail -12 e2e.log | tr '\n\r' '  ')
            encoded=$(printf '%s' "$summary" | cut -c1-72 | base64 -w0 | tr '+/' '-_' | tr -d '=')
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
              -f state=failure -f context="diag7/e2e/${encoded}" -f description="E2E failed (${code})"
          fi
          exit 0
