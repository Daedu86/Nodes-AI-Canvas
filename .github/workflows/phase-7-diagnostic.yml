name: Phase 7 diagnostic

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      VERCEL_ENV: preview
      NODES_PERSISTENCE_BACKEND: file
      AUTH_ENABLE_DEV_CREDENTIALS: "0"
      OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
      OPENROUTER_REQUIRE_USER_KEY: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Mark verifier started
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=pending -f context='diag7/started' -f description='Phase 7 verifier started'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run format:check

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Unit tests
        id: unit
        continue-on-error: true
        run: npm run test:unit

      - name: Repository coverage
        id: coverage
        continue-on-error: true
        run: npm run test:coverage

      - name: Critical coverage
        id: critical
        continue-on-error: true
        run: npm run test:critical-coverage

      - name: Build
        id: build
        continue-on-error: true
        run: npm run build

      - name: Production audit
        id: auditprod
        continue-on-error: true
        run: npm run audit:production

      - name: Full audit
        id: auditall
        continue-on-error: true
        run: npm run audit:all

      - name: Publish core results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          LINT: ${{ steps.lint.outcome }}
          TYPECHECK: ${{ steps.typecheck.outcome }}
          UNIT: ${{ steps.unit.outcome }}
          COVERAGE: ${{ steps.coverage.outcome }}
          CRITICAL: ${{ steps.critical.outcome }}
          BUILD: ${{ steps.build.outcome }}
          AUDIT_PROD: ${{ steps.auditprod.outcome }}
          AUDIT_ALL: ${{ steps.auditall.outcome }}
        run: |
          publish() {
            if [ "$2" = "success" ]; then state=success; else state=failure; fi
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state="$state" -f context="diag7/$1" -f description="$1: $2"
          }
          publish lint "$LINT"
          publish typecheck "$TYPECHECK"
          publish unit "$UNIT"
          publish coverage "$COVERAGE"
          publish critical-coverage "$CRITICAL"
          publish build "$BUILD"
          publish audit-production "$AUDIT_PROD"
          publish audit-all "$AUDIT_ALL"

      - name: Install Playwright browser
        if: steps.lint.outcome == 'success' && steps.typecheck.outcome == 'success' && steps.unit.outcome == 'success' && steps.coverage.outcome == 'success' && steps.critical.outcome == 'success' && steps.build.outcome == 'success'
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        id: e2e
        if: steps.lint.outcome == 'success' && steps.typecheck.outcome == 'success' && steps.unit.outcome == 'success' && steps.coverage.outcome == 'success' && steps.critical.outcome == 'success' && steps.build.outcome == 'success'
        continue-on-error: true
        run: npm run test:e2e -- --workers=1

      - name: Publish E2E result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          E2E: ${{ steps.e2e.outcome }}
        run: |
          if [ "$E2E" = "success" ]; then state=success; description='E2E passed'; elif [ "$E2E" = "skipped" ]; then state=error; description='E2E skipped because a core gate failed'; else state=failure; description="E2E: ${E2E}"; fi
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state="$state" -f context='diag7/e2e' -f description="$description"
