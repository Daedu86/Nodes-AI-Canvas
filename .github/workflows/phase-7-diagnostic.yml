name: Phase 7 diagnostic

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      VERCEL_ENV: preview
      NODES_PERSISTENCE_BACKEND: file
      AUTH_ENABLE_DEV_CREDENTIALS: "0"
      OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
      OPENROUTER_REQUIRE_USER_KEY: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Mark verifier started
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=pending -f context='diag7/e2e-started' -f description='Phase 7 E2E verifier started'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        id: e2e
        continue-on-error: true
        run: npm run test:e2e -- --workers=1 --max-failures=1 2>&1 | tee e2e.log

      - name: Publish E2E result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          E2E: ${{ steps.e2e.outcome }}
        shell: bash
        run: |
          if [ "$E2E" = "success" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=success -f context='diag7/e2e' -f description='E2E passed'
          else
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=failure -f context='diag7/e2e' -f description="E2E: ${E2E}"
            line=$(grep -E '^[[:space:]]*[0-9]+\)|Error:|Timed out|failed' e2e.log | head -3 | tr '\n' ' ')
            encoded=$(printf '%s' "${line:-$(tail -10 e2e.log | tr '\n' ' ')}" | cut -c1-96 | base64 -w0 | tr '+/' '-_' | tr -d '=')
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=failure -f context="diag7/e2e-detail/${encoded}" -f description='E2E failure detail'
          fi
