name: Apply CodeQL remediations

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-codeql-fixes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply security fixes
        run: node scripts/apply-codeql-fixes-v2.mjs

      - name: Validate rotation script syntax
        run: node --check scripts/rotate-secrets.mjs

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint and format check
        run: npm run format:check

      - name: Run unit tests
        run: npm run test:unit

      - name: Commit verified fixes
        run: |
          rm -f scripts/apply-codeql-fixes.mjs
          rm -f scripts/apply-codeql-fixes-v2.mjs
          rm -f .github/workflows/apply-codeql-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: remediate CodeQL security alerts"
          git push origin HEAD:main
