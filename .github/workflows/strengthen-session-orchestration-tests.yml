name: Strengthen session orchestration coverage

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: strengthen-session-orchestration-tests
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  coverage:
    if: github.event.issue.title == '[automation] Strengthen Session Orchestration Coverage'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Report validation start
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Session orchestration coverage validation started."

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Apply coverage refactor
        run: |
          echo "VALIDATION_STAGE=extraction" >> "$GITHUB_ENV"
          set -o pipefail
          python <<'PY'
          from pathlib import Path

          path = Path("scripts/strengthen-session-orchestration-tests.py")
          text = path.read_text(encoding="utf-8")
          old = '''    ''' + "'''" + '''  const hasSessionConflict = React.useCallback(\\n    (sessionId: string) =>\\n      matchesSessionConflict(sessionConflictRef.current, sessionId),\\n    [],\\n  );\\n\\n  const loadLatestConflictVersion = React.useCallback(() => {\\n''' + "'''" + ''',
          '''
          new = '''    ''' + "'''" + '''  const hasSessionConflict = React.useCallback(\\n    (sessionId: string) =>\\n      matchesSessionConflict(sessionConflictRef.current, sessionId),\\n    [],\\n  );\\n\\n''' + "'''" + ''',
          '''
          if text.count(old) != 1:
              raise RuntimeError("Could not remove the duplicated conflict callback marker.")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          python scripts/strengthen-session-orchestration-tests.py 2>&1 | tee /tmp/validation.log
          python <<'PY'
          from pathlib import Path

          path = Path("lib/client/persisted-resource-client.ts")
          text = path.read_text(encoding="utf-8")
          old = '''export function createSerialTaskQueue<T>(fallback: T) {
            let queue = Promise.resolve(fallback);

            return (task: () => Promise<T>) => {
              const next = queue.then(task, task);
              queue = next.catch(() => fallback);
              return next;
            };
          }
          '''
          new = '''export function createSerialTaskQueue<T>(fallback: T) {
            let queue = new Promise<T>((resolve) => resolve(fallback));

            return (task: () => Promise<T>) => {
              const next = new Promise<T>((resolve, reject) => {
                const run = () => task().then(resolve, reject);
                void queue.then(run, run);
              });
              queue = next.catch(() => fallback);
              return next;
            };
          }
          '''
          if text.count(old) != 1:
              raise RuntimeError("Could not replace the serial queue implementation.")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Install dependencies
        run: |
          echo "VALIDATION_STAGE=dependency installation" >> "$GITHUB_ENV"
          set -o pipefail
          npm ci --no-audit --fund=false 2>&1 | tee /tmp/validation.log

      - name: Format generated files
        run: |
          echo "VALIDATION_STAGE=formatting" >> "$GITHUB_ENV"
          set -o pipefail
          npm run format 2>&1 | tee /tmp/validation.log

      - name: Validate formatting and types
        run: |
          echo "VALIDATION_STAGE=lint and TypeScript" >> "$GITHUB_ENV"
          set -o pipefail
          (npm run format:check && npm run typecheck) 2>&1 | tee /tmp/validation.log

      - name: Run unit tests
        run: |
          echo "VALIDATION_STAGE=unit tests" >> "$GITHUB_ENV"
          set -o pipefail
          npm run test:unit 2>&1 | tee /tmp/validation.log

      - name: Run coverage checks
        run: |
          echo "VALIDATION_STAGE=coverage" >> "$GITHUB_ENV"
          set -o pipefail
          npm run test:coverage 2>&1 | tee /tmp/validation.log

      - name: Build production bundle
        run: |
          echo "VALIDATION_STAGE=production build" >> "$GITHUB_ENV"
          set -o pipefail
          npm run build 2>&1 | tee /tmp/validation.log
          git checkout -- tsconfig.json

      - name: Publish validated coverage to main
        shell: bash
        run: |
          echo "VALIDATION_STAGE=publishing to main" >> "$GITHUB_ENV"
          set -euo pipefail
          exec > >(tee /tmp/publish.log) 2>&1
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git rm .github/workflows/strengthen-session-orchestration-tests.yml
          git rm -f scripts/strengthen-session-orchestration-tests.py
          git add \
            components/context/use-persisted-resource-state.ts \
            components/context/use-session-conflict-resolution.ts \
            components/context/use-session-lifecycle.ts \
            lib/client/persisted-resource-client.ts \
            lib/client/session-orchestration.ts \
            tests/session-conflict-handling.test.ts \
            tests/session-orchestration.test.ts \
            tests/serial-task-queue.test.ts
          git diff --check
          git commit -m "test: strengthen session orchestration coverage [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report validation success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Validation passed and strengthened session orchestration coverage was published to main."

      - name: Report validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "Validation failed during **${VALIDATION_STAGE:-preflight}**. No functional coverage refactor was published."
            echo
            echo "<details><summary>Relevant log tail</summary>"
            echo
            echo '```text'
            if [[ -s /tmp/publish.log ]]; then
              tail -c 14000 /tmp/publish.log
            else
              tail -c 14000 /tmp/validation.log 2>/dev/null || echo "No command log was captured."
            fi
            echo '```'
            echo "</details>"
          } > /tmp/validation-comment.md
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/validation-comment.md
