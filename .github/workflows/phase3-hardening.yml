name: Apply phase 3 hardening

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: phase3-hardening
  cancel-in-progress: false

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  harden:
    if: github.event.issue.title == '[automation] Apply phase 3 hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Apply and validate phase 3
        shell: bash
        run: |
          set -o pipefail
          {
            node scripts/apply-phase3-hardening.mjs
            npm run format
            npm run check
            npm run build:budget
            npx playwright install --with-deps chromium
            npm run test:e2e -- tests/e2e/accessibility.spec.ts tests/e2e/chat-image-attachment.spec.ts tests/e2e/session-return-send.spec.ts tests/e2e/smoke.spec.ts --workers=1
          } 2>&1 | tee /tmp/phase3-hardening.log

      - name: Publish validated code
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git restore --worktree -- tsconfig.json
          rm -f next-env.d.ts
          rm scripts/apply-phase3-hardening.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json tsconfig.e2e.json vitest.critical.config.ts tests/e2e tests/persisted-resource-client-critical.test.ts tests/session-persistence-critical.test.ts
          git add -A scripts/apply-phase3-hardening.mjs
          git diff --cached --check
          git commit -m "test: harden e2e types fixtures and critical coverage [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
          gh issue comment "${{ github.event.issue.number }}" --body "Validation passed and Phase 3 hardening was published to main."

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo 'Phase 3 hardening failed. No validated implementation was published.'
            echo
            echo '<details><summary>Failure summary</summary>'
            echo
            echo '```text'
            if [ -f /tmp/phase3-hardening.log ]; then
              grep -E 'Failed Tests|FAIL |error TS|Error:|AssertionError|Coverage|threshold|Test Files|Tests |Type error|ESLint|warning' /tmp/phase3-hardening.log | tail -n 180 || true
              echo '--- final log lines ---'
              tail -n 100 /tmp/phase3-hardening.log
            else
              echo 'Validation log was not created.'
            fi
            echo '```'
            echo '</details>'
          } > /tmp/phase3-hardening-comment.md
          gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/phase3-hardening-comment.md
