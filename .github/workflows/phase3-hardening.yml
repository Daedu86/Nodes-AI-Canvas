name: Apply phase 3 hardening

on:
  push:
    branches: [main]
    paths: ["phase3-trigger.txt"]

permissions:
  contents: write
  issues: write

concurrency:
  group: phase3-hardening
  cancel-in-progress: false

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"
  PHASE3_ISSUE_NUMBER: "89"

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Apply and validate phase 3
        shell: bash
        run: |
          set -o pipefail
          {
            node scripts/apply-phase3-hardening.mjs
            python - <<'PY'
          from pathlib import Path
          import re

          fixture_path = Path("tests/e2e/fixtures/app.ts")
          fixture = fixture_path.read_text()
          old = '''  const { body, ...rest } = init ?? {};
            const response = await page.request.fetch(url, {
              headers: {
                "Content-Type": "application/json",
                ...(rest.headers ?? {}),
              },
              ...rest,
              ...(body === undefined ? {} : { data: body }),
            });'''
          new = '''  const { body, headers, ...rest } = init ?? {};
            const normalizedHeaders = headers
              ? Object.fromEntries(new Headers(headers).entries())
              : {};
            const response = await page.request.fetch(url, {
              ...rest,
              headers: {
                "Content-Type": "application/json",
                ...normalizedHeaders,
              },
              ...(body === undefined ? {} : { data: body }),
            });'''
          if old not in fixture:
              raise SystemExit("fixture headers marker not found")
          fixture_path.write_text(fixture.replace(old, new))

          session_path = Path("tests/e2e/session-return-send.spec.ts")
          session_source = session_path.read_text()
          old_import = 'import { ensureSignedIn, fetchAppJson, resetAppData, type Page } from "./fixtures/app";'
          new_import = 'import { ensureSignedIn, fetchAppJson, PLAYWRIGHT_BASE_URL, resetAppData, type Page } from "./fixtures/app";'
          if old_import not in session_source:
              raise SystemExit("session fixture import marker not found")
          session_path.write_text(session_source.replace(old_import, new_import))

          persistence_test_path = Path("tests/session-persistence-critical.test.ts")
          persistence_test = persistence_test_path.read_text()
          start_marker = '    expect(fetchMock).toHaveBeenCalledWith('
          end_marker = '  it("recovers a newer cached snapshot and registers conflicts on failure"'
          start = persistence_test.find(start_marker)
          end = persistence_test.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit("session patch assertion boundaries not found")
          replacement = '''    const [requestUrl, requestInit] = fetchMock.mock.calls[0] as [string, RequestInit];
            expect(requestUrl).toBe("/api/sessions/session/1");
            expect(requestInit).toEqual(
              expect.objectContaining({
                keepalive: true,
                method: "PATCH",
              }),
            );
            expect(JSON.parse(String(requestInit.body))).toEqual({
              expectedVersion: 1,
              title: "Updated",
            });
          });

          '''
          persistence_test_path.write_text(
              persistence_test[:start] + replacement + persistence_test[end:]
          )

          selector_path = Path("components/assistant-ui/model-selector.tsx")
          selector = selector_path.read_text()
          selector, count = re.subn(
              r'(<select\s*\n)(\s*)(className=)',
              r'\1\2aria-label="Model"\n\2\3',
              selector,
              count=1,
          )
          if count != 1:
              raise SystemExit("model selector could not be patched")
          selector_path.write_text(selector)
          PY
            npm run format
            npm run check
            npm run build:budget
            npx playwright install --with-deps chromium
            npm run test:e2e -- tests/e2e/accessibility.spec.ts tests/e2e/chat-image-attachment.spec.ts tests/e2e/session-return-send.spec.ts tests/e2e/smoke.spec.ts --workers=1
          } 2>&1 | tee /tmp/phase3-hardening.log

      - name: Publish validated code
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git restore --worktree -- tsconfig.json
          rm -f next-env.d.ts
          rm scripts/apply-phase3-hardening.mjs phase3-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/assistant-ui/model-selector.tsx package.json tsconfig.e2e.json vitest.critical.config.ts tests/e2e tests/persisted-resource-client-critical.test.ts tests/session-persistence-critical.test.ts
          git add -A scripts/apply-phase3-hardening.mjs phase3-trigger.txt
          git diff --cached --check
          git commit -m "test: harden e2e types fixtures and critical coverage [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
          gh issue comment "$PHASE3_ISSUE_NUMBER" --body "Validation passed and Phase 3 hardening was published to main."

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo 'Phase 3 hardening failed. No validated implementation was published.'
            echo
            echo '<details><summary>Failure summary</summary>'
            echo
            echo '```text'
            if [ -f /tmp/phase3-hardening.log ]; then
              grep -E 'Failed Tests|FAIL |error TS|Error:|AssertionError|Coverage|threshold|Test Files|Tests |Type error|ESLint|warning' /tmp/phase3-hardening.log | tail -n 180 || true
              echo '--- final log lines ---'
              tail -n 100 /tmp/phase3-hardening.log
            else
              echo 'Validation log was not created.'
            fi
            echo '```'
            echo '</details>'
          } > /tmp/phase3-hardening-comment.md
          gh issue comment "$PHASE3_ISSUE_NUMBER" --body-file /tmp/phase3-hardening-comment.md
