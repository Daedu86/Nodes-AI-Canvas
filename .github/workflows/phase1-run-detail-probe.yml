name: Inspect invalid phase 1 run

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase1-run-detail-probe.yml

permissions:
  actions: read
  checks: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch run diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/29243986576" > phase1-run-detail.json
          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/commits/04893548170d73e92c5eca2fc7b6805c3fa3edc4/check-runs" \
            > phase1-check-runs.json

      - name: Publish diagnostics and remove probe
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/phase1-run-detail-probe.yml
          git add phase1-run-detail.json phase1-check-runs.json
          git commit -m "ci: record invalid phase 1 diagnostics [skip vercel]"
          git push origin HEAD:main
