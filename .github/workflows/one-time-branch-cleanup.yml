name: One-time branch cleanup

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-time-branch-cleanup.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Close open pull requests and remove non-main branches
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const repository = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repository.data.default_branch;
            const repositoryFullName = `${owner}/${repo}`;
            const closedPullRequests = [];
            const deletedBranches = [];
            const failures = [];

            const openPullRequests = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: "open", per_page: 100 },
            );

            for (const pullRequest of openPullRequests) {
              const isLocalBranch =
                pullRequest.head.repo?.full_name === repositoryFullName;
              if (!isLocalBranch || pullRequest.head.ref === defaultBranch) continue;

              try {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pullRequest.number,
                  state: "closed",
                });
                closedPullRequests.push({
                  number: pullRequest.number,
                  branch: pullRequest.head.ref,
                  title: pullRequest.title,
                });
              } catch (error) {
                failures.push({
                  type: "pull_request",
                  name: `#${pullRequest.number}`,
                  message: error instanceof Error ? error.message : String(error),
                });
              }
            }

            const branchesBefore = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 },
            );

            for (const branch of branchesBefore) {
              if (branch.name === defaultBranch) continue;

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch.name}`,
                });
                deletedBranches.push(branch.name);
              } catch (error) {
                failures.push({
                  type: "branch",
                  name: branch.name,
                  message: error instanceof Error ? error.message : String(error),
                });
              }
            }

            const branchesAfter = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 },
            );

            const report = {
              completedAt: new Date().toISOString(),
              defaultBranch,
              branchesBefore: branchesBefore.map((branch) => branch.name),
              closedPullRequests,
              deletedBranches,
              remainingBranches: branchesAfter.map((branch) => branch.name),
              failures,
            };

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: ".github/branch-cleanup-report.json",
              message: "chore: record one-time branch cleanup",
              content: Buffer.from(JSON.stringify(report, null, 2)).toString("base64"),
              branch: defaultBranch,
            });

            core.summary
              .addHeading("Branch cleanup")
              .addRaw(`Deleted branches: ${deletedBranches.length}\n`)
              .addRaw(`Closed pull requests: ${closedPullRequests.length}\n`)
              .addRaw(`Remaining branches: ${branchesAfter.map((branch) => branch.name).join(", ")}\n`)
              .addRaw(`Failures: ${failures.length}\n`)
              .write();

            if (failures.length > 0) {
              core.setFailed(`Branch cleanup completed with ${failures.length} failure(s).`);
            }
