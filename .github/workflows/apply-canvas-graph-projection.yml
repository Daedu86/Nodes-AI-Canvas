name: Apply canvas graph projection

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-canvas-graph-projection
  cancel-in-progress: true

jobs:
  apply:
    if: contains(github.event.head_commit.message, '[canvas-graph-projection]')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Apply and validate graph projection extraction
        shell: bash
        run: |
          set -Eeuo pipefail
          LOG=/tmp/canvas-graph-projection.log
          exec > >(tee -a "$LOG") 2>&1

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          record_failure() {
            status=$?
            trap - ERR
            echo "Validation failed with exit code $status"
            git reset --hard HEAD
            mkdir -p .github/canvas-graph-projection
            cp "$LOG" .github/canvas-graph-projection/last-failure.log
            git add .github/canvas-graph-projection/last-failure.log
            git commit -m "chore: record graph projection validation failure [skip vercel]"
            git push origin HEAD:main
            exit "$status"
          }
          trap record_failure ERR

          cp .github/canvas-graph-projection/module.ts.txt \
            components/assistant-ui/thread-graph-flow/canvas-graph-projection.ts
          cp .github/canvas-graph-projection/test.ts.txt \
            tests/canvas-graph-projection.test.ts

          python3 - <<'PY'
          from pathlib import Path

          path = Path("components/assistant-ui/thread-graph-flow/thread-graph-flow.tsx")
          text = path.read_text(encoding="utf-8")

          def replace_between(source: str, start: str, end: str, replacement: str) -> str:
              start_index = source.index(start)
              end_index = source.index(end, start_index)
              return source[:start_index] + replacement + source[end_index:]

          import_anchor = 'import { CanvasArtifactInspector } from "@/components/assistant-ui/thread-graph-flow/canvas-artifact-inspector";\n'
          projection_import = '''import {
            buildCanvasFilterCounts,
            buildFocusPathNodeIds,
            buildGraphStructureSignature,
            buildRelatedContextIds,
            buildSelectedLineage,
            buildTreeStructureSignature,
            decorateCanvasEdges,
            decorateCanvasNodes,
            filterCanvasGraph,
            resolveCanvasVisibleNodeIds,
          } from "@/components/assistant-ui/thread-graph-flow/canvas-graph-projection";
          '''
          if projection_import not in text:
              text = text.replace(import_anchor, projection_import + import_anchor, 1)

          text = replace_between(
              text,
              "  const filterCounts = React.useMemo(() => {",
              "  const selectedLineage = React.useMemo(() => {",
              '''  const filterCounts = React.useMemo(
            () => buildCanvasFilterCounts(canvasConversationNodes, artifacts.length),
            [artifacts.length, canvasConversationNodes],
          );

          ''',
          )

          text = replace_between(
              text,
              "  const selectedLineage = React.useMemo(() => {",
              "  const focusPathNodeIds = React.useMemo(() => {",
              '''  const selectedLineage = React.useMemo(
            () =>
              buildSelectedLineage({
                canvasConversationNodes,
                nodeIndex,
                selectedArtifactId: selectedArtifact?.id ?? null,
                selectedNodeId,
              }),
            [canvasConversationNodes, nodeIndex, selectedArtifact, selectedNodeId],
          );

          ''',
          )

          text = replace_between(
              text,
              "  const focusPathNodeIds = React.useMemo(() => {",
              "  const handleCancelRun = React.useCallback(() => {",
              '''  const focusPathNodeIds = React.useMemo(
            () =>
              buildFocusPathNodeIds({
                canvasConversationNodes,
                nodeIndex,
                selectedArtifactId: selectedArtifact?.id ?? null,
                selectedContextArtifactIds,
                selectedContextLinkedMessageIds,
                selectedNodeId,
              }),
            [
              canvasConversationNodes,
              nodeIndex,
              selectedArtifact,
              selectedContextArtifactIds,
              selectedContextLinkedMessageIds,
              selectedNodeId,
            ],
          );

          ''',
          )

          text = replace_between(
              text,
              "  const relatedContextIds = React.useMemo(() => {",
              "  const baseConversationNodes = React.useMemo<ThreadGraphFlowNode[]>(() => {",
              '''  const relatedContextIds = React.useMemo(
            () =>
              buildRelatedContextIds(
                selectedContextArtifactIds,
                selectedContextLinkedMessageIds,
              ),
            [selectedContextArtifactIds, selectedContextLinkedMessageIds],
          );

          ''',
          )

          text = replace_between(
              text,
              "  const visibleNodeIds = React.useMemo(() => {",
              "  const decoratedFlowNodes = React.useMemo<ThreadGraphFlowNode[]>(() => {",
              '''  const visibleNodeIds = React.useMemo(
            () =>
              resolveCanvasVisibleNodeIds({
                densityMode,
                focusPathNodeIds,
                selectedNodeId,
              }),
            [densityMode, focusPathNodeIds, selectedNodeId],
          );

          const { nodes: visibleFlowNodes, edges: visibleFlowEdges } = React.useMemo(
            () => filterCanvasGraph(flowNodes, flowEdges, visibleNodeIds),
            [flowEdges, flowNodes, visibleNodeIds],
          );

          ''',
          )

          text = replace_between(
              text,
              "  const decoratedFlowNodes = React.useMemo<ThreadGraphFlowNode[]>(() => {",
              "  const decoratedFlowEdges = React.useMemo<ThreadGraphFlowEdge[]>(() => {",
              '''  const decoratedFlowNodes = React.useMemo<ThreadGraphFlowNode[]>(
            () =>
              decorateCanvasNodes({
                nodeIndex,
                relatedContextIds,
                selectedLineage,
                selectedNodeId,
                spotlight,
                visibleFlowNodes,
              }),
            [
              nodeIndex,
              relatedContextIds,
              selectedLineage,
              selectedNodeId,
              spotlight,
              visibleFlowNodes,
            ],
          );

          ''',
          )

          text = replace_between(
              text,
              "  const decoratedFlowEdges = React.useMemo<ThreadGraphFlowEdge[]>(() => {",
              "  const graphStructureSignature = React.useMemo(",
              '''  const decoratedFlowEdges = React.useMemo<ThreadGraphFlowEdge[]>(
            () =>
              decorateCanvasEdges({
                decoratedFlowNodes,
                relatedContextIds,
                selectedLineage,
                selectedNodeId,
                spotlight,
                visibleFlowEdges,
              }),
            [
              decoratedFlowNodes,
              relatedContextIds,
              selectedLineage,
              selectedNodeId,
              spotlight,
              visibleFlowEdges,
            ],
          );

          ''',
          )

          text = replace_between(
              text,
              "  const graphStructureSignature = React.useMemo(",
              "  const treeStructureSignature = React.useMemo(",
              '''  const graphStructureSignature = React.useMemo(
            () => buildGraphStructureSignature(decoratedFlowNodes, decoratedFlowEdges),
            [decoratedFlowEdges, decoratedFlowNodes],
          );

          ''',
          )

          tree_start = text.index("  const treeStructureSignature = React.useMemo(")
          tree_end = text.index("  React.useEffect(() => {", tree_start)
          text = (
              text[:tree_start]
              + '''  const treeStructureSignature = React.useMemo(
            () =>
              buildTreeStructureSignature(
                canvasConversationNodes,
                baseConversationEdges,
              ),
            [baseConversationEdges, canvasConversationNodes],
          );

          '''
              + text[tree_end:]
          )

          path.write_text(text, encoding="utf-8")
          print(f"thread-graph-flow.tsx: {len(text.splitlines())} lines")
          PY

          npm ci
          npx eslint --fix \
            components/assistant-ui/thread-graph-flow/thread-graph-flow.tsx \
            components/assistant-ui/thread-graph-flow/canvas-graph-projection.ts \
            tests/canvas-graph-projection.test.ts
          npx eslint \
            components/assistant-ui/thread-graph-flow/thread-graph-flow.tsx \
            components/assistant-ui/thread-graph-flow/canvas-graph-projection.ts \
            tests/canvas-graph-projection.test.ts
          npm test
          npm run build

          trap - ERR
          rm -rf .github/canvas-graph-projection
          rm -f .github/workflows/apply-canvas-graph-projection.yml
          cat > vercel.json <<'EOF'
          {
            "framework": "nextjs"
          }
          EOF
          git add -A
          git commit -m "refactor: extract canvas graph projection"
          git push origin HEAD:main
