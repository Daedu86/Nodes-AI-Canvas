name: Phase 10 collaboration diagnostic

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: phase-10-collaboration-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Mark core started
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=pending -f context='diag10/core-started' -f description='Phase 10 core validation started'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --fund=false
      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run format:check
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck
      - name: Targeted invitation tests
        id: targeted
        continue-on-error: true
        run: npx vitest run tests/project-invitation-token.test.ts tests/project-invitations.test.ts tests/project-collaboration.test.ts
      - name: Complete unit suite
        id: unit
        continue-on-error: true
        run: npm run test:unit
      - name: Production build
        id: build
        continue-on-error: true
        run: npm run build
      - name: Publish core results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          LINT: ${{ steps.lint.outcome }}
          TYPECHECK: ${{ steps.typecheck.outcome }}
          TARGETED: ${{ steps.targeted.outcome }}
          UNIT: ${{ steps.unit.outcome }}
          BUILD: ${{ steps.build.outcome }}
        shell: bash
        run: |
          publish() {
            if [ "$2" = success ]; then state=success; else state=failure; fi
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state="$state" -f context="diag10/$1" -f description="$1: $2"
          }
          publish lint "$LINT"
          publish typecheck "$TYPECHECK"
          publish targeted "$TARGETED"
          publish unit "$UNIT"
          publish build "$BUILD"
          if [ "$LINT" != success ] || [ "$TYPECHECK" != success ] || [ "$TARGETED" != success ] || [ "$UNIT" != success ] || [ "$BUILD" != success ]; then exit 1; fi

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Mark browser started
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=pending -f context='diag10/browser-started' -f description='Phase 10 browser validation started'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --fund=false
      - name: Install Chromium
        id: chromium
        continue-on-error: true
        run: npx playwright install chromium
      - name: End-to-end suite
        id: e2e
        if: steps.chromium.outcome == 'success'
        continue-on-error: true
        run: npm run test:e2e -- --workers=1
      - name: Publish browser results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          CHROMIUM: ${{ steps.chromium.outcome }}
          E2E: ${{ steps.e2e.outcome }}
        shell: bash
        run: |
          publish() {
            if [ "$2" = success ]; then state=success; else state=failure; fi
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state="$state" -f context="diag10/$1" -f description="$1: $2"
          }
          publish chromium "$CHROMIUM"
          publish e2e "$E2E"
          if [ "$CHROMIUM" != success ] || [ "$E2E" != success ]; then exit 1; fi
