name: Phase 2 static log probe

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase2-static-log-probe.yml

permissions:
  actions: read
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
      - name: Capture failed log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view 29258714313 --log-failed > phase2-graph-static-failure.log || true
          tail -180 phase2-graph-static-failure.log > phase2-graph-static-failure-tail.log
      - name: Publish probe result
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/phase2-static-log-probe.yml
          git add phase2-graph-static-failure-tail.log
          git commit -m "test: record graph-source static error [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
