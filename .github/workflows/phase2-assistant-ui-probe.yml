name: Phase 2 Assistant UI probe

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase2-assistant-ui-probe.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --fund=false
      - name: Inspect runtime APIs
        run: |
          {
            echo '=== package versions ==='
            npm ls @assistant-ui/react @assistant-ui/core @assistant-ui/react-ai-sdk ai --depth=1 || true
            echo
            echo '=== runtime API declarations ==='
            grep -R -n -E 'exportExternalState|getState\(|interface ThreadRuntime|type ThreadRuntime|ThreadRuntimeCore|ThreadState|useChatRuntime' \
              node_modules/@assistant-ui/react \
              node_modules/@assistant-ui/core \
              node_modules/@assistant-ui/react-ai-sdk \
              2>/dev/null | head -400 || true
            echo
            echo '=== files containing exportExternalState ==='
            grep -R -l 'exportExternalState' node_modules/@assistant-ui 2>/dev/null | head -40 || true
            echo
            echo '=== files containing useChatRuntime ==='
            grep -R -l 'useChatRuntime' node_modules/@assistant-ui 2>/dev/null | head -40 || true
          } > phase2-assistant-ui-api.txt

          while IFS= read -r file; do
            [ -f "$file" ] || continue
            echo >> phase2-assistant-ui-api.txt
            echo "=== $file ===" >> phase2-assistant-ui-api.txt
            grep -n -B 12 -A 40 -E 'exportExternalState|getState\(|useChatRuntime|ThreadRuntime' "$file" 2>/dev/null | head -500 >> phase2-assistant-ui-api.txt || true
          done < <(grep -R -l -E 'exportExternalState|useChatRuntime' node_modules/@assistant-ui 2>/dev/null | head -30)

      - name: Publish probe and remove workflow
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/phase2-assistant-ui-probe.yml
          git add phase2-assistant-ui-api.txt
          git commit -m "test: inspect Assistant UI runtime exports [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
