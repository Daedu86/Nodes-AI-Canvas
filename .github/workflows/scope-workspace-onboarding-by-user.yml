name: Scope workspace onboarding by user

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: scope-workspace-onboarding-by-user
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  validate:
    if: github.event.issue.title == '[automation] Scope Workspace Onboarding By User'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Report validation start
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "User-scoped onboarding validation started."

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Apply onboarding changes
        run: |
          echo "VALIDATION_STAGE=extraction" >> "$GITHUB_ENV"
          set -o pipefail
          node scripts/scope-workspace-onboarding-by-user.mjs 2>&1 | tee /tmp/validation.log

      - name: Install dependencies
        run: |
          echo "VALIDATION_STAGE=dependency installation" >> "$GITHUB_ENV"
          set -o pipefail
          npm ci --no-audit --fund=false 2>&1 | tee /tmp/validation.log

      - name: Format generated files
        run: |
          echo "VALIDATION_STAGE=formatting" >> "$GITHUB_ENV"
          set -o pipefail
          npm run format 2>&1 | tee /tmp/validation.log

      - name: Validate formatting and types
        run: |
          echo "VALIDATION_STAGE=lint and TypeScript" >> "$GITHUB_ENV"
          set -o pipefail
          (npm run format:check && npm run typecheck) 2>&1 | tee /tmp/validation.log

      - name: Run unit tests
        run: |
          echo "VALIDATION_STAGE=unit tests" >> "$GITHUB_ENV"
          set -o pipefail
          npm run test:unit 2>&1 | tee /tmp/validation.log

      - name: Build and enforce bundle budget
        run: |
          echo "VALIDATION_STAGE=production build and bundle budget" >> "$GITHUB_ENV"
          set -o pipefail
          npm run build:budget 2>&1 | tee /tmp/validation.log
          git checkout -- tsconfig.json

      - name: Publish validated changes to main
        shell: bash
        run: |
          echo "VALIDATION_STAGE=publishing to main" >> "$GITHUB_ENV"
          set -euo pipefail
          exec > >(tee /tmp/publish.log) 2>&1
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git rm .github/workflows/scope-workspace-onboarding-by-user.yml
          git rm scripts/scope-workspace-onboarding-by-user.mjs
          git add \
            components/workspace/app-header.tsx \
            components/workspace/workspace-onboarding-dialog.tsx \
            lib/client/workspace-onboarding.ts \
            tests/app-header.test.tsx \
            tests/workspace-onboarding.test.ts \
            tests/workspace-onboarding-dialog.test.tsx
          git diff --check
          git commit -m "feat: scope workspace onboarding by user [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report validation success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Validation passed and user-scoped onboarding was published to main."

      - name: Report validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "Validation failed during **${VALIDATION_STAGE:-preflight}**. No functional onboarding changes were published."
            echo
            echo "<details><summary>Relevant log tail</summary>"
            echo
            echo '```text'
            if [[ -s /tmp/publish.log ]]; then
              tail -c 16000 /tmp/publish.log
            else
              tail -c 16000 /tmp/validation.log 2>/dev/null || echo "No command log was captured."
            fi
            echo '```'
            echo "</details>"
          } > /tmp/validation-comment.md
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/validation-comment.md
