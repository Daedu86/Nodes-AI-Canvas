          ]:
              target = root / path
              if target.exists():
                  shutil.rmtree(target)

          # Remove this one-shot workflow from the resulting commit.
          workflow = root / '.github/workflows/remove-nody.yml'
          if workflow.exists():
              workflow.unlink()

          # Refuse to commit if any source/documentation reference remains.
          ignored_parts = {'.git', 'node_modules', '.next'}
          leftovers = []
          for path in root.rglob('*'):
              if not path.is_file() or any(part in ignored_parts for part in path.parts):
                  continue
              if path.suffix.lower() not in {'.ts', '.tsx', '.js', '.jsx', '.md', '.json', '.yml', '.yaml', '.mjs', '.cjs'}:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              if re.search(r'\bnody\b', text, re.IGNORECASE):
                  leftovers.append(str(path))

          if leftovers:
              raise RuntimeError('Remaining Nody references: ' + ', '.join(leftovers))
          PY

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Commit removal directly to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: remove Nody"
          git push origin HEAD:main
