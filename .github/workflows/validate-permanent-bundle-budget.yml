name: Validate permanent bundle budget

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: validate-permanent-bundle-budget
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  validate:
    if: github.event.issue.title == '[automation] Validate Permanent Bundle Budget'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Report validation start
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Permanent CI bundle-budget validation started."

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Validate formatting and types
        run: npm run format:check && npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Build and enforce bundle budget
        run: npm run build:budget

      - name: Remove temporary validation workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/validate-permanent-bundle-budget.yml
          git commit -m "chore: remove bundle budget validation workflow [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report validation success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Formatting, TypeScript, unit tests, production build, and the permanent JavaScript bundle budget all passed."

      - name: Report validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Permanent CI bundle-budget validation failed. The temporary workflow remains available for diagnosis."
