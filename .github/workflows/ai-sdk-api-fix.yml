name: Apply AI SDK API migration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'fix/ai-sdk-openai-4-migration' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/ai-sdk-openai-4-migration
      - name: Update telemetry options
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for name in ['app/api/canvas-runs/route.ts', 'lib/server/chat/executor.ts']:
              path = Path(name)
              text = path.read_text()
              text = text.replace('          metadata: {', '          attributes: {')
              path.write_text(text)
          PY
      - name: Commit API migration
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/api/canvas-runs/route.ts lib/server/chat/executor.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix: migrate AI SDK telemetry attributes"
          git push origin HEAD:fix/ai-sdk-openai-4-migration
