name: Verify Nody Removal

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Run verification and save report
        shell: bash
        run: |
          set +e
          npm ci > /tmp/npm-ci.log 2>&1
          CI_STATUS=$?
          if [ "$CI_STATUS" -eq 0 ]; then
            npx tsc --noEmit > /tmp/typecheck.log 2>&1
            TYPECHECK_STATUS=$?
            npm test > /tmp/tests.log 2>&1
            TEST_STATUS=$?
            npm run build > /tmp/build.log 2>&1
            BUILD_STATUS=$?
          else
            TYPECHECK_STATUS=99
            TEST_STATUS=99
            BUILD_STATUS=99
            echo "Skipped because npm ci failed." > /tmp/typecheck.log
            echo "Skipped because npm ci failed." > /tmp/tests.log
            echo "Skipped because npm ci failed." > /tmp/build.log
          fi
          {
            echo "Nody removal verification"
            echo "commit=$(git rev-parse HEAD)"
            echo "npm_ci=$CI_STATUS"
            echo "typecheck=$TYPECHECK_STATUS"
            echo "tests=$TEST_STATUS"
            echo "build=$BUILD_STATUS"
            echo
            echo "===== npm ci (tail) ====="
            tail -n 80 /tmp/npm-ci.log
            echo
            echo "===== typecheck (tail) ====="
            tail -n 160 /tmp/typecheck.log
            echo
            echo "===== tests (tail) ====="
            tail -n 180 /tmp/tests.log
            echo
            echo "===== build (tail) ====="
            tail -n 220 /tmp/build.log
          } > verification-nody-removal.txt
          rm -f .github/workflows/verify-nody-removal.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: refresh Nody removal verification"
          git push origin HEAD:main
