name: Migration diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --fund=false
      - name: Capture typecheck
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p migration-logs
          npm run typecheck > migration-logs/typecheck.log 2>&1
      - name: Capture unit tests
        continue-on-error: true
        shell: bash
        run: npm run test:coverage > migration-logs/tests.log 2>&1
      - name: Capture build
        continue-on-error: true
        shell: bash
        run: npm run build > migration-logs/build.log 2>&1
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: migration-diagnostics
          path: migration-logs
          retention-days: 7
