name: Query live CodeQL status

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/query-live-codeql-status.yml

permissions:
  contents: write
  security-events: read

jobs:
  query:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Query and publish live status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate --slurp "/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&ref=refs/heads/main&per_page=100" > open-pages.json
          node <<'NODE'
          const fs = require("node:fs");
          const alerts = JSON.parse(fs.readFileSync("open-pages.json", "utf8")).flat();
          const result = {
            checkedCommit: process.env.GITHUB_SHA,
            openAlertCount: alerts.length,
            alerts: alerts.map((alert) => ({
              number: alert.number,
              rule: alert.rule?.id ?? null,
              path: alert.most_recent_instance?.location?.path ?? null,
              startLine: alert.most_recent_instance?.location?.start_line ?? null,
              state: alert.state,
            })),
          };
          fs.writeFileSync("live-status.json", `${JSON.stringify(result, null, 2)}\n`);
          NODE
          encoded="$(base64 -w 0 live-status.json)"
          gh api --method PUT "/repos/${GITHUB_REPOSITORY}/contents/.tmp-codeql/live-open-status.json" \
            -f message='chore: record live CodeQL status [skip vercel]' \
            -f content="$encoded" \
            -f branch='main'
