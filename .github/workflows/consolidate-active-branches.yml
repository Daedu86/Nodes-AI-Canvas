name: Consolidate active branches

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/consolidate-active-branches.yml

permissions:
  contents: write

concurrency:
  group: consolidate-active-branches
  cancel-in-progress: false

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Merge and retire active branches
        shell: bash
        run: |
          set -euo pipefail

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'

          mapfile -t branches < <(
            git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin \
              | grep -v '^main$' \
              | grep -v '^HEAD$' \
              | sort
          )

          echo "Detected ${#branches[@]} non-main remote branch(es)."
          merged=()
          already_in_main=()

          for branch in "${branches[@]}"; do
            echo "Inspecting origin/${branch}"
            if git merge-base --is-ancestor "origin/${branch}" HEAD; then
              echo "origin/${branch} is already contained in main."
              already_in_main+=("${branch}")
              continue
            fi

            echo "Merging origin/${branch} into main."
            if ! git merge --no-ff --no-edit "origin/${branch}"; then
              git merge --abort || true
              echo "Merge conflict in ${branch}; main was not pushed and no branches were deleted." >&2
              exit 1
            fi
            merged+=("${branch}")
          done

          git rm .github/workflows/consolidate-active-branches.yml
          git add -A
          git commit -m "chore: consolidate active branches into main [skip vercel]"
          git push origin HEAD:main

          for branch in "${branches[@]}"; do
            echo "Deleting merged remote branch ${branch}."
            git push origin --delete "${branch}" || {
              echo "Could not delete ${branch}; it is already merged into main." >&2
            }
          done

          {
            echo "## Branch consolidation"
            echo
            echo "- Non-main branches detected: ${#branches[@]}"
            echo "- Branches newly merged: ${#merged[@]}"
            echo "- Branches already contained in main: ${#already_in_main[@]}"
            if ((${#merged[@]})); then
              printf '%s\n' "- Newly merged: ${merged[*]}"
            fi
            if ((${#already_in_main[@]})); then
              printf '%s\n' "- Already contained: ${already_in_main[*]}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
