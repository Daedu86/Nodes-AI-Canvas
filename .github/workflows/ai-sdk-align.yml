name: Align AI SDK packages

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  align:
    if: github.head_ref == 'fix/ai-sdk-openai-4-migration' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/ai-sdk-openai-4-migration
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm install ai@latest @ai-sdk/openai@4.0.11 @assistant-ui/react-ai-sdk@latest --save
      - name: Commit aligned dependency graph
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "deps: align AI SDK adapters"
          git push origin HEAD:fix/ai-sdk-openai-4-migration
