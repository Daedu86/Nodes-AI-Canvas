name: Issue 97 diagnostic

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/issue-97-diagnostic.yml

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_RUN_ID: "29581840116"
      TARGET_JOB_ID: "87889210531"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract build, E2E, and SARIF failures
        run: |
          mkdir -p .github/validation /tmp/issue97-artifacts
          gh run view "${TARGET_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --job "${TARGET_JOB_ID}" --log > /tmp/issue97.log 2>&1 || true
          gh run download "${TARGET_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name issue-97-validation-artifacts --dir /tmp/issue97-artifacts || true

          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const ansi = /\u001b\[[0-9;]*m/gu;
          const rawLines = fs.existsSync('/tmp/issue97.log')
            ? fs.readFileSync('/tmp/issue97.log', 'utf8').replace(ansi, '').split(/\r?\n/u)
            : [];

          const normalize = (line) => {
            const fields = line.split('\t');
            return fields.length >= 4 ? fields.slice(3).join('\t') : line;
          };
          const linesForStep = (stepName) =>
            rawLines
              .filter((line) => line.includes(`\t${stepName}\t`))
              .map(normalize)
              .filter(Boolean);
          const selectRelevant = (lines, patterns, tail = 180) => {
            const selected = new Set();
            lines.forEach((line, index) => {
              if (!patterns.some((pattern) => pattern.test(line))) return;
              for (let cursor = Math.max(0, index - 5); cursor <= Math.min(lines.length - 1, index + 12); cursor += 1) {
                selected.add(cursor);
              }
            });
            const contextual = [...selected]
              .sort((a, b) => a - b)
              .map((index) => lines[index]);
            const fallback = lines.slice(-tail);
            return (contextual.length > 0 ? contextual : fallback).slice(-400).join('\n');
          };

          const buildLines = linesForStep('Run production build and bundle budget');
          const e2eLines = linesForStep('Run full Chromium end-to-end suite');
          const buildExcerpt = selectRelevant(buildLines, [
            /Largest JavaScript/iu,
            /Total JavaScript/iu,
            /budget/iu,
            /error/iu,
            /exit code/iu,
          ]);
          const e2eExcerpt = selectRelevant(e2eLines, [
            /failed/iu,
            /error/iu,
            /timeout/iu,
            /expect/iu,
            /test(s)?\s/iu,
            /×/u,
            /❯/u,
          ]);

          function walk(directory) {
            if (!fs.existsSync(directory)) return [];
            return fs.readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(directory, entry.name);
              return entry.isDirectory() ? walk(fullPath) : [fullPath];
            });
          }

          const sarifFiles = walk('/tmp/issue97-artifacts').filter((file) => file.endsWith('.sarif'));
          const findings = [];
          const sarifErrors = [];
          for (const file of sarifFiles) {
            try {
              const payload = JSON.parse(fs.readFileSync(file, 'utf8'));
              for (const run of payload.runs ?? []) {
                const ruleById = new Map(
                  (run.tool?.driver?.rules ?? []).map((rule) => [rule.id, rule]),
                );
                for (const result of run.results ?? []) {
                  const location = result.locations?.[0]?.physicalLocation;
                  const rule = ruleById.get(result.ruleId);
                  findings.push({
                    ruleId: result.ruleId,
                    ruleName: rule?.name,
                    level: result.level,
                    message: result.message?.text,
                    path: location?.artifactLocation?.uri,
                    startLine: location?.region?.startLine,
                    endLine: location?.region?.endLine,
                  });
                }
              }
            } catch (error) {
              sarifErrors.push(`${file}: ${error instanceof Error ? error.message : String(error)}`);
            }
          }

          const report = {
            collectedAt: new Date().toISOString(),
            targetRunId: process.env.TARGET_RUN_ID,
            targetJobId: process.env.TARGET_JOB_ID,
            buildExcerpt,
            e2eExcerpt,
            sarifFiles: sarifFiles.map((file) => file.replace('/tmp/issue97-artifacts/', '')),
            findings,
            sarifErrors,
          };
          fs.writeFileSync(
            '.github/validation/issue-97-failure-summary.json',
            `${JSON.stringify(report, null, 2)}\n`,
          );
          console.log(JSON.stringify(report, null, 2));
          NODE

      - name: Commit diagnostic summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/validation/issue-97-failure-summary.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: record issue 97 failure summary [skip ci] [skip vercel]"
          git push origin HEAD:main
