name: Inspect phase 3 test boundaries

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  inspect:
    if: github.event.issue.title == '[automation] Inspect phase 3 tests'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
      - name: Inspect E2E and critical coverage boundaries
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '## E2E files'
            echo '```text'
            find tests/e2e -maxdepth 2 -type f -print | sort
            echo '```'
            echo
            echo '## Repeated helper declarations'
            echo '```text'
            grep -RInE '^(async function|function|const DEV_AUTH_|const PLAYWRIGHT_BASE_URL|type Page)' tests/e2e || true
            echo '```'
            echo
            echo '## Critical coverage candidates'
            echo '```text'
            find components/context components/workspace lib/client -maxdepth 2 -type f \( -name '*.ts' -o -name '*.tsx' \) | sort
            echo '```'
          } > /tmp/phase3-inspection.md
          gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/phase3-inspection.md
