name: Refactor project workspace

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: refactor-project-workspace
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  refactor:
    if: github.event.issue.title == '[automation] Refactor ProjectWorkspace'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Report validation start
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "ProjectWorkspace validation started."

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Apply ProjectWorkspace extraction
        run: |
          echo "VALIDATION_STAGE=extraction" >> "$GITHUB_ENV"
          python scripts/refactor-project-workspace-v2.py 2>&1 | tee /tmp/validation.log

      - name: Report extraction success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Extraction applied; installing dependencies."

      - name: Install dependencies
        run: |
          echo "VALIDATION_STAGE=dependency installation" >> "$GITHUB_ENV"
          npm ci --no-audit --fund=false 2>&1 | tee /tmp/validation.log

      - name: Report dependency success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Dependencies installed; formatting generated files."

      - name: Format generated files
        run: |
          echo "VALIDATION_STAGE=formatting" >> "$GITHUB_ENV"
          npm run format 2>&1 | tee /tmp/validation.log

      - name: Report formatting success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Formatting passed; validating TypeScript."

      - name: Validate formatting and types
        run: |
          echo "VALIDATION_STAGE=TypeScript validation" >> "$GITHUB_ENV"
          set -o pipefail
          (npm run format:check && npm run typecheck) 2>&1 | tee /tmp/validation.log

      - name: Report typecheck success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Formatting and TypeScript validation passed."

      - name: Run unit tests
        run: |
          echo "VALIDATION_STAGE=unit tests" >> "$GITHUB_ENV"
          set -o pipefail
          npm run test:unit 2>&1 | tee /tmp/validation.log

      - name: Report unit test success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "All unit tests passed; building production bundle."

      - name: Build production bundle
        run: |
          echo "VALIDATION_STAGE=production build" >> "$GITHUB_ENV"
          set -o pipefail
          npm run build 2>&1 | tee /tmp/validation.log
          git checkout -- tsconfig.json

      - name: Report build success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Production build passed; publishing the validated refactor to main."

      - name: Publish validated refactor to main
        shell: bash
        run: |
          echo "VALIDATION_STAGE=publishing to main" >> "$GITHUB_ENV"
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git rm .github/workflows/refactor-project-workspace.yml
          git rm scripts/refactor-project-workspace.py
          git rm scripts/refactor-project-workspace-v2.py
          git rm scripts/.refactor-trigger-placeholder
          git add \
            components/workspace/project-workspace.tsx \
            components/workspace/project-section-card.tsx \
            components/workspace/project-workspace-utils.ts \
            components/workspace/use-project-workspace-reset.ts \
            tests/project-workspace-utils.test.ts
          git diff --check
          git commit -m "refactor: split project workspace responsibilities [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report validation success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "ProjectWorkspace validation passed and the refactor was published to main."

      - name: Report validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "ProjectWorkspace validation failed during **${VALIDATION_STAGE:-preflight}**. No functional refactor was published."
            echo
            echo "<details><summary>Log tail</summary>"
            echo
            echo '```text'
            tail -c 6000 /tmp/validation.log 2>/dev/null || echo "No command log was captured."
            echo '```'
            echo "</details>"
          } > /tmp/validation-comment.md
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/validation-comment.md
