name: Refactor project workspace

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/refactor-project-workspace.yml

permissions:
  contents: write

concurrency:
  group: refactor-project-workspace
  cancel-in-progress: false

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  refactor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Apply ProjectWorkspace extraction
        run: python scripts/refactor-project-workspace.py

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Format generated files
        run: npm run format

      - name: Validate formatting and types
        run: |
          npm run format:check
          npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Build production bundle
        run: npm run build

      - name: Publish validated refactor to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git rm .github/workflows/refactor-project-workspace.yml
          git rm scripts/refactor-project-workspace.py
          git add \
            components/workspace/project-workspace.tsx \
            components/workspace/project-section-card.tsx \
            components/workspace/project-workspace-utils.ts \
            components/workspace/use-project-workspace-state.ts \
            tests/project-workspace-utils.test.ts
          git diff --check
          git commit -m "refactor: split project workspace responsibilities [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
