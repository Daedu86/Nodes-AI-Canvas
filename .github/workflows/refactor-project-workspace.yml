name: Refactor project workspace

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: refactor-project-workspace
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  refactor:
    if: github.event.issue.title == '[automation] Refactor ProjectWorkspace'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Report validation start
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "ProjectWorkspace validation started."

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Apply ProjectWorkspace extraction
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path("scripts/refactor-project-workspace.py")
          text = path.read_text(encoding="utf-8")
          old = 'if "SectionCard" in text:\n    fail("Not all SectionCard references were migrated.")'
          new = 'if "<SectionCard" in text or "</SectionCard>" in text:\n    fail("Not all SectionCard references were migrated.")'
          if old not in text:
              raise RuntimeError("Could not patch the SectionCard migration guard.")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          python scripts/refactor-project-workspace.py

      - name: Report extraction success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Extraction applied; installing dependencies."

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Format generated files
        run: npm run format

      - name: Validate formatting and types
        run: |
          npm run format:check
          npm run typecheck

      - name: Report typecheck success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Formatting and TypeScript validation passed."

      - name: Run unit tests
        run: npm run test:unit

      - name: Report unit test success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "All unit tests passed; building production bundle."

      - name: Build production bundle
        run: npm run build

      - name: Publish validated refactor to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git rm .github/workflows/refactor-project-workspace.yml
          git rm scripts/refactor-project-workspace.py
          git rm scripts/.refactor-trigger-placeholder
          git add \
            components/workspace/project-workspace.tsx \
            components/workspace/project-section-card.tsx \
            components/workspace/project-workspace-utils.ts \
            components/workspace/use-project-workspace-state.ts \
            tests/project-workspace-utils.test.ts
          git diff --check
          git commit -m "refactor: split project workspace responsibilities [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report validation success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "ProjectWorkspace validation passed and the refactor was published to main."

      - name: Report validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "ProjectWorkspace validation failed. Inspect the failed workflow step; no functional refactor was published."
