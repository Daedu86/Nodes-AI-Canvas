name: Apply final AI SDK compatibility fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'fix/ai-sdk-openai-4-migration' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/ai-sdk-openai-4-migration
      - name: Apply compatibility edits
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          for name in ['app/api/canvas-runs/route.ts', 'lib/server/chat/executor.ts']:
              path = Path(name)
              text = path.read_text()
              text = re.sub(r'\n          attributes: \{\n(?:            .*\n)+?          \},', '', text)
              if name.endswith('executor.ts'):
                  text = text.replace('        tools: toolset,', '        tools: toolset as Parameters<typeof streamText>[0]["tools"],')
              path.write_text(text)
          PY
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/api/canvas-runs/route.ts lib/server/chat/executor.ts
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix: adapt telemetry and tools to AI SDK 7"
          git push origin HEAD:fix/ai-sdk-openai-4-migration
