name: Verify zero CodeQL alerts

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/verify-final-codeql-zero.yml

permissions:
  contents: write
  security-events: read

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for CodeQL and capture status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp-codeql
          analysis_found=false
          for attempt in $(seq 1 40); do
            gh api "/repos/${GITHUB_REPOSITORY}/code-scanning/analyses?ref=refs/heads/main&tool_name=CodeQL&per_page=100" > .tmp-codeql/analyses.json
            if node -e 'const fs=require("node:fs"); const analyses=JSON.parse(fs.readFileSync(".tmp-codeql/analyses.json","utf8")); process.exit(analyses.some((entry)=>entry.commit_sha===process.env.GITHUB_SHA)?0:1)'; then
              analysis_found=true
              break
            fi
            sleep 15
          done

          gh api --paginate --slurp "/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&ref=refs/heads/main&per_page=100" > .tmp-codeql/alert-pages.json
          ANALYSIS_FOUND="$analysis_found" node <<'NODE'
          const fs = require("node:fs");
          const alerts = JSON.parse(fs.readFileSync(".tmp-codeql/alert-pages.json", "utf8")).flat();
          const result = {
            analysisFoundForCommit: process.env.ANALYSIS_FOUND === "true",
            commitSha: process.env.GITHUB_SHA,
            openAlertCount: alerts.length,
            alerts: alerts.map((alert) => ({
              number: alert.number,
              rule: alert.rule?.id ?? null,
              path: alert.most_recent_instance?.location?.path ?? null,
              startLine: alert.most_recent_instance?.location?.start_line ?? null,
            })),
          };
          fs.writeFileSync(".tmp-codeql/final-zero-status.json", `${JSON.stringify(result, null, 2)}\n`);
          NODE

      - name: Commit verification result
        run: |
          rm -f .github/workflows/verify-final-codeql-zero.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: capture final CodeQL result [skip vercel]"
          git push origin HEAD:main
