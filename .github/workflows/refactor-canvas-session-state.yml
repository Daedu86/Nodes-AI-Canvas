name: Refactor canvas session state

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: refactor-canvas-session-state
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  refactor:
    if: github.event.issue.title == '[automation] Refactor Canvas Session State'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Report validation start
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Canvas session state validation started."

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Apply extraction
        run: |
          echo "VALIDATION_STAGE=extraction" >> "$GITHUB_ENV"
          set -o pipefail
          python scripts/refactor-canvas-session-state.py 2>&1 | tee /tmp/validation.log
          python <<'PY'
          from pathlib import Path

          path = Path("components/assistant-ui/thread-graph-flow/thread-graph-flow.tsx")
          text = path.read_text(encoding="utf-8")
          replacements = [
              (
                  "  }, [toolbarMenu]);",
                  "  }, [setToolbarMenu, toolbarMenu]);",
              ),
              (
                  "  }, [decoratedFlowNodes.length, reactFlowInstance, treeStructureSignature]);",
                  "  }, [decoratedFlowNodes.length, reactFlowInstance, setStoredViewport, treeSignatureRef, treeStructureSignature]);",
              ),
              (
                  "  }, [focusedMessageId, nodeIndex, reactFlowInstance]);",
                  "  }, [focusedMessageId, nodeIndex, reactFlowInstance, setStoredViewport]);",
              ),
              (
                  "  }, [densityMode, reactFlowInstance, selectedNodeId, visibleFlowNodes.length]);",
                  "  }, [densityMode, reactFlowInstance, selectedNodeId, setStoredViewport, visibleFlowNodes.length]);",
              ),
              (
                  "  }, [draft, flowRenderMode, reactFlowInstance]);",
                  "  }, [draft, flowRenderMode, reactFlowInstance, setStoredViewport]);",
              ),
              (
                  "  }, [reactFlowInstance, selectedNodeId]);",
                  "  }, [reactFlowInstance, selectedNodeId, setStoredViewport]);",
              ),
              (
                  "  }, [reactFlowInstance]);",
                  "  }, [reactFlowInstance, setStoredViewport]);",
              ),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one dependency block {old!r}, found {count}.")
              text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Install dependencies
        run: |
          echo "VALIDATION_STAGE=dependency installation" >> "$GITHUB_ENV"
          set -o pipefail
          npm ci --no-audit --fund=false 2>&1 | tee /tmp/validation.log

      - name: Format generated files
        run: |
          echo "VALIDATION_STAGE=formatting" >> "$GITHUB_ENV"
          set -o pipefail
          npm run format 2>&1 | tee /tmp/validation.log

      - name: Validate formatting and types
        run: |
          echo "VALIDATION_STAGE=lint and TypeScript" >> "$GITHUB_ENV"
          set -o pipefail
          (npm run format:check && npm run typecheck) 2>&1 | tee /tmp/validation.log

      - name: Run unit tests
        run: |
          echo "VALIDATION_STAGE=unit tests" >> "$GITHUB_ENV"
          set -o pipefail
          npm run test:unit 2>&1 | tee /tmp/validation.log

      - name: Build production bundle
        run: |
          echo "VALIDATION_STAGE=production build" >> "$GITHUB_ENV"
          set -o pipefail
          npm run build 2>&1 | tee /tmp/validation.log
          git checkout -- tsconfig.json

      - name: Publish validated refactor to main
        shell: bash
        run: |
          echo "VALIDATION_STAGE=publishing to main" >> "$GITHUB_ENV"
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git rm .github/workflows/refactor-canvas-session-state.yml
          git rm scripts/refactor-canvas-session-state.py
          git add \
            components/assistant-ui/thread-graph-flow/thread-graph-flow.tsx \
            components/assistant-ui/thread-graph-flow/use-canvas-session-state.ts \
            tests/canvas-session-state.test.ts
          git diff --check
          git commit -m "refactor: extract canvas session state [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report validation success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Validation passed and the Canvas session state refactor was published to main."

      - name: Report validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "Validation failed during **${VALIDATION_STAGE:-preflight}**. No functional refactor was published."
            echo
            echo "<details><summary>Log tail</summary>"
            echo
            echo '```text'
            tail -c 7000 /tmp/validation.log 2>/dev/null || echo "No command log was captured."
            echo '```'
            echo "</details>"
          } > /tmp/validation-comment.md
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/validation-comment.md
