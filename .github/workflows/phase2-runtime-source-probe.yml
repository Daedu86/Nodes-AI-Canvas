name: Phase 2 runtime source probe

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase2-runtime-source-probe.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --fund=false
      - name: Capture exact runtime sources and npm metadata
        run: |
          {
            echo '=== npm view current/latest ==='
            npm view @assistant-ui/react-ai-sdk version versions dependencies peerDependencies dist-tags --json || true
            echo
            echo '=== current package metadata ==='
            cat node_modules/@assistant-ui/react-ai-sdk/package.json
            echo
            echo '=== useChatRuntime.ts ==='
            sed -n '1,320p' node_modules/@assistant-ui/react-ai-sdk/src/ui/use-chat/useChatRuntime.ts
            echo
            echo '=== thread-runtime.ts state/api ==='
            sed -n '120,310p' node_modules/@assistant-ui/core/src/runtime/api/thread-runtime.ts
            sed -n '390,440p' node_modules/@assistant-ui/core/src/runtime/api/thread-runtime.ts
            echo
            echo '=== external store core messages/export ==='
            sed -n '50,180p' node_modules/@assistant-ui/core/src/runtimes/external-store/external-store-thread-runtime-core.ts
            sed -n '470,550p' node_modules/@assistant-ui/core/src/runtimes/external-store/external-store-thread-runtime-core.ts
            echo
            echo '=== AI SDK converter/history files ==='
            find node_modules/@assistant-ui/react-ai-sdk/src -type f -maxdepth 6 -print | sort
            grep -R -n -E 'convert.*Message|UIMessage|messages:|onFinish|setMessages|MessageRepository|branch|parentId' node_modules/@assistant-ui/react-ai-sdk/src | head -500 || true
          } > phase2-runtime-source.txt
      - name: Publish source probe and remove workflow
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/phase2-runtime-source-probe.yml
          git add phase2-runtime-source.txt
          git commit -m "test: inspect AI SDK runtime source compatibility [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
