name: Apply repository hardening once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/repository-hardening-once.yml"

permissions:
  contents: write

concurrency:
  group: repository-hardening-once
  cancel-in-progress: false

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Apply hardening
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          package_path = Path("package.json")
          package = json.loads(package_path.read_text())
          package["scripts"]["typecheck:e2e"] = "tsc --noEmit -p tsconfig.e2e.json"
          package["scripts"]["check"] = (
              "npm run format:check && npm run typecheck && npm run typecheck:e2e "
              "&& npm run test:coverage && npm run test:critical-coverage"
          )
          package_path.write_text(json.dumps(package, indent=2) + "\n")

          Path("tsconfig.e2e.json").write_text(
              json.dumps(
                  {
                      "extends": "./tsconfig.json",
                      "compilerOptions": {
                          "incremental": False,
                          "plugins": [],
                          "types": ["node", "@playwright/test"],
                      },
                      "include": ["playwright.config.ts", "tests/e2e/**/*.ts"],
                      "exclude": ["node_modules"],
                  },
                  indent=2,
              )
              + "\n"
          )

          ci_path = Path(".github/workflows/ci.yml")
          ci = ci_path.read_text()
          ci, count = re.subn(
              r"(?m)^(      - name: )Type check\n(        run: npm run typecheck)$",
              r"\1Application type check\n\2\n      - name: End-to-end type check\n        run: npm run typecheck:e2e",
              ci,
              count=1,
          )
          if count != 1:
              raise SystemExit("CI type-check marker not found")
          ci = ci.replace(" --pass-with-no-tests", "")
          ci_path.write_text(ci)

          helper_pattern = re.compile(
              r"""(?P<indent>\s*)const \{ body, \.\.\.rest \} = init \?\? \{\};\n"""
              r"""(?P=indent)const response = await page\.request\.fetch\(url, \{\n"""
              r"""(?P=indent)  headers: \{\n"""
              r"""(?P=indent)    "Content-Type": "application/json",\n"""
              r"""(?P=indent)    \.\.\.\(rest\.headers \?\? \{\}\),\n"""
              r"""(?P=indent)  \},\n"""
              r"""(?P=indent)  \.\.\.rest,\n"""
          )
          helper_replacement = (
              r"""\g<indent>const { body, headers, ...rest } = init ?? {};\n"""
              r"""\g<indent>const normalizedHeaders = headers\n"""
              r"""\g<indent>  ? Object.fromEntries(new Headers(headers).entries())\n"""
              r"""\g<indent>  : {};\n"""
              r"""\g<indent>const response = await page.request.fetch(url, {\n"""
              r"""\g<indent>  ...rest,\n"""
              r"""\g<indent>  headers: {\n"""
              r"""\g<indent>    "Content-Type": "application/json",\n"""
              r"""\g<indent>    ...normalizedHeaders,\n"""
              r"""\g<indent>  },\n"""
          )
          replacements = 0
          for test_path in Path("tests/e2e").rglob("*.ts"):
              source = test_path.read_text()
              patched, count = helper_pattern.subn(helper_replacement, source)
              if count:
                  test_path.write_text(patched)
                  replacements += count
          if replacements == 0:
              raise SystemExit("No E2E request helper was patched")

          selector_path = Path("components/assistant-ui/model-selector.tsx")
          selector = selector_path.read_text()
          if 'aria-label="Model"' not in selector:
              selector, count = re.subn(
                  r'(<select\s*\n)(\s*)(className=)',
                  r'\1\2aria-label="Model"\n\2\3',
                  selector,
                  count=1,
              )
              if count != 1:
                  raise SystemExit("Model selector marker not found")
              selector_path.write_text(selector)

          artifacts_path = Path("lib/session-artifacts.ts")
          artifacts = artifacts_path.read_text()
          artifacts, count = re.subn(
              r"""const makeRevisionId = \(\) =>\n"""
              r"""  typeof crypto !== "undefined" && "randomUUID" in crypto\n"""
              r"""    \? crypto\.randomUUID\(\)\n"""
              r"""    : `revision-\$\{Date\.now\(\)\}-\$\{Math\.random\(\)\.toString\(36\)\.slice\(2, 10\)\}`;""",
              "const makeRevisionId = () => crypto.randomUUID();",
              artifacts,
              count=1,
          )
          if count != 1:
              raise SystemExit("Revision ID marker not found")

          table_marker = "const markdownTableFromRows = (rows: Array<Record<string, unknown>>) => {"
          if table_marker not in artifacts:
              raise SystemExit("Markdown table function marker not found")
          escape_helper = """const escapeMarkdownTableCell = (value: unknown) =>
            String(value ?? "")
              .replace(/\\\\/g, "\\\\\\\\")
              .replace(/\\|/g, "\\\\|")
              .replace(/\\s+/g, " ")
              .trim();

          """
          artifacts = artifacts.replace(table_marker, escape_helper + table_marker, 1)
          artifacts, count = re.subn(
              r"""  const escape = \(value: unknown\) =>\n"""
              r"""    String\(value \?\? ""\)\n"""
              r"""      \.replace\(/\\\\/g, "\\\\\\\\"\)\n"""
              r"""      \.replace\(/\\\|/g, "\\\\\|"\)\n"""
              r"""      \.replace\(/\\s\+/g, " "\)\n"""
              r"""      \.trim\(\);\n""",
              "",
              artifacts,
              count=1,
          )
          if count != 1:
              raise SystemExit("Inline Markdown escape marker not found")
          artifacts = artifacts.replace("columns.map(escape)", "columns.map(escapeMarkdownTableCell)")
          artifacts = artifacts.replace("escape(row[column])", "escapeMarkdownTableCell(row[column])")
          artifacts = artifacts.replace(
              '`| ${header.join(" | ")} |`',
              '`| ${header.map(escapeMarkdownTableCell).join(" | ")} |`',
              1,
          )
          artifacts = artifacts.replace(
              '`| ${row.join(" | ")} |`',
              '`| ${row.map(escapeMarkdownTableCell).join(" | ")} |`',
              1,
          )
          artifacts_path.write_text(artifacts)

          Path("tests/session-artifacts-hardening.test.ts").write_text(
              """import { describe, expect, it } from "vitest";
          import {
            appendArtifactRevision,
            parseArtifactOutput,
            type SessionArtifact,
          } from "@/lib/session-artifacts";

          const artifact: SessionArtifact = {
            id: "artifact-1",
            title: "Draft",
            artifactType: "text",
            semanticType: "draft",
            content: "before",
            revisions: [],
            createdAt: "2026-01-01T00:00:00.000Z",
            updatedAt: "2026-01-01T00:00:00.000Z",
          };

          describe("session artifact hardening", () => {
            it("uses a cryptographically secure UUID for revision identifiers", () => {
              const updated = appendArtifactRevision(artifact, {
                content: "after",
                origin: "manual",
                author: "user",
              });

              expect(updated.revisions?.[0]?.id).toMatch(
                /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i,
              );
            });

            it("escapes Markdown-sensitive content in delimited tables", () => {
              expect(parseArtifactOutput("table", "name,note\\nalpha,a|b\\nbeta,c\\\\d")).toBe(
                "| name | note |\\n| --- | --- |\\n| alpha | a\\\\|b |\\n| beta | c\\\\\\\\d |",
              );
            });
          });
          """
          )

          for path in [
              Path(".github/workflows/phase3-hardening.yml"),
              Path("scripts/apply-phase3-hardening.mjs"),
              Path("phase3-trigger.txt"),
              Path("phase3-current-status.json"),
          ]:
              path.unlink(missing_ok=True)

          for path in Path(".").glob("phase3*.json"):
              path.unlink(missing_ok=True)

          Path(".github/workflows/repository-hardening-once.yml").unlink()
          PY

      - name: Format and validate
        run: |
          npm run format
          npm run check
          npm run build:budget

      - name: Publish validated hardening to main
        shell: bash
        run: |
          git restore --worktree -- tsconfig.json
          rm -f next-env.d.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: harden repository workflow and security"
          git pull --rebase origin main
          git push origin HEAD:main
