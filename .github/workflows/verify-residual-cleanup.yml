name: Publish verified residual cleanup

on:
  push:

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply verified cleanup
        run: |
          python scripts/apply-feature-cleanup.py
          rm scripts/apply-feature-cleanup.py .github/workflows/verify-residual-cleanup.yml

      - name: Verify functional references are gone
        shell: bash
        run: |
          matches="$(git grep -n -i brief -- . || true)"
          unexpected="$(printf '%s\n' "$matches" | grep -vE 'components/workspace/project-wiki\.tsx:.*BriefcaseBusiness|tests/(chat-route|llm-helpers|title-route)\.test\.ts:.*brief\.pdf' || true)"
          if [ -n "$unexpected" ]; then
            printf '%s\n' "$unexpected"
            exit 1
          fi

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: remove residual Brief references"
          git push origin HEAD:codex/remove-brief-feature-final
