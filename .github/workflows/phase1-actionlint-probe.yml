name: Lint phase 1 workflow

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase1-actionlint-probe.yml

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Lint phase 1 workflow
        shell: bash
        run: |
          set +e
          "$(go env GOPATH)/bin/actionlint" \
            -oneline \
            .github/workflows/phase1-chat-e2e-fix.yml \
            > phase1-actionlint.txt 2>&1
          status=$?
          echo "exit_status=$status" >> phase1-actionlint.txt
          cat phase1-actionlint.txt
          exit 0

      - name: Publish diagnostics and remove probe
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/phase1-actionlint-probe.yml
          git add phase1-actionlint.txt
          git commit -m "ci: record phase 1 actionlint result [skip vercel]"
          git push origin HEAD:main
