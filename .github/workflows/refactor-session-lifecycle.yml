name: Refactor session lifecycle

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: refactor-session-lifecycle
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  refactor:
    if: github.event.issue.title == '[automation] Refactor Session Lifecycle'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Report validation start
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Session lifecycle validation started."

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Apply extraction
        run: |
          echo "VALIDATION_STAGE=extraction" >> "$GITHUB_ENV"
          set -o pipefail
          python scripts/refactor-session-lifecycle.py 2>&1 | tee /tmp/validation.log
          python <<'PY'
          from pathlib import Path

          provider_path = Path("components/context/persisted-sessions.tsx")
          provider = provider_path.read_text(encoding="utf-8")
          start_markers = [
              "  const refreshSessions = React.useCallback(async () => {\n",
              "  React.useEffect(() => {\n    void bootstrap();\n",
              "  const selectSession = React.useCallback(async (sessionId: string) => {\n",
          ]
          starts = [provider.find(marker) for marker in start_markers]
          starts = [start for start in starts if start >= 0]
          end_marker = "  const renameSession = React.useCallback(async (sessionId: string, title: string | null) => {\n"
          end = provider.find(end_marker)
          if not starts or end < 0:
              raise RuntimeError("Could not locate the remaining provider lifecycle boundary.")
          start = min(starts)
          if start >= end:
              raise RuntimeError("Invalid provider lifecycle extraction boundary.")
          provider = provider[:start] + provider[end:]
          provider_path.write_text(provider, encoding="utf-8")

          hook_path = Path("components/context/use-session-lifecycle.ts")
          hook = hook_path.read_text(encoding="utf-8")
          fallback_old = (
              "      } catch {\n"
              "        setSessions((current) =>\n"
              "          filterRemovedSessions(current, [sessionId]),\n"
              "        );\n"
              "      }\n"
          )
          fallback_new = (
              "      } catch {\n"
              "        remaining = filterRemovedSessions(sessionsRef.current, [sessionId]);\n"
              "        setSessions(remaining);\n"
              "      }\n"
          )
          if hook.count(fallback_old) != 1:
              raise RuntimeError("Could not preserve fallback session-list recovery.")
          hook = hook.replace(fallback_old, fallback_new, 1)

          dependencies_old = (
              "      refreshSessions,\n"
              "      setActiveSession,\n"
              "      setSessions,\n"
              "      userId,\n"
          )
          dependencies_new = (
              "      refreshSessions,\n"
              "      sessionsRef,\n"
              "      setActiveSession,\n"
              "      setSessions,\n"
              "      userId,\n"
          )
          if hook.count(dependencies_old) != 1:
              raise RuntimeError("Could not declare the session recovery ref dependency.")
          hook = hook.replace(dependencies_old, dependencies_new, 1)
          hook_path.write_text(hook, encoding="utf-8")
          print("Lifecycle cleanup, fallback recovery, and dependencies applied.")
          PY

      - name: Install dependencies
        run: |
          echo "VALIDATION_STAGE=dependency installation" >> "$GITHUB_ENV"
          set -o pipefail
          npm ci --no-audit --fund=false 2>&1 | tee /tmp/validation.log

      - name: Format generated files
        run: |
          echo "VALIDATION_STAGE=formatting" >> "$GITHUB_ENV"
          set -o pipefail
          npm run format 2>&1 | tee /tmp/validation.log

      - name: Validate formatting and types
        run: |
          echo "VALIDATION_STAGE=lint and TypeScript" >> "$GITHUB_ENV"
          set -o pipefail
          (npm run format:check && npm run typecheck) 2>&1 | tee /tmp/validation.log

      - name: Run unit tests
        run: |
          echo "VALIDATION_STAGE=unit tests" >> "$GITHUB_ENV"
          set -o pipefail
          npm run test:unit 2>&1 | tee /tmp/validation.log

      - name: Build production bundle
        run: |
          echo "VALIDATION_STAGE=production build" >> "$GITHUB_ENV"
          set -o pipefail
          npm run build 2>&1 | tee /tmp/validation.log
          git checkout -- tsconfig.json

      - name: Publish validated refactor to main
        shell: bash
        run: |
          echo "VALIDATION_STAGE=publishing to main" >> "$GITHUB_ENV"
          set -euo pipefail
          exec > >(tee /tmp/publish.log) 2>&1
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git rm .github/workflows/refactor-session-lifecycle.yml
          git rm scripts/refactor-session-lifecycle.py
          git add \
            components/context/persisted-sessions.tsx \
            components/context/use-session-lifecycle.ts \
            tests/session-lifecycle.test.ts
          git diff --check
          git commit -m "refactor: extract session lifecycle [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report validation success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Validation passed and the session lifecycle refactor was published to main."

      - name: Report validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "Validation failed during **${VALIDATION_STAGE:-preflight}**. No functional refactor was published."
            echo
            echo "<details><summary>Relevant log tail</summary>"
            echo
            echo '```text'
            if [[ -s /tmp/publish.log ]]; then
              tail -c 12000 /tmp/publish.log
            else
              tail -c 12000 /tmp/validation.log 2>/dev/null || echo "No command log was captured."
            fi
            echo '```'
            echo "</details>"
          } > /tmp/validation-comment.md
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/validation-comment.md
