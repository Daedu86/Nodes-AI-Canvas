name: Rebuild platform migration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  rebuild:
    if: github.head_ref == 'fix/platform-tooling-migration' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/platform-tooling-migration
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm install next@16.2.10 eslint@10.7.0 eslint-config-next@16.2.10 --save-exact
      - run: npm install -D typescript@6.0.3 @typescript-eslint/parser@8.63.0 @typescript-eslint/eslint-plugin@8.63.0 --save-exact
      - name: Commit rebuilt platform graph
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json package-lock.json
          git commit -m "deps: rebuild platform tooling migration" || exit 0
          git push origin HEAD:fix/platform-tooling-migration
