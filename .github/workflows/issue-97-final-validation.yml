name: Issue 97 final validation

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/issue-97-final-validation.yml

permissions:
  actions: read
  checks: read
  contents: write
  security-events: read

concurrency:
  group: issue-97-final-validation
  cancel-in-progress: true

jobs:
  validate:
    name: Collect required main checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Wait for CI and CodeQL, then record the result
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          TARGET_REPOSITORY: ${{ github.repository }}
          TARGET_RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p .github/validation
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');

          const repository = process.env.TARGET_REPOSITORY;
          const sha = process.env.TARGET_SHA;
          const requiredChecks = [
            'Quality',
            'Unit and coverage',
            'Production build and bundle budget',
            'Canvas performance budget',
            'Dependency audit',
            'Accessibility E2E (chromium)',
            'End-to-end (shard 1/4)',
            'End-to-end (shard 2/4)',
            'End-to-end (shard 3/4)',
            'End-to-end (shard 4/4)',
            'Analyze JavaScript and TypeScript',
          ];

          const sleep = (milliseconds) => Atomics.wait(new Int32Array(new SharedArrayBuffer(4)), 0, 0, milliseconds);
          const ghJson = (endpoint) => JSON.parse(execFileSync(
            'gh',
            ['api', '-H', 'Accept: application/vnd.github+json', endpoint],
            { encoding: 'utf8' },
          ));

          let selectedChecks = [];
          for (let attempt = 1; attempt <= 120; attempt += 1) {
            const payload = ghJson(`repos/${repository}/commits/${sha}/check-runs?per_page=100`);
            const latestByName = new Map();
            for (const check of payload.check_runs ?? []) {
              const existing = latestByName.get(check.name);
              if (!existing || String(check.started_at ?? '') > String(existing.started_at ?? '')) {
                latestByName.set(check.name, check);
              }
            }
            selectedChecks = requiredChecks.flatMap((name) => {
              const check = latestByName.get(name);
              return check ? [{
                name,
                status: check.status,
                conclusion: check.conclusion,
                detailsUrl: check.details_url,
                startedAt: check.started_at,
                completedAt: check.completed_at,
              }] : [];
            });
            const missing = requiredChecks.filter((name) => !latestByName.has(name));
            const pending = selectedChecks.filter((check) => check.status !== 'completed');
            if (missing.length === 0 && pending.length === 0) break;
            console.log(`Attempt ${attempt}: waiting; missing=${missing.join(', ') || 'none'}; pending=${pending.map((check) => check.name).join(', ') || 'none'}`);
            sleep(15_000);
          }

          const observedNames = new Set(selectedChecks.map((check) => check.name));
          const missingChecks = requiredChecks.filter((name) => !observedNames.has(name));
          const incompleteChecks = selectedChecks.filter((check) => check.status !== 'completed');
          const unsuccessfulChecks = selectedChecks.filter((check) => check.conclusion !== 'success');

          let matchingAnalyses = [];
          let analysisError = null;
          for (let attempt = 1; attempt <= 12; attempt += 1) {
            try {
              const analyses = ghJson(`repos/${repository}/code-scanning/analyses?ref=refs/heads/main&per_page=100`);
              matchingAnalyses = (analyses ?? []).filter((analysis) =>
                analysis.commit_sha === sha && analysis.tool?.name === 'CodeQL',
              );
              if (matchingAnalyses.length > 0) break;
            } catch (error) {
              analysisError = error instanceof Error ? error.message : String(error);
            }
            sleep(10_000);
          }

          const codeqlResults = matchingAnalyses.reduce(
            (total, analysis) => total + Number(analysis.results_count ?? 0),
            0,
          );
          const codeqlErrors = matchingAnalyses
            .map((analysis) => analysis.error)
            .filter((error) => typeof error === 'string' && error.length > 0);
          const passed =
            missingChecks.length === 0 &&
            incompleteChecks.length === 0 &&
            unsuccessfulChecks.length === 0 &&
            matchingAnalyses.length > 0 &&
            !analysisError &&
            codeqlErrors.length === 0 &&
            codeqlResults === 0;

          const report = {
            completedAt: new Date().toISOString(),
            validatedSha: sha,
            workflowRunId: process.env.TARGET_RUN_ID,
            requiredChecks: selectedChecks,
            missingChecks,
            incompleteChecks: incompleteChecks.map((check) => check.name),
            unsuccessfulChecks: unsuccessfulChecks.map(({ name, conclusion }) => ({ name, conclusion })),
            codeql: {
              analyses: matchingAnalyses.map((analysis) => ({
                id: analysis.id,
                category: analysis.category,
                createdAt: analysis.created_at,
                resultsCount: analysis.results_count,
                rulesCount: analysis.rules_count,
                error: analysis.error,
              })),
              resultsCount: codeqlResults,
              errors: codeqlErrors,
              apiError: analysisError,
            },
            passed,
          };

          fs.writeFileSync(
            '.github/validation/issue-97-result.json',
            `${JSON.stringify(report, null, 2)}\n`,
          );
          console.log(JSON.stringify(report, null, 2));
          NODE

      - name: Commit validation report to main
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/validation/issue-97-result.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: record issue 97 validation result [skip ci] [skip vercel]"
          git push origin HEAD:main

      - name: Enforce successful validation
        if: always()
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const report = JSON.parse(fs.readFileSync('.github/validation/issue-97-result.json', 'utf8'));
          if (!report.passed) {
            console.error('Final hardening validation failed.');
            console.error(JSON.stringify(report, null, 2));
            process.exit(1);
          }
          NODE
