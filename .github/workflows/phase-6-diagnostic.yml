name: Phase 6 diagnostic

on:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run lint and publish summaries
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set +e
          npx eslint . --format json > lint.json 2> lint.stderr
          code=$?
          if [ "$code" -eq 0 ]; then
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=success -f context='diag/lint/ok' -f description='Lint passed'
          else
            node <<'NODE' > lint-summary.txt
          const fs = require('node:fs');
          const path = require('node:path');
          const results = JSON.parse(fs.readFileSync('lint.json', 'utf8'));
          for (const result of results) {
            for (const message of result.messages.filter((entry) => entry.severity === 2)) {
              const file = path.relative(process.cwd(), result.filePath);
              console.log(`${file}:${message.line ?? 0}:${message.column ?? 0}:${message.ruleId ?? 'unknown'}:${message.message}`);
            }
          }
          NODE
            if [ ! -s lint-summary.txt ]; then tail -5 lint.stderr > lint-summary.txt; fi
            index=1
            while IFS= read -r line && [ "$index" -le 5 ]; do
              encoded=$(printf '%s' "$line" | cut -c1-60 | base64 -w0 | tr '+/' '-_' | tr -d '=')
              gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=failure -f context="diag/lint${index}/${encoded}" -f description="Lint failed (${code})"
              index=$((index + 1))
            done < lint-summary.txt
          fi
      - name: Run typecheck and publish summaries
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          if [ "$code" -eq 0 ]; then
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=success -f context='diag/typecheck/ok' -f description='Typecheck passed'
          else
            grep -E 'error TS[0-9]+:' typecheck.log | head -5 > type-summary.txt
            if [ ! -s type-summary.txt ]; then tail -5 typecheck.log > type-summary.txt; fi
            index=1
            while IFS= read -r line && [ "$index" -le 5 ]; do
              encoded=$(printf '%s' "$line" | cut -c1-60 | base64 -w0 | tr '+/' '-_' | tr -d '=')
              gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=failure -f context="diag/type${index}/${encoded}" -f description="Typecheck failed (${code})"
              index=$((index + 1))
            done < type-summary.txt
          fi
