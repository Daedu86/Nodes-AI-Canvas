name: Fix branch lineage context

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-branch-lineage-context.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Patch missing-history fallback and add regression test
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          request_path = Path('lib/server/chat/request.ts')
          request_text = request_path.read_text()
          old = '        : selectMessagesForHistoryMode(messages, historyMode),'
          new = '        : selectMessagesForHistoryMode(messages, historyMode ?? "full"),'
          if old not in request_text:
              raise SystemExit('Expected request fallback line not found')
          request_path.write_text(request_text.replace(old, new, 1))

          test_path = Path('tests/chat-request.test.ts')
          test_text = test_path.read_text()
          marker = '  it("returns a structured error for malformed JSON", async () => {'
          if marker not in test_text:
              raise SystemExit('Expected chat request test marker not found')

          regression = '''  it("keeps the visible branch history when run config metadata is missing", () => {
            const parsed = chatRequestBodySchema.parse({
              messages: [
                {
                  id: "user-letters",
                  role: "user",
                  parts: [{ type: "text", text: "dame 2 letras" }],
                },
                {
                  id: "assistant-letters",
                  role: "assistant",
                  parts: [{ type: "text", text: "ab" }],
                },
                {
                  id: "user-numbers",
                  role: "user",
                  parts: [{ type: "text", text: "ahora dame 2 numeros" }],
                },
                {
                  id: "assistant-numbers",
                  role: "assistant",
                  parts: [{ type: "text", text: "1 2" }],
                },
                {
                  id: "user-recall",
                  role: "user",
                  parts: [{ type: "text", text: "te pedi dos letras cuales fueron" }],
                },
              ],
              model: "openrouter/free",
              provider: "openrouter",
            });

            const prepared = prepareChatRequest(parsed);
            expect(prepared.historyMode).toBeUndefined();
            expect(prepared.messagesToSend.map((message) => [message.role, message.content])).toEqual([
              ["user", "dame 2 letras"],
              ["assistant", "ab"],
              ["user", "ahora dame 2 numeros"],
              ["assistant", "1 2"],
              ["user", "te pedi dos letras cuales fueron"],
            ]);
          });

'''
          test_path.write_text(test_text.replace(marker, regression + marker, 1))
          PY

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Run focused regression tests
        run: npx vitest run tests/chat-request.test.ts

      - name: Commit fix directly to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/fix-branch-lineage-context.yml
          git add lib/server/chat/request.ts tests/chat-request.test.ts
          git commit -m "fix(chat): preserve visible branch history when run config is missing"
          git pull --rebase origin main
          git push origin HEAD:main
