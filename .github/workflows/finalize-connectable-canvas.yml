name: Finalize connectable block canvas

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/finalize-connectable-canvas.yml

permissions:
  contents: write

concurrency:
  group: finalize-connectable-block-canvas
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Integrate and validate
        shell: bash
        run: |
          set -o pipefail
          {
            set -eux

            restore_blob() {
              target="$1"
              sha="$2"
              mkdir -p "$(dirname "$target")"
              gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" --jq '.content' \
                | tr -d '\n' \
                | base64 --decode > "$target"
              echo "restored $target $sha"
            }

            restore_blob "lib/session-artifacts.ts" "1e926596972cfb704878c7a47e0343d4b1ac8e66"
            restore_blob "components/context/graph-branch-intent.tsx" "df26e4d6cc36041445fa1cc827a6c73adcdb476f"
            restore_blob "lib/thread-branching-runtime.ts" "a786e7289476ea6fd9733f9cafd20bdf4bb1a430"
            restore_blob "components/assistant-ui/thread-graph-flow/block-library.tsx" "efea3484d643af7ddc70a42adb71fedd3542ea7e"
            restore_blob "components/assistant-ui/thread-graph-flow/thread-graph-flow-types.ts" "180ee3de09356029f4a6269d415229df72eb471d"
            restore_blob "components/assistant-ui/thread-graph-flow/thread-graph-edge.tsx" "aa28aa6f8fc688aedb8fc036c12c99fed5b67c37"
            restore_blob "components/assistant-ui/thread-graph-flow/artifact-presentation.ts" "f81748d8fa21a6641d84f4cf42e2b9acb6673fe8"
            restore_blob "components/assistant-ui/thread-graph-flow/thread-graph-layout.ts" "e64bb41193861ca39ced272bea484c12ebd5e7d2"
            restore_blob "components/assistant-ui/thread-graph-flow/canvas-prompt-node.tsx" "6ebe5c308669c89d4da593350000628ae28b3d58"
            restore_blob "tests/session-artifacts.test.ts" "8af69134e10a4324378a7fbe2707dd7161cd7732"
            restore_blob "tests/block-library.test.tsx" "f341558d55e56573edf9aec24da45d91c4153c2a"

            cp .github/canvas-payload/provider.b64 components/context/session-artifacts.tsx
            cp .github/canvas-payload/artifact-node.b64 components/assistant-ui/thread-graph-flow/artifact-node.tsx
            cat .github/canvas-payload/patch-thread-flow.part*.b64 > /tmp/patch-thread-flow.py
            sed -i '/if "quickSemanticPresets" in text or "semanticArtifactPresets" in text:/,+1d' /tmp/patch-thread-flow.py
            python /tmp/patch-thread-flow.py
            python .github/canvas-payload/fix-canvas-validation.py

            rm -rf .github/canvas-payload

            npm ci
            npx vitest run tests/session-artifacts.test.ts tests/block-library.test.tsx
            npm test
            npm run build

            if grep -R --line-number --fixed-strings "Artifact templates" components app lib; then
              echo "Legacy artifact template UI still exists."
              exit 1
            fi
          } 2>&1 | tee /tmp/canvas-build.log

      - name: Publish final commit
        shell: bash
        run: |
          cat > vercel.json <<'JSON'
          {
            "framework": "nextjs"
          }
          JSON
          rm -rf .github/canvas-payload
          rm -f .github/workflows/finalize-connectable-canvas.yml
          rm -f .github/canvas-build-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement connectable block canvas"
          git push origin HEAD:main

      - name: Record validation failure
        if: failure()
        shell: bash
        run: |
          test -f /tmp/canvas-build.log || echo "Validation failed before logs were initialized." > /tmp/canvas-build.log
          cp /tmp/canvas-build.log .github/canvas-build-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/canvas-build-failure.log
          git commit -m "chore: record connectable canvas validation failure [skip ci]" || true
          git push origin HEAD:main || true
