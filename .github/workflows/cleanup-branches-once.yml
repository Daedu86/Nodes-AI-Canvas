name: Cleanup obsolete branches

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/cleanup-branches-once.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Delete every remote branch except main
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t branches < <(
            git ls-remote --heads origin \
              | awk '{print $2}' \
              | sed 's#refs/heads/##' \
              | sort
          )

          for branch in "${branches[@]}"; do
            if [[ "$branch" == "main" ]]; then
              continue
            fi
            echo "Deleting remote branch: $branch"
            git push origin --delete "$branch"
          done

          mapfile -t remaining < <(
            git ls-remote --heads origin \
              | awk '{print $2}' \
              | sed 's#refs/heads/##' \
              | grep -v '^main$' || true
          )

          if (( ${#remaining[@]} > 0 )); then
            printf 'Branches still present:\n%s\n' "${remaining[*]}"
            exit 1
          fi

          echo "Verified: main is the only remote branch."

      - name: Remove this one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/cleanup-branches-once.yml
          git commit -m "chore: remove one-time branch cleanup workflow"
          git push origin HEAD:main
