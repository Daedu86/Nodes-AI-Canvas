name: Inspect accessibility contrast source

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  inspect:
    if: github.event.issue.title == '[automation] Inspect Accessibility Contrast Source'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
      - name: Inspect source
        shell: bash
        run: |
          {
            echo '## Contrast source matches'
            echo
            echo '```text'
            grep -RInE '#0f766e|#64748b|#2563eb|#db2777|Add .* block' components lib app 2>/dev/null | head -n 300 || true
            echo '```'
            for file in $(grep -RIlE '#0f766e|#64748b|#2563eb|#db2777|Add .* block' components lib app 2>/dev/null | head -n 20); do
              echo
              echo "### $file"
              echo '```tsx'
              sed -n '1,260p' "$file"
              echo '```'
            done
          } > /tmp/contrast-source.md
      - name: Report source
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/contrast-source.md
