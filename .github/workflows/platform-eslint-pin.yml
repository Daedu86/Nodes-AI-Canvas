name: Pin supported ESLint

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  pin:
    if: github.head_ref == 'fix/platform-tooling-migration' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/platform-tooling-migration
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm install -D eslint@9.39.4 --save-exact
      - name: Commit supported ESLint version
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json package-lock.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "deps: pin ESLint 9.39.4 for parser compatibility"
          git push origin HEAD:fix/platform-tooling-migration
