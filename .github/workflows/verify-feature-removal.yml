name: Verify feature removal

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect residual feature references
        id: residuals
        continue-on-error: true
        shell: bash
        run: |
          pattern="$(printf '\142\162\151\145\146')"
          git grep -n -i "$pattern" -- . > residual-references.txt || true
          test ! -s residual-references.txt

      - name: Upload residual reference scan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: residual-reference-scan
          path: residual-references.txt
          if-no-files-found: error

      - name: Enforce residual reference scan
        if: steps.residuals.outcome == 'failure'
        run: exit 1

      - name: Run unit tests
        run: npm test

      - name: Build production application
        run: npm run build
