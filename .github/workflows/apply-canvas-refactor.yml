name: Apply canvas refactor

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-canvas-refactor
  cancel-in-progress: true

jobs:
  apply:
    if: contains(github.event.head_commit.message, '[canvas-refactor-staging]')
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Apply, verify, and finalize
        shell: bash
        run: |
          set -Eeuo pipefail
          LOG=/tmp/canvas-refactor-validation.log
          exec > >(tee -a "$LOG") 2>&1

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          record_failure() {
            status=$?
            trap - ERR
            echo "Validation failed with exit code $status"
            git reset --hard HEAD
            mkdir -p .github/canvas-refactor
            cp "$LOG" .github/canvas-refactor/last-failure.log
            git add .github/canvas-refactor/last-failure.log
            git commit -m "chore: record canvas refactor validation failure [skip vercel]"
            git push origin HEAD:main
            exit "$status"
          }
          trap record_failure ERR

          base64 --decode .github/canvas-refactor/apply.py.gz.b64 | gzip --decompress > /tmp/apply_canvas_refactor.py
          echo "be7e745d60e770868c1afed108fb8a4b81444ad4461738440ecc145205e81019  /tmp/apply_canvas_refactor.py" | sha256sum --check
          python3 -m py_compile /tmp/apply_canvas_refactor.py
          python3 /tmp/apply_canvas_refactor.py

          echo "Changed files:"
          git diff --stat
          echo "Main component lines:"
          wc -l components/assistant-ui/thread-graph-flow/thread-graph-flow.tsx

          npm ci
          npx eslint \
            components/assistant-ui/thread-graph-flow/thread-graph-flow.tsx \
            components/assistant-ui/thread-graph-flow/canvas-stage.tsx \
            components/assistant-ui/thread-graph-flow/canvas-upload-utils.ts \
            components/assistant-ui/thread-graph-flow/canvas-workspace-utils.tsx
          npm test
          npm run build
          npx playwright install --with-deps chromium
          npm run test:e2e -- --workers=1

          trap - ERR
          rm -rf .github/canvas-refactor
          rm -f .github/workflows/apply-canvas-refactor.yml
          cat > vercel.json <<'EOF'
          {
            "framework": "nextjs"
          }
          EOF
          git add -A
          git commit -m "refactor: split thread graph flow modules"
          git push origin HEAD:main
