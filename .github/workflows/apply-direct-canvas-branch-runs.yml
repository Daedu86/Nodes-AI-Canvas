name: Apply direct Canvas branch runs

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-direct-canvas-branch-runs.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.head_commit.message == 'chore: apply direct canvas branch run fix'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply direct branch transport patch
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          context_helper = r'''import type { ModelMessage } from "ai";

          export type CanvasRunContextScope = "parent" | "branch" | "tree";

          export type CanvasRunContextMessage = {
            id?: string;
            role: "system" | "user" | "assistant";
            content: string;
          };

          const MAX_FULL_TREE_CONTEXT_CHARS = 64 * 1024;
          const FULL_TREE_CONTEXT_INTRO =
            "The following messages come from the full conversation tree. They may belong to sibling branches, so treat them as reference context rather than one linear dialogue.";
          const FULL_TREE_TRUNCATION_MARKER =
            "\n\n[... middle of full tree context truncated to stay within model limits ...]\n\n";

          export const normalizeCanvasRunContextScope = (
            value: unknown,
          ): CanvasRunContextScope | null =>
            value === "parent" || value === "branch" || value === "tree" ? value : null;

          const normalizeContextMessages = (value: unknown): CanvasRunContextMessage[] =>
            Array.isArray(value)
              ? value.flatMap((entry) => {
                  if (!entry || typeof entry !== "object") return [];
                  const record = entry as Record<string, unknown>;
                  const role = record.role;
                  const content = record.content;
                  if (
                    (role !== "system" && role !== "user" && role !== "assistant") ||
                    typeof content !== "string" ||
                    !content.trim()
                  ) {
                    return [];
                  }
                  return [
                    {
                      ...(typeof record.id === "string" && record.id.trim()
                        ? { id: record.id.trim() }
                        : {}),
                      role,
                      content,
                    },
                  ];
                })
              : [];

          const clampFullTreeContext = (value: string) => {
            if (value.length <= MAX_FULL_TREE_CONTEXT_CHARS) return value;
            const availableChars =
              MAX_FULL_TREE_CONTEXT_CHARS - FULL_TREE_TRUNCATION_MARKER.length;
            const headChars = Math.floor(availableChars / 3);
            const tailChars = availableChars - headChars;
            return `${value.slice(0, headChars)}${FULL_TREE_TRUNCATION_MARKER}${value.slice(-tailChars)}`;
          };

          export function buildCanvasRunModelMessages({
            contextMessages,
            contextScope,
            promptText,
          }: {
            contextMessages?: unknown;
            contextScope?: CanvasRunContextScope | null;
            promptText: string;
          }): ModelMessage[] {
            const normalized = normalizeContextMessages(contextMessages);
            const trimmedPrompt = promptText.trim();
            const history =
              normalized.length > 0 &&
              normalized.at(-1)?.role === "user" &&
              normalized.at(-1)?.content.trim() === trimmedPrompt
                ? normalized.slice(0, -1)
                : normalized;

            if (contextScope === "tree" && history.length > 0) {
              const treeTranscript = history
                .map((message, index) => {
                  const idSuffix = message.id ? ` | id=${message.id}` : "";
                  return `[Tree node ${index + 1} | role=${message.role}${idSuffix}]\n${message.content}`;
                })
                .join("\n\n");
              return [
                {
                  role: "system",
                  content: clampFullTreeContext(
                    `${FULL_TREE_CONTEXT_INTRO}\n\n${treeTranscript}`,
                  ),
                },
                { role: "user", content: trimmedPrompt },
              ];
            }

            return [
              ...history.map(
                (message) =>
                  ({ role: message.role, content: message.content }) satisfies ModelMessage,
              ),
              { role: "user", content: trimmedPrompt },
            ];
          }
          '''
          Path("lib/server/canvas-run-context.ts").write_text(context_helper, encoding="utf-8")

          direct_helper = r'''import type { MessageFormatRepository } from "@assistant-ui/core";
          import type { UIMessage } from "ai";
          import type { ContextScope } from "@/components/context/graph-branch-intent";
          import type { ModelProvider } from "@/components/context/model-config";
          import type { LlmContextArtifact, SessionArtifactSemanticType } from "@/lib/session-artifacts";

          export type DirectBranchContextMessage = {
            id?: string;
            role: "system" | "user" | "assistant";
            content: string;
          };

          export type DirectBranchAppendMessage = {
            id: string;
            parentId: string | null;
            role: "user";
            content: Array<{ type: "text"; text: string }>;
            metadata: { custom: Record<string, unknown> };
          };

          export type CanvasBranchRunResponse = {
            error?: string | { message?: string };
            message?: string;
            modelId?: string;
            provider?: string;
            runId?: string | null;
            text?: string;
          };

          export const createCanvasBranchRunId = () =>
            typeof crypto !== "undefined" && "randomUUID" in crypto
              ? `canvas-branch-${crypto.randomUUID()}`
              : `canvas-branch-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;

          export const buildCanvasBranchRunRequest = ({
            contextArtifacts,
            contextMessages,
            contextScope,
            model,
            outputArtifactTypes,
            prompt,
            promptId,
            provider,
            runId,
          }: {
            contextArtifacts?: LlmContextArtifact[];
            contextMessages: DirectBranchContextMessage[];
            contextScope: ContextScope;
            model: string;
            outputArtifactTypes: Array<SessionArtifactSemanticType | null>;
            prompt: string;
            promptId: string;
            provider: ModelProvider;
            runId: string;
          }) => ({
            ...(contextArtifacts?.length ? { contextArtifacts } : {}),
            contextMessages,
            contextScope,
            model,
            outputArtifactTypes,
            prompt,
            promptId,
            provider,
            runId,
          });

          export function appendCompletedCanvasBranch({
            externalState,
            modelId,
            provider,
            responseId,
            responseText,
            userMessage,
          }: {
            externalState: MessageFormatRepository<UIMessage>;
            modelId: string;
            provider: string;
            responseId: string;
            responseText: string;
            userMessage: DirectBranchAppendMessage;
          }): MessageFormatRepository<UIMessage> {
            const userExternalMessage: UIMessage = {
              id: userMessage.id,
              role: "user",
              parts: userMessage.content.map((part) => ({
                type: "text" as const,
                text: part.text,
              })),
              metadata: userMessage.metadata,
            };
            const assistantExternalMessage: UIMessage = {
              id: responseId,
              role: "assistant",
              parts: [{ type: "text", text: responseText }],
              metadata: {
                custom: {
                  model: modelId,
                  provider,
                },
              },
            };
            const replacedIds = new Set([userMessage.id, responseId]);
            return {
              ...externalState,
              headId: responseId,
              messages: [
                ...externalState.messages.filter(
                  (entry) => !replacedIds.has(entry.message.id),
                ),
                { parentId: userMessage.parentId, message: userExternalMessage },
                { parentId: userMessage.id, message: assistantExternalMessage },
              ],
            };
          }
          '''
          Path("lib/canvas-branch-direct-run.ts").write_text(direct_helper, encoding="utf-8")

          route = Path("app/api/canvas-runs/route.ts")
          text = route.read_text(encoding="utf-8")
          text = text.replace(
            'import { buildContextArtifactsUserMessage } from "@/lib/llm/context-builder";\n',
            'import { buildContextArtifactsUserMessage } from "@/lib/llm/context-builder";\nimport {\n  buildCanvasRunModelMessages,\n  normalizeCanvasRunContextScope,\n} from "@/lib/server/canvas-run-context";\n',
          )
          text = text.replace(
            'type CanvasRunRequestBody = {\n  contextArtifacts?: unknown;\n',
            'type CanvasRunRequestBody = {\n  contextArtifacts?: unknown;\n  contextMessages?: unknown;\n  contextScope?: unknown;\n',
          )
          old = '''  const formattingInstruction = getOutputFormatInstruction(outputArtifactTypes);\n  const promptText = `${prompt}${formattingInstruction}`;\n  const requestOverrides = await getUserModelOverrides(guarded.user.id);'''
          new = '''  const formattingInstruction = getOutputFormatInstruction(outputArtifactTypes);\n  const promptText = `${prompt}${formattingInstruction}`;\n  const contextScope = normalizeCanvasRunContextScope(body.contextScope);\n  const scopedModelMessages = buildCanvasRunModelMessages({\n    contextMessages: body.contextMessages,\n    contextScope,\n    promptText,\n  });\n  const requestOverrides = await getUserModelOverrides(guarded.user.id);'''
          if old not in text:
            raise SystemExit("canvas-runs prompt block not found")
          text = text.replace(old, new)
          text = text.replace(
            '    historyMode: "canvas-independent",\n    messageCount: 1,',
            '    historyMode: contextScope ? `canvas-${contextScope}` : "canvas-independent",\n    messageCount: scopedModelMessages.length,',
          )
          text = text.replace(
            '    sentMessageCount: 1,',
            '    sentMessageCount: scopedModelMessages.length + (contextArtifacts.length > 0 ? 1 : 0),',
          )
          old_messages = '''      const messages: ModelMessage[] = [\n        ...(artifactContextMessage\n          ? [artifactContextMessage satisfies ModelMessage]\n          : []),\n        { role: "user", content: promptText },\n      ];'''
          new_messages = '''      const messages: ModelMessage[] = [\n        ...(artifactContextMessage\n          ? [artifactContextMessage satisfies ModelMessage]\n          : []),\n        ...scopedModelMessages,\n      ];'''
          if old_messages not in text:
            raise SystemExit("canvas-runs messages block not found")
          text = text.replace(old_messages, new_messages)
          route.write_text(text, encoding="utf-8")

          hook = Path("components/assistant-ui/thread-graph-flow/use-canvas-branch-submission.ts")
          text = hook.read_text(encoding="utf-8")
          text = text.replace(
            'import { executeBranchSpec } from "@/lib/thread-branching-runtime";\n',
            'import { buildBranchAppendMessage } from "@/lib/thread-branching-runtime";\nimport {\n  appendCompletedCanvasBranch,\n  buildCanvasBranchRunRequest,\n  createCanvasBranchRunId,\n  type CanvasBranchRunResponse,\n} from "@/lib/canvas-branch-direct-run";\n',
          )
          text = text.replace(
            '  persistSuspensionToken: SessionPersistSuspensionToken;\n  submissionToken: number;\n};',
            '  persistSuspensionToken: SessionPersistSuspensionToken;\n  submissionToken: number;\n  abortController?: AbortController;\n};',
          )
          text = text.replace(
            '      pendingOutputRunRef.current = null;\n      pendingDraftSubmissionRef.current = false;\n      clearResolveCompletedRunTimer();',
            '      pendingOutputRunRef.current = null;\n      pendingDraftSubmissionRef.current = false;\n      clearResolveCompletedRunTimer();\n      pending.abortController?.abort();',
            1,
          )

          old_block = '''        pendingDraftSubmissionRef.current = true;\n        pendingOutputRunRef.current = {\n          beforeMessageIds: new Set(\n            preSubmitSnapshot.messages.map((entry) => entry.message.id),\n          ),\n          sourcePromptId: CANVAS_PROMPT_DRAFT_NODE_ID,\n          artifactIds: [...activeDraft.outputArtifactIds],\n          preSubmitSnapshot,\n          preSubmitExternalState,\n          persistSuspensionToken,\n          submissionToken,\n        };\n        const executed = executeBranchSpec(runtime.threads.main, draftBranchSpec, {\n          contextScope: activeDraft.contextScope,\n          contextMessages: buildCanvasContextMessages(\n            canvasConversationNodesRef.current,\n            draftBranchSpec.parentId,\n            activeDraft.contextScope,\n            activeDraft.text,\n          ),\n          contextArtifacts:\n            draftContextArtifacts.length > 0\n              ? toLlmContextArtifacts(draftContextArtifacts)\n              : undefined,\n          contextNodeIds:\n            draftContextArtifacts.length > 0\n              ? draftContextArtifacts.map((artifact) => artifact.id)\n              : undefined,\n          historyMode: activeDraft.contextScope === "parent" ? "last" : "full",\n          inputArtifactIds: activeDraft.inputArtifactIds,\n          modelId,\n          outputArtifactIds: activeDraft.outputArtifactIds,\n          outputArtifactTypes: activeDraft.outputArtifactIds.map(\n            (artifactId) => artifactIndex.get(artifactId)?.semanticType ?? null,\n          ),\n          provider,\n          requireContextScope: true,\n          text: activeDraft.text,\n        });\n        if (!executed) {\n          const message = "Branch draft is empty. Add a prompt before creating the branch.";\n          rollbackPendingTransaction(submissionToken, message);\n          return;\n        }\n        submitted = true;'''

          new_block = '''        const contextMessages = buildCanvasContextMessages(\n          canvasConversationNodesRef.current,\n          draftBranchSpec.parentId,\n          activeDraft.contextScope,\n          activeDraft.text,\n        );\n        const contextArtifacts =\n          draftContextArtifacts.length > 0\n            ? toLlmContextArtifacts(draftContextArtifacts)\n            : undefined;\n        const outputArtifactTypes = activeDraft.outputArtifactIds.map(\n          (artifactId) => artifactIndex.get(artifactId)?.semanticType ?? null,\n        );\n        const appendMessage = buildBranchAppendMessage(draftBranchSpec, {\n          contextScope: activeDraft.contextScope,\n          contextMessages,\n          contextArtifacts,\n          contextNodeIds:\n            draftContextArtifacts.length > 0\n              ? draftContextArtifacts.map((artifact) => artifact.id)\n              : undefined,\n          historyMode: activeDraft.contextScope === "parent" ? "last" : "full",\n          inputArtifactIds: activeDraft.inputArtifactIds,\n          modelId,\n          outputArtifactIds: activeDraft.outputArtifactIds,\n          outputArtifactTypes,\n          provider,\n          requireContextScope: true,\n          text: activeDraft.text,\n        });\n        if (!appendMessage) {\n          resumeSessionPersist(persistSuspensionToken);\n          branchSubmissionLockRef.current = false;\n          pendingDraftSubmissionRef.current = false;\n          const message = "Branch draft is empty. Add a prompt before creating the branch.";\n          setCanvasDraftError(message);\n          setRequestError(message);\n          return;\n        }\n\n        const abortController = new AbortController();\n        pendingDraftSubmissionRef.current = true;\n        pendingOutputRunRef.current = {\n          beforeMessageIds: new Set(\n            preSubmitSnapshot.messages.map((entry) => entry.message.id),\n          ),\n          sourcePromptId: CANVAS_PROMPT_DRAFT_NODE_ID,\n          artifactIds: [...activeDraft.outputArtifactIds],\n          preSubmitSnapshot,\n          preSubmitExternalState,\n          persistSuspensionToken,\n          submissionToken,\n          abortController,\n        };\n        submitted = true;\n\n        const runId = createCanvasBranchRunId();\n        const response = await fetch("/api/canvas-runs", {\n          method: "POST",\n          headers: { "Content-Type": "application/json" },\n          body: JSON.stringify(\n            buildCanvasBranchRunRequest({\n              contextArtifacts,\n              contextMessages,\n              contextScope: activeDraft.contextScope,\n              model: modelId,\n              outputArtifactTypes,\n              prompt: activeDraft.text,\n              promptId: appendMessage.id,\n              provider,\n              runId,\n            }),\n          ),\n          signal: abortController.signal,\n        });\n        const payload = (await response.json().catch(() => null)) as\n          | CanvasBranchRunResponse\n          | null;\n        if (!response.ok) {\n          const structuredError =\n            payload?.error && typeof payload.error === "object"\n              ? payload.error.message\n              : payload?.error;\n          throw new Error(\n            structuredError || payload?.message || `Canvas branch run failed: ${response.status}`,\n          );\n        }\n        const responseText = payload?.text?.trim() ?? "";\n        if (!responseText) throw new Error("The model returned an empty branch response.");\n\n        const responseId =\n          typeof payload?.runId === "string" && payload.runId.trim()\n            ? payload.runId\n            : runId;\n        const nextExternalState = appendCompletedCanvasBranch({\n          externalState: preSubmitExternalState,\n          modelId: payload?.modelId || modelId,\n          provider: payload?.provider || provider,\n          responseId,\n          responseText,\n          userMessage: appendMessage,\n        });\n        runtime.threads.main.importExternalState(nextExternalState);\n        await waitForAdapterSettle();\n\n        const committedSnapshot = runtime.threads.main.export();\n        const promptEntry = committedSnapshot.messages.find(\n          (entry) => entry.message.id === appendMessage.id,\n        );\n        const responseEntry = committedSnapshot.messages.find(\n          (entry) => entry.message.id === responseId,\n        );\n        if (\n          !promptEntry ||\n          promptEntry.parentId !== draftBranchSpec.parentId ||\n          !responseEntry ||\n          responseEntry.parentId !== appendMessage.id\n        ) {\n          throw new Error("The completed branch could not be committed to the conversation tree.");\n        }\n\n        pendingOutputRunRef.current = null;\n        pendingDraftSubmissionRef.current = false;\n        applyCompletedResponse({\n          promptId: appendMessage.id,\n          responseId,\n          sourcePromptId: CANVAS_PROMPT_DRAFT_NODE_ID,\n          artifactIds: [...activeDraft.outputArtifactIds],\n          text: responseText,\n        });\n        notifySessionRuntimeReplaced(\n          committedSnapshot as unknown as SessionThreadExport,\n        );\n        resumeSessionPersist(persistSuspensionToken);\n        branchSubmissionLockRef.current = false;\n        setCanvasDraftError(null);\n        cancelDraft();\n        setIsSubmittingBranch(false);\n        await forceSessionPersist();'''

          if old_block not in text:
            raise SystemExit("branch submission execution block not found")
          text = text.replace(old_block, new_block)

          old_catch = '''      } catch {\n        const message = "Canvas branching failed. Try again from the selected node.";\n        if (!rollbackPendingTransaction(submissionToken, message)) {\n          branchSubmissionLockRef.current = false;\n          pendingDraftSubmissionRef.current = false;\n          pendingOutputRunRef.current = null;\n          setCanvasDraftError(message);\n          setRequestError(message);\n        }'''
          new_catch = '''      } catch (error) {\n        const aborted =\n          error instanceof DOMException && error.name === "AbortError";\n        if (aborted) {\n          rollbackPendingTransaction(submissionToken, null);\n          return;\n        }\n        const message =\n          error instanceof Error\n            ? error.message\n            : "Canvas branching failed. Try again from the selected node.";\n        if (!rollbackPendingTransaction(submissionToken, message)) {\n          branchSubmissionLockRef.current = false;\n          pendingDraftSubmissionRef.current = false;\n          pendingOutputRunRef.current = null;\n          setCanvasDraftError(message);\n          setRequestError(message);\n        }'''
          if old_catch not in text:
            raise SystemExit("branch submission catch block not found")
          text = text.replace(old_catch, new_catch)

          text = text.replace(
            '      const pendingOutput = pendingOutputRunRef.current;\n      if (!pendingOutput) return;\n',
            '      const pendingOutput = pendingOutputRunRef.current;\n      if (!pendingOutput || pendingOutput.abortController) return;\n',
            1,
          )
          hook.write_text(text, encoding="utf-8")

          context_test = r'''import { describe, expect, it } from "vitest";
          import { buildCanvasRunModelMessages } from "../lib/server/canvas-run-context";

          describe("Canvas direct run context", () => {
            it("preserves parent context", () => {
              const messages = buildCanvasRunModelMessages({
                contextScope: "parent",
                contextMessages: [
                  { role: "user", content: "Continue from the saved assistant response below" },
                  { role: "assistant", content: "A y B" },
                  { role: "user", content: "Dame una palabra por letra" },
                ],
                promptText: "Dame una palabra por letra",
              });
              expect(messages.map((message) => [message.role, message.content])).toEqual([
                ["user", "Continue from the saved assistant response below"],
                ["assistant", "A y B"],
                ["user", "Dame una palabra por letra"],
              ]);
            });

            it("preserves branch lineage", () => {
              const messages = buildCanvasRunModelMessages({
                contextScope: "branch",
                contextMessages: [
                  { role: "user", content: "Dame 2 frutas" },
                  { role: "assistant", content: "manzana y pera" },
                  { role: "user", content: "Dame animales" },
                  { role: "assistant", content: "mono y oso" },
                  { role: "user", content: "Resume la rama" },
                ],
                promptText: "Resume la rama",
              });
              expect(messages).toHaveLength(5);
              expect(messages.at(-1)).toEqual({ role: "user", content: "Resume la rama" });
            });

            it("turns full tree into provider-safe context containing sibling branches", () => {
              const messages = buildCanvasRunModelMessages({
                contextScope: "tree",
                contextMessages: [
                  { id: "u1", role: "user", content: "Dame 2 frutas" },
                  { id: "a1", role: "assistant", content: "manzana y pera" },
                  { id: "u2", role: "user", content: "Dame colores" },
                  { id: "a2", role: "assistant", content: "rojo y verde" },
                  { id: "u3", role: "user", content: "Dame animales" },
                  { id: "a3", role: "assistant", content: "mono y oso" },
                  { role: "user", content: "¿Cuáles fueron todos los colores y animales?" },
                ],
                promptText: "¿Cuáles fueron todos los colores y animales?",
              });
              expect(messages).toHaveLength(2);
              expect(messages[0]?.role).toBe("system");
              expect(String(messages[0]?.content)).toContain("rojo y verde");
              expect(String(messages[0]?.content)).toContain("mono y oso");
              expect(messages[1]).toEqual({
                role: "user",
                content: "¿Cuáles fueron todos los colores y animales?",
              });
            });
          });
          '''
          Path("tests/canvas-run-context.test.ts").write_text(context_test, encoding="utf-8")

          direct_test = r'''import { describe, expect, it } from "vitest";
          import type { MessageFormatRepository } from "@assistant-ui/core";
          import type { UIMessage } from "ai";
          import {
            appendCompletedCanvasBranch,
            buildCanvasBranchRunRequest,
          } from "../lib/canvas-branch-direct-run";
          import { buildBranchAppendMessage } from "../lib/thread-branching-runtime";

          describe("direct Canvas branch execution", () => {
            it("commits a completed full-tree branch as parent -> user -> assistant", () => {
              const contextMessages = [
                { id: "root-u", role: "user" as const, content: "Dame 2 frutas" },
                { id: "root-a", role: "assistant" as const, content: "manzana y pera" },
                { id: "color-u", role: "user" as const, content: "Dame colores" },
                { id: "color-a", role: "assistant" as const, content: "rojo y verde" },
                { id: "animal-u", role: "user" as const, content: "Dame animales" },
                { id: "animal-a", role: "assistant" as const, content: "mono y oso" },
                { role: "user" as const, content: "¿Cuáles fueron todos?" },
              ];
              const userMessage = buildBranchAppendMessage(
                {
                  operation: "create-follow-up-prompt",
                  anchorId: "root-a",
                  anchorRole: "assistant",
                  parentId: "root-a",
                  sourceId: "root-a",
                  targetRole: "user",
                  startRun: true,
                  placeholder: "Continue",
                  title: "Follow up",
                },
                {
                  contextMessages,
                  contextScope: "tree",
                  historyMode: "full",
                  modelId: "openrouter/free",
                  provider: "openrouter",
                  requireContextScope: true,
                  text: "¿Cuáles fueron todos?",
                },
              );
              expect(userMessage).not.toBeNull();
              if (!userMessage) return;

              const request = buildCanvasBranchRunRequest({
                contextMessages,
                contextScope: "tree",
                model: "openrouter/free",
                outputArtifactTypes: [],
                prompt: "¿Cuáles fueron todos?",
                promptId: userMessage.id,
                provider: "openrouter",
                runId: "response-1",
              });
              expect(JSON.stringify(request.contextMessages)).toContain("rojo y verde");
              expect(JSON.stringify(request.contextMessages)).toContain("mono y oso");

              const externalState: MessageFormatRepository<UIMessage> = {
                headId: "root-a",
                messages: [
                  {
                    parentId: null,
                    message: { id: "root-u", role: "user", parts: [{ type: "text", text: "Dame 2 frutas" }] },
                  },
                  {
                    parentId: "root-u",
                    message: { id: "root-a", role: "assistant", parts: [{ type: "text", text: "manzana y pera" }] },
                  },
                ],
              };
              const completed = appendCompletedCanvasBranch({
                externalState,
                modelId: "openrouter/free",
                provider: "openrouter",
                responseId: "response-1",
                responseText: "Los colores fueron rojo y verde; los animales, mono y oso.",
                userMessage,
              });
              expect(completed.headId).toBe("response-1");
              expect(completed.messages.at(-2)?.parentId).toBe("root-a");
              expect(completed.messages.at(-2)?.message.id).toBe(userMessage.id);
              expect(completed.messages.at(-1)?.parentId).toBe(userMessage.id);
              expect(completed.messages.at(-1)?.message.id).toBe("response-1");
            });
          });
          '''
          Path("tests/canvas-branch-direct-run.test.ts").write_text(direct_test, encoding="utf-8")
          PY
      - name: Install dependencies
        run: npm ci --no-audit --fund=false
      - name: Test branching and Full Tree
        run: npx vitest run tests/thread-branching-runtime.test.ts tests/chat-request.test.ts tests/canvas-run-context.test.ts tests/canvas-branch-direct-run.test.ts
      - name: Production build
        run: npm run build
      - name: Commit verified fix to main
        shell: bash
        run: |
          rm .github/workflows/apply-direct-canvas-branch-runs.yml
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add app/api/canvas-runs/route.ts \
            components/assistant-ui/thread-graph-flow/use-canvas-branch-submission.ts \
            lib/server/canvas-run-context.ts \
            lib/canvas-branch-direct-run.ts \
            tests/canvas-run-context.test.ts \
            tests/canvas-branch-direct-run.test.ts \
            .github/workflows/apply-direct-canvas-branch-runs.yml
          git commit -m "fix(canvas): run branch drafts through direct canvas transport"
          git push origin HEAD:main
