name: Phase 2 status probe

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase2-status-probe.yml

permissions:
  actions: read
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
      - name: Query phase 2 workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --workflow "Phase 2 E2E diagnostic" --limit 4 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url,displayTitle > phase2-status.json
      - name: Publish status and remove probe
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/phase2-status-probe.yml
          git add phase2-status.json
          git commit -m "test: refresh visible runtime status [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
