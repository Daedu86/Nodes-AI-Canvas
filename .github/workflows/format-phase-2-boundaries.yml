name: Format phase 2 boundaries

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  format:
    if: github.event.issue.title == '[automation] Format phase 2 boundaries'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Format and validate extracted boundaries
        shell: bash
        run: |
          set -o pipefail
          {
            node scripts/format-phase-2-boundaries.mjs
            npm run format
            npm run check
            npm run build:budget
          } 2>&1 | tee /tmp/phase-2-format.log

      - name: Publish validated formatting
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git restore --worktree -- tsconfig.json
          rm -f next-env.d.ts
          rm scripts/format-phase-2-boundaries.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/workspace components/context scripts/format-phase-2-boundaries.mjs
          git diff --cached --check
          git commit -m "style: format phase 2 boundaries [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
          gh issue comment "${{ github.event.issue.number }}" --body "Validation passed and the phase 2 boundary formatting was published to main."

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo 'Phase 2 formatting validation failed. No validated formatting was published.'
            echo
            echo '```text'
            tail -n 100 /tmp/phase-2-format.log 2>/dev/null || true
            echo '```'
          } > /tmp/phase-2-format-comment.md
          gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/phase-2-format-comment.md
