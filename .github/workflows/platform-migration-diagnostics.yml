name: Platform migration diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostics:
    if: github.head_ref == 'fix/platform-toolchain-migration'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --fund=false
      - name: Capture lint
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p migration-logs
          npm run format:check > migration-logs/lint.log 2>&1
      - name: Capture typecheck
        continue-on-error: true
        shell: bash
        run: npm run typecheck > migration-logs/typecheck.log 2>&1
      - name: Capture build
        continue-on-error: true
        shell: bash
        run: npm run build > migration-logs/build.log 2>&1
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: platform-migration-diagnostics
          path: migration-logs
          retention-days: 7
