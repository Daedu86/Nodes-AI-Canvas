name: Delete phase 2 preview branch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/delete-phase2-preview.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
      - name: Delete temporary preview branch and workflow
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git push origin --delete preview/phase-2-snapshot || true
          git rm .github/workflows/delete-phase2-preview.yml
          git commit -m "chore: remove phase 2 preview branch [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
