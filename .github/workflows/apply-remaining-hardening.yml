name: Apply remaining hardening

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: apply-remaining-hardening
  cancel-in-progress: false

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  harden:
    if: github.event.issue.title == '[automation] Implement remaining hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Apply focused hardening
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          package_path = Path("package.json")
          package = json.loads(package_path.read_text())
          package["scripts"]["typecheck:e2e"] = "tsc --noEmit -p tsconfig.e2e.json"
          package["scripts"]["check"] = (
              "npm run format:check && npm run typecheck && npm run typecheck:e2e "
              "&& npm run test:coverage && npm run test:critical-coverage"
          )
          package_path.write_text(json.dumps(package, indent=2) + "\n")

          Path("tsconfig.e2e.json").write_text(
              json.dumps(
                  {
                      "extends": "./tsconfig.json",
                      "compilerOptions": {
                          "incremental": False,
                          "plugins": [],
                          "types": ["node", "@playwright/test"],
                      },
                      "include": ["playwright.config.ts", "tests/e2e/**/*.ts"],
                      "exclude": ["node_modules"],
                  },
                  indent=2,
              )
              + "\n"
          )

          ci_path = Path(".github/workflows/ci.yml")
          ci = ci_path.read_text()
          marker = "      - name: Type check\n        run: npm run typecheck\n"
          replacement = (
              "      - name: Application type check\n"
              "        run: npm run typecheck\n"
              "      - name: End-to-end type check\n"
              "        run: npm run typecheck:e2e\n"
          )
          if marker not in ci:
              raise SystemExit("CI type-check marker not found")
          ci_path.write_text(ci.replace(marker, replacement, 1))

          helper_pattern = re.compile(
              r'(?P<indent>\s*)const \{ body, \.\.\.rest \} = init \?\? \{\};\n'
              r'(?P=indent)const response = await page\.request\.fetch\(url, \{\n'
              r'(?P=indent)  headers: \{\n'
              r'(?P=indent)    "Content-Type": "application/json",\n'
              r'(?P=indent)    \.\.\.\(rest\.headers \?\? \{\}\),\n'
              r'(?P=indent)  \},\n'
              r'(?P=indent)  \.\.\.rest,\n'
          )
          helper_replacement = (
              r'\g<indent>const { body, headers, ...rest } = init ?? {};\n'
              r'\g<indent>const normalizedHeaders = headers\n'
              r'\g<indent>  ? Object.fromEntries(new Headers(headers).entries())\n'
              r'\g<indent>  : {};\n'
              r'\g<indent>const response = await page.request.fetch(url, {\n'
              r'\g<indent>  ...rest,\n'
              r'\g<indent>  headers: {\n'
              r'\g<indent>    "Content-Type": "application/json",\n'
              r'\g<indent>    ...normalizedHeaders,\n'
              r'\g<indent>  },\n'
          )
          helper_replacements = 0
          for test_path in Path("tests/e2e").rglob("*.ts"):
              source = test_path.read_text()
              patched, count = helper_pattern.subn(helper_replacement, source)
              if count:
                  test_path.write_text(patched)
                  helper_replacements += count
          if helper_replacements == 0:
              raise SystemExit("No E2E request helper required normalization")

          artifacts_path = Path("lib/session-artifacts.ts")
          artifacts = artifacts_path.read_text()

          old_revision_id = '''const makeRevisionId = () =>
            typeof crypto !== "undefined" && "randomUUID" in crypto
              ? crypto.randomUUID()
              : `revision-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;'''
          new_revision_id = '''const makeRevisionId = () => {
            if (typeof crypto === "undefined" || typeof crypto.randomUUID !== "function") {
              throw new Error("Secure random UUID generation is unavailable.");
            }
            return crypto.randomUUID();
          };'''
          if old_revision_id not in artifacts:
              raise SystemExit("Revision ID marker not found")
          artifacts = artifacts.replace(old_revision_id, new_revision_id, 1)

          old_table_start = '''const markdownTableFromRows = (rows: Array<Record<string, unknown>>) => {
            const columns = Array.from(new Set(rows.flatMap((row) => Object.keys(row))));
            if (columns.length === 0) return null;
            const escape = (value: unknown) =>
              String(value ?? "")
                .replace(/\\\\/g, "\\\\\\\\")
                .replace(/\\|/g, "\\\\|")
                .replace(/\\s+/g, " ")
                .trim();'''
          new_table_start = '''const escapeMarkdownTableCell = (value: unknown) =>
            String(value ?? "")
              .replace(/\\\\/g, "\\\\\\\\")
              .replace(/\\|/g, "\\\\|")
              .replace(/\\s+/g, " ")
              .trim();

          const markdownTableFromRows = (rows: Array<Record<string, unknown>>) => {
            const columns = Array.from(new Set(rows.flatMap((row) => Object.keys(row))));
            if (columns.length === 0) return null;'''
          if old_table_start not in artifacts:
              raise SystemExit("Markdown escape marker not found")
          artifacts = artifacts.replace(old_table_start, new_table_start, 1)
          artifacts = artifacts.replace("columns.map(escape)", "columns.map(escapeMarkdownTableCell)")
          artifacts = artifacts.replace(
              "escape(row[column])", "escapeMarkdownTableCell(row[column])"
          )

          old_delimited_output = '''  return [
            `| ${header.join(" | ")} |`,
            `| ${header.map(() => "---").join(" | ")} |`,
            ...body.map((row) => `| ${row.join(" | ")} |`),
          ].join("\\n");'''
          new_delimited_output = '''  return [
            `| ${header.map(escapeMarkdownTableCell).join(" | ")} |`,
            `| ${header.map(() => "---").join(" | ")} |`,
            ...body.map(
              (row) => `| ${row.map(escapeMarkdownTableCell).join(" | ")} |`,
            ),
          ].join("\\n");'''
          if old_delimited_output not in artifacts:
              raise SystemExit("Delimited table output marker not found")
          artifacts_path.write_text(artifacts.replace(old_delimited_output, new_delimited_output, 1))

          Path("tests/session-artifacts-hardening.test.ts").write_text(
              '''import { afterEach, describe, expect, it, vi } from "vitest";
          import {
            appendArtifactRevision,
            parseArtifactOutput,
            type SessionArtifact,
          } from "@/lib/session-artifacts";

          const artifact: SessionArtifact = {
            id: "artifact-1",
            title: "Draft",
            artifactType: "text",
            semanticType: "draft",
            content: "before",
            revisions: [],
            createdAt: "2026-01-01T00:00:00.000Z",
            updatedAt: "2026-01-01T00:00:00.000Z",
          };

          afterEach(() => {
            vi.unstubAllGlobals();
          });

          describe("session artifact hardening", () => {
            it("uses secure UUID generation for revision identifiers", () => {
              vi.stubGlobal("crypto", {
                randomUUID: () => "123e4567-e89b-42d3-a456-426614174000",
              });

              const updated = appendArtifactRevision(artifact, {
                content: "after",
                origin: "manual",
                author: "user",
              });

              expect(updated.revisions?.[0]?.id).toBe(
                "123e4567-e89b-42d3-a456-426614174000",
              );
            });

            it("fails closed when secure UUID generation is unavailable", () => {
              vi.stubGlobal("crypto", undefined);

              expect(() =>
                appendArtifactRevision(artifact, {
                  content: "after",
                  origin: "manual",
                  author: "user",
                }),
              ).toThrow("Secure random UUID generation is unavailable.");
            });

            it("escapes Markdown-sensitive cells in delimited tables", () => {
              expect(parseArtifactOutput("table", "name,note\\nalpha,a|b\\nbeta,c\\\\d")).toBe(
                "| name | note |\\n| --- | --- |\\n| alpha | a\\\\|b |\\n| beta | c\\\\\\\\d |",
              );
            });
          });
          '''
          )
          PY

      - name: Validate changes
        shell: bash
        run: |
          set -o pipefail
          {
            npm run format
            npm run check
            npm run build:budget
          } 2>&1 | tee /tmp/remaining-hardening.log

      - name: Publish validated changes to main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git restore --worktree -- tsconfig.json
          rm -f next-env.d.ts
          rm .github/workflows/apply-remaining-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: complete repository hardening [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
          gh issue comment "${{ github.event.issue.number }}" --body "Validation passed. E2E type checking, secure revision IDs, and Markdown table escaping were published directly to main."
          gh issue close "${{ github.event.issue.number }}" --reason completed

      - name: Report validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo 'Remaining hardening validation failed. No implementation commit was published.'
            echo
            echo '```text'
            if [ -f /tmp/remaining-hardening.log ]; then
              tail -n 180 /tmp/remaining-hardening.log
            else
              echo 'Validation log was not created.'
            fi
            echo '```'
          } > /tmp/remaining-hardening-failure.md
          gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/remaining-hardening-failure.md
