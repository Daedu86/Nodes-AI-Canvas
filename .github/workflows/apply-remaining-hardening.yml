name: Apply remaining hardening

on:
  issues:
    types: [opened]

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: apply-remaining-hardening
  cancel-in-progress: false

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  harden:
    if: github.event.issue.title == '[automation] Implement remaining hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Apply and validate changes
        shell: bash
        run: |
          set -o pipefail
          {
            echo '[validate] applying transformations'
            node scripts/fix-hardening-preflight.mjs
            node scripts/fix-hardening-test-fixtures.mjs
            node scripts/apply-remaining-hardening.mjs
            echo '[validate] formatting'
            npm run format
            echo '[validate] repository checks'
            npm run check
            echo '[validate] production build and bundle budget'
            npm run build:budget
            echo '[validate] all gates passed'
          } 2>&1 | tee /tmp/remaining-hardening.log

      - name: Publish validated changes to main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -o pipefail
          {
            echo '[publish] restoring generated configuration changes'
            git restore --worktree -- tsconfig.json
            rm -f next-env.d.ts
            echo '[publish] removing temporary automation files'
            rm .github/workflows/apply-remaining-hardening.yml
            rm scripts/apply-remaining-hardening.mjs
            rm scripts/fix-hardening-preflight.mjs
            rm scripts/fix-hardening-test-fixtures.mjs
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            echo '[publish] staging validated changes'
            git status --short
            git add -A
            git diff --cached --check
            echo '[publish] creating commit'
            git commit -m "fix: complete repository hardening [skip vercel]"
            echo '[publish] pushing main'
            git push origin HEAD:main
            echo '[publish] updating trigger issue'
            gh issue comment "${{ github.event.issue.number }}" --body "Validation passed. E2E type checking, secure revision IDs, Markdown table escaping, and the blocking compatibility fixes were published directly to main."
            gh issue close "${{ github.event.issue.number }}" --reason completed
            echo '[publish] completed'
          } 2>&1 | tee /tmp/remaining-hardening-publish.log

      - name: Report validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo 'Remaining hardening validation or publication failed.'
            echo
            if [ -f /tmp/remaining-hardening-publish.log ]; then
              echo 'Publish log:'
              echo '```text'
              cat /tmp/remaining-hardening-publish.log
              echo '```'
              echo
            fi
            echo 'Validation summary:'
            echo '```text'
            if [ -f /tmp/remaining-hardening.log ]; then
              grep -E '\[validate\]|error TS|Type error|Error:|FAIL |failed|threshold|budget|exceeded|warning' /tmp/remaining-hardening.log | tail -n 120 || true
              echo
              echo '--- final log lines ---'
              tail -n 50 /tmp/remaining-hardening.log
            else
              echo 'Validation log was not created.'
            fi
            echo '```'
          } > /tmp/remaining-hardening-failure.md
          gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/remaining-hardening-failure.md
