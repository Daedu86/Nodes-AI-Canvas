name: Temporary CodeQL status verification

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/tmp-codeql-status.yml

permissions:
  contents: write
  security-events: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for CodeQL analysis and capture open alerts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp-codeql
          analysis_found=false
          for attempt in $(seq 1 40); do
            gh api --paginate "/repos/${GITHUB_REPOSITORY}/code-scanning/analyses?ref=refs/heads/main&tool_name=CodeQL&per_page=100" > .tmp-codeql/analyses.json
            if node -e 'const fs=require("node:fs"); const analyses=JSON.parse(fs.readFileSync(".tmp-codeql/analyses.json","utf8")); process.exit(analyses.some((entry)=>entry.commit_sha===process.env.GITHUB_SHA)?0:1)'; then
              analysis_found=true
              break
            fi
            sleep 15
          done

          gh api --paginate --slurp "/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&ref=refs/heads/main&per_page=100" > .tmp-codeql/alert-pages.json
          ANALYSIS_FOUND="$analysis_found" node <<'NODE'
          const fs = require("node:fs");
          const pages = JSON.parse(fs.readFileSync(".tmp-codeql/alert-pages.json", "utf8"));
          const alerts = pages.flat();
          const result = {
            analysisFoundForCommit: process.env.ANALYSIS_FOUND === "true",
            commitSha: process.env.GITHUB_SHA,
            openAlertCount: alerts.length,
            alerts: alerts.map((alert) => ({
              number: alert.number,
              rule: alert.rule?.id ?? null,
              description: alert.rule?.description ?? null,
              severity: alert.rule?.security_severity_level ?? alert.rule?.severity ?? null,
              path: alert.most_recent_instance?.location?.path ?? null,
              startLine: alert.most_recent_instance?.location?.start_line ?? null,
            })),
          };
          fs.writeFileSync(".tmp-codeql/final-status.json", `${JSON.stringify(result, null, 2)}\n`);
          const lines = [
            "# Post-remediation CodeQL status",
            "",
            `- Analysis found for commit: ${result.analysisFoundForCommit}`,
            `- Commit: ${result.commitSha}`,
            `- Open alert count: ${result.openAlertCount}`,
            "",
          ];
          for (const alert of result.alerts) {
            lines.push(`- #${alert.number} ${alert.rule}: ${alert.path}:${alert.startLine}`);
          }
          fs.writeFileSync(".tmp-codeql/final-status.md", `${lines.join("\n")}\n`);
          NODE

      - name: Commit status report
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .tmp-codeql/final-status.json .tmp-codeql/final-status.md
          git commit -m "chore: capture post-remediation CodeQL status [skip vercel]"
          git push origin HEAD:main
