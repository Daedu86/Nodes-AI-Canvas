name: Inspect phase 1 validation failure

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase1-validation-log-probe.yml

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Download failed job log
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/actions/jobs/86811370893/logs" \
            > phase1-validation-full.log
          tail -n 180 phase1-validation-full.log > phase1-validation-tail.log
          cat phase1-validation-tail.log

      - name: Publish log and remove probe
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/phase1-validation-log-probe.yml
          git add phase1-validation-tail.log
          git commit -m "ci: record phase 1 validation error [skip vercel]"
          git push origin HEAD:main
