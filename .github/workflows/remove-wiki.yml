name: Remove Wiki

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Apply removal
        id: migration
        continue-on-error: true
        run: python scripts/remove-wiki.py > /tmp/wiki-removal.log 2>&1

      - name: Publish migration diagnostics
        if: steps.migration.outcome == 'failure'
        run: |
          cp /tmp/wiki-removal.log wiki-removal-error.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wiki-removal-error.log
          git commit -m "chore: record wiki removal diagnostic"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Stop after migration failure
        if: steps.migration.outcome == 'failure'
        run: |
          cat /tmp/wiki-removal.log
          exit 1

      - name: Install dependencies
        if: steps.migration.outcome == 'success'
        run: npm ci

      - name: Lint
        if: steps.migration.outcome == 'success'
        run: npm run lint

      - name: Test
        if: steps.migration.outcome == 'success'
        run: npm test

      - name: Build
        if: steps.migration.outcome == 'success'
        run: npm run build

      - name: Commit validated removal
        if: steps.migration.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "refactor: remove wiki"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
