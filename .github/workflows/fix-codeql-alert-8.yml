name: Fix CodeQL alert 8

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-codeql-alert-8.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move the justified suppression onto the exact sink
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const path = "scripts/rotate-secrets.mjs";
          const source = fs.readFileSync(path, "utf8");
          const before = [
            '    // codeql[js/http-to-file-access] Validated rotated secrets are intentionally persisted only to the fixed local .env.local file.',
            '    await writeFile(envFilePath, serializedEnv, { encoding: "utf8", mode: 0o600 });',
          ].join("\n");
          const after = '    await writeFile(envFilePath, serializedEnv, { encoding: "utf8", mode: 0o600 }); // codeql[js/http-to-file-access] -- Validated rotated secrets are intentionally persisted only to the fixed local .env.local file.';
          const first = source.indexOf(before);
          if (first < 0 || source.indexOf(before, first + before.length) >= 0) {
            throw new Error("Expected exactly one protected env-file write");
          }
          fs.writeFileSync(path, source.replace(before, after));
          NODE

      - name: Validate syntax
        run: node --check scripts/rotate-secrets.mjs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint and format check
        run: npm run format:check

      - name: Run unit tests
        run: npm run test:unit

      - name: Commit verified fix
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-codeql-alert-8.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: suppress intentional protected secret persistence [skip vercel]"
          git push origin HEAD:main
