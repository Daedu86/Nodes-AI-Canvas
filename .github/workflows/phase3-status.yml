name: Inspect phase 3 run status

on:
  push:
    branches: [main]
    paths: ["phase3-status-trigger.txt"]

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Persist final phase 3 failure
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: "29342183812"
        shell: bash
        run: |
          gh run view "$RUN_ID" --repo "${{ github.repository }}" --log-failed > /tmp/phase3-final.log
          {
            echo 'Final Phase 3 failure diagnostic:'
            grep -E '^[^[:space:]].*tests/e2e/|^[[:space:]]+[0-9]+\)|[0-9]+ failed|Error:|TimeoutError:|expect\(' /tmp/phase3-final.log | tail -n 220 || true
            echo '--- final 140 lines ---'
            tail -n 140 /tmp/phase3-final.log
          } > phase3-final-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add phase3-final-diagnostic.txt
          git commit -m "chore: capture final phase 3 failure [skip vercel]"
          git push
