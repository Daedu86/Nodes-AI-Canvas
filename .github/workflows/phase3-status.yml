name: Inspect phase 3 run status

on:
  push:
    branches: [main]
    paths: ["phase3-status-trigger.txt"]

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
      - name: Persist current phase 3 status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh run list --repo "${{ github.repository }}" --workflow phase3-hardening.yml --limit 3 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,displayTitle > phase3-current-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add phase3-current-status.json
          git commit -m "chore: capture current phase 3 status [skip vercel]"
          git push
