name: Inspect phase 3 run status

on:
  push:
    branches: [main]
    paths: ["phase3-status-trigger.txt"]

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Report phase 3 browser diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: "29336566916"
        shell: bash
        run: |
          gh run view "$RUN_ID" --repo "${{ github.repository }}" --log-failed > /tmp/phase3-failed.log
          {
            echo 'Phase 3 browser diagnostics:'
            echo
            echo '```text'
            grep -Ei 'Failed to load LLM|llm/settings|auth|sign.?in|unauthorized|forbidden|combobox|Model|webServer|GET /api|POST /api|status=|error' /tmp/phase3-failed.log | tail -n 240 || true
            echo '```'
          } > /tmp/phase3-status.md
          gh issue comment 89 --repo "${{ github.repository }}" --body-file /tmp/phase3-status.md
