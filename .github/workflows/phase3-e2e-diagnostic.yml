name: Diagnose phase 3 E2E fixture

on:
  push:
    branches: [main]
    paths: ["phase3-e2e-diagnostic-trigger.txt"]

permissions:
  contents: read
  issues: write

concurrency:
  group: phase3-e2e-diagnostic
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Generate shared fixture and accessible model selector
        shell: bash
        run: |
          node scripts/apply-phase3-hardening.mjs
          python - <<'PY'
          from pathlib import Path
          import re

          fixture_path = Path("tests/e2e/fixtures/app.ts")
          fixture = fixture_path.read_text()
          old = '''  const { body, ...rest } = init ?? {};
            const response = await page.request.fetch(url, {
              headers: {
                "Content-Type": "application/json",
                ...(rest.headers ?? {}),
              },
              ...rest,
              ...(body === undefined ? {} : { data: body }),
            });'''
          new = '''  const { body, headers, ...rest } = init ?? {};
            const normalizedHeaders = headers
              ? Object.fromEntries(new Headers(headers).entries())
              : {};
            const response = await page.request.fetch(url, {
              ...rest,
              headers: {
                "Content-Type": "application/json",
                ...normalizedHeaders,
              },
              ...(body === undefined ? {} : { data: body }),
            });'''
          if old not in fixture:
              raise SystemExit("fixture headers marker not found")
          fixture_path.write_text(fixture.replace(old, new))

          selector_path = Path("components/assistant-ui/model-selector.tsx")
          selector = selector_path.read_text()
          selector, count = re.subn(
              r'(<select\s*\n)(\s*)(className=)',
              r'\1\2aria-label="Model"\n\2\3',
              selector,
              count=1,
          )
          if count != 1:
              raise SystemExit("model selector could not be patched")
          selector_path.write_text(selector)
          PY
          npm run format
          npx playwright install --with-deps chromium

      - name: Run focused smoke diagnostic
        id: focused
        continue-on-error: true
        shell: bash
        run: |
          npx playwright test tests/e2e/smoke.spec.ts --grep "sends a prompt and renders the mocked assistant reply" --workers=1

      - name: Report focused context
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo 'Focused Phase 3 E2E diagnostic:'
            echo
            echo '```text'
            echo "outcome=${{ steps.focused.outcome }}"
            find test-results -name error-context.md -print -exec cat {} \; 2>/dev/null || true
            echo '```'
          } > /tmp/phase3-e2e-diagnostic.md
          gh issue comment 89 --repo "${{ github.repository }}" --body-file /tmp/phase3-e2e-diagnostic.md
          test "${{ steps.focused.outcome }}" = success
