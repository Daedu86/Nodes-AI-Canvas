name: Publish phase 1 directly to main

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase1-chat-e2e-fix.yml

permissions:
  contents: write

concurrency:
  group: phase1-chat-e2e-fix
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  PHASE1_REVISION: "5"

jobs:
  apply-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Apply phase 1 fixes
        run: |
          python scripts/apply-phase1-fixes.py
          python scripts/finalize-phase1-e2e-auth-test.py

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Format modified files
        run: >-
          npx eslint
          app/assistant.tsx
          lib/server/chat/request.ts
          lib/server/e2e-auth.ts
          playwright.config.ts
          tests/chat-request.test.ts
          tests/e2e-auth.test.ts
          tests/e2e
          --fix

      - name: Run focused validation
        run: |
          git diff --check
          npm run format:check
          npm run typecheck
          npx vitest run tests/chat-request.test.ts tests/e2e-auth.test.ts

      - name: Publish phase 1 commit
        shell: bash
        run: |
          set -euo pipefail
          git rm \
            .github/workflows/phase1-chat-e2e-fix.yml \
            scripts/apply-phase1-fixes.py \
            scripts/finalize-phase1-e2e-auth-test.py \
            phase1-actionlint.txt \
            phase1-check-runs.json \
            phase1-run-detail.json \
            phase1-run-status.json \
            phase1-validation-tail.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            app/assistant.tsx \
            lib/server/chat/request.ts \
            lib/server/e2e-auth.ts \
            playwright.config.ts \
            tests/chat-request.test.ts \
            tests/e2e-auth.test.ts \
            tests/e2e
          if ! git diff --quiet; then
            echo "Unstaged tracked changes remain:" >&2
            git diff --name-only >&2
            exit 1
          fi
          git diff --cached --check
          git commit -m "fix: restore AI SDK 7 chat and E2E compatibility [skip vercel]"
          git push origin HEAD:main
