name: Apply phase 1 chat and E2E fixes

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase1-chat-e2e-fix.yml

permissions:
  contents: write

concurrency:
  group: phase1-chat-e2e-fix
  cancel-in-progress: false

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"
  PLAYWRIGHT_RUN_ID: phase1-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  apply-test-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Apply phase 1 fixes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match in {path}, found {count}: {old[:120]!r}")
              file_path.write_text(text.replace(old, new, 1), encoding="utf-8")

          def replace_all(path: str, old: str, new: str, minimum: int = 1) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count < minimum:
                  raise SystemExit(f"Expected at least {minimum} matches in {path}, found {count}: {old!r}")
              file_path.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "lib/server/chat/request.ts",
              'const historyModeSchema = z.enum(["last", "full"]);\nconst boundedIdentifierSchema = z.string().trim().min(1).max(256);',
              'const historyModeSchema = z.enum(["last", "full"]);\nconst chatTriggerSchema = z.enum(["submit-message", "regenerate-message"]);\nconst boundedIdentifierSchema = z.string().trim().min(1).max(256);',
          )
          replace_once(
              "lib/server/chat/request.ts",
              '  .object({\n    messages: z.array(chatMessageSchema).max(MAX_CHAT_MESSAGES).default([]),\n    system: z.string().max(MAX_SYSTEM_CHARS).optional(),\n    tools: toolsSchema.optional(),',
              '  .object({\n    id: boundedIdentifierSchema.optional(),\n    messages: z.array(chatMessageSchema).max(MAX_CHAT_MESSAGES).default([]),\n    system: z.string().max(MAX_SYSTEM_CHARS).optional(),\n    tools: toolsSchema.optional(),\n    trigger: chatTriggerSchema.optional(),',
          )

          replace_once(
              "tests/chat-request.test.ts",
              '    const result = chatRequestBodySchema.safeParse({\n      messages: [',
              '    const result = chatRequestBodySchema.safeParse({\n      id: "request-1",\n      trigger: "submit-message",\n      messages: [',
          )
          replace_once(
              "tests/chat-request.test.ts",
              '''  it("rejects invalid providers, history modes, and empty messages", () => {
    expect(
      chatRequestBodySchema.safeParse({
        messages: [validMessage],
        provider: "unknown-provider",
      }).success,
    ).toBe(false);
    expect(
      chatRequestBodySchema.safeParse({
        messages: [validMessage],
        historyMode: "summary",
      }).success,
    ).toBe(false);
    expect(
      chatRequestBodySchema.safeParse({
        messages: [{ id: "empty", role: "user" }],
      }).success,
    ).toBe(false);
  });''',
              '''  it("accepts supported transport triggers and rejects invalid request values", () => {
    expect(
      chatRequestBodySchema.safeParse({
        id: "request-2",
        trigger: "regenerate-message",
        messages: [validMessage],
      }).success,
    ).toBe(true);
    expect(
      chatRequestBodySchema.safeParse({
        messages: [validMessage],
        trigger: "unsupported-trigger",
      }).success,
    ).toBe(false);
    expect(
      chatRequestBodySchema.safeParse({
        messages: [validMessage],
        provider: "unknown-provider",
      }).success,
    ).toBe(false);
    expect(
      chatRequestBodySchema.safeParse({
        messages: [validMessage],
        historyMode: "summary",
      }).success,
    ).toBe(false);
    expect(
      chatRequestBodySchema.safeParse({
        messages: [{ id: "empty", role: "user" }],
      }).success,
    ).toBe(false);
  });''',
          )

          replace_once(
              "app/assistant.tsx",
              '''        recordPendingLatency(messageId);
        setRequestError(null);
      } catch {
        pendingLatencyRef.current = null;
        setRequestError(null);
      }''',
              '''        recordPendingLatency(messageId);
      } catch {
        pendingLatencyRef.current = null;
      }''',
          )

          replace_once(
              "lib/server/e2e-auth.ts",
              '''export function isE2eHeaderAuthAllowed() {
  return process.env.NODE_ENV === "test";
}''',
              '''export function isE2eHeaderAuthAllowed() {
  if (isProductionLikeRuntime()) {
    return false;
  }
  return process.env.NODE_ENV === "test" || isE2eEnvAuthAllowed();
}''',
          )

          Path("tests/e2e-auth.test.ts").write_text('''import { afterEach, describe, expect, it } from "vitest";
import {
  isE2eEnvAuthAllowed,
  isE2eHeaderAuthAllowed,
  isProductionLikeRuntime,
} from "../lib/server/e2e-auth";

const originalNodeEnv = process.env.NODE_ENV;

describe("e2e auth guardrails", () => {
  afterEach(() => {
    process.env.NODE_ENV = originalNodeEnv;
    delete process.env.ALLOW_E2E_AUTH_OVERRIDE;
    delete process.env.E2E_MOCK_LLM;
    delete process.env.VERCEL_ENV;
  });

  it("allows header-based test auth in the test runtime", () => {
    expect(isE2eHeaderAuthAllowed()).toBe(true);
  });

  it("allows header identities in an explicitly enabled non-production E2E server", () => {
    process.env.NODE_ENV = "development";
    process.env.ALLOW_E2E_AUTH_OVERRIDE = "1";
    process.env.E2E_MOCK_LLM = "1";

    expect(isE2eEnvAuthAllowed()).toBe(true);
    expect(isE2eHeaderAuthAllowed()).toBe(true);
  });

  it("requires an explicit flag for env-based auth overrides", () => {
    process.env.NODE_ENV = "development";
    process.env.E2E_MOCK_LLM = "1";
    expect(isE2eEnvAuthAllowed()).toBe(false);
    process.env.ALLOW_E2E_AUTH_OVERRIDE = "1";
    expect(isE2eEnvAuthAllowed()).toBe(true);
  });

  it("blocks all E2E auth overrides in production-like runtimes", () => {
    process.env.ALLOW_E2E_AUTH_OVERRIDE = "1";
    process.env.E2E_MOCK_LLM = "1";
    process.env.VERCEL_ENV = "production";

    expect(isProductionLikeRuntime()).toBe(true);
    expect(isE2eEnvAuthAllowed()).toBe(false);
    expect(isE2eHeaderAuthAllowed()).toBe(false);
  });
});
''', encoding="utf-8")

          replace_all(
              "playwright.config.ts",
              "nvidia/nemotron-3-super-120b-a12b:free",
              "openrouter/free",
              minimum=2,
          )

          for e2e_path in Path("tests/e2e").glob("*.ts"):
              text = e2e_path.read_text(encoding="utf-8")
              text = text.replace(
                  "nvidia/nemotron-3-super-120b-a12b:free",
                  "openrouter/free",
              )
              text = text.replace(
                  "OpenRouter · Nemotron Nano 12B V2 VL (free)",
                  "OpenRouter · Free Router",
              )
              e2e_path.write_text(text, encoding="utf-8")

          replace_once(
              "tests/e2e/session-return-send.spec.ts",
              '''  // Simulate leaving the chat (for example: opening Knowledge Center).
  await page.getByRole("button", { name: "Knowledge Center" }).click();
  await expect(page.getByRole("heading", { name: "Knowledge Center" })).toBeVisible({
    timeout: 15_000,
  });''',
              '''  // Leave the session surface through a current profile workspace.
  await page.getByRole("button", { name: "LLM Models" }).click();
  await expect(page.getByRole("heading", { name: "LLM Models" })).toBeVisible({
    timeout: 15_000,
  });''',
          )

          replace_once(
              "tests/e2e/chat-image-attachment.spec.ts",
              '''test("send is blocked while an image is still preparing", async ({ page }) => {
  const filePath = test.info().outputPath("pixel.png");
  await fs.writeFile(filePath, Buffer.from(PIXEL_PNG_BASE64, "base64"));

  await page.goto("/");
  await page.getByRole("button", { name: "Attach image" }).click();
  await page.getByTestId("chat-image-input").setInputFiles(filePath);

  await page.getByRole("button", { name: "Send" }).click();
  const alert = page.getByTestId("composer-error");
  await expect(alert).toContainText(
    /preparing the image attachment|text-only|Could not send/i,
  );
});''',
              '''test("send is blocked while an image is still preparing", async ({ page }) => {
  const filePath = test.info().outputPath("pixel.png");
  await fs.writeFile(filePath, Buffer.from(PIXEL_PNG_BASE64, "base64"));

  await page.evaluate(() => {
    const originalReadAsDataUrl = FileReader.prototype.readAsDataURL;
    FileReader.prototype.readAsDataURL = function (blob: Blob) {
      window.setTimeout(() => originalReadAsDataUrl.call(this, blob), 500);
    };
  });

  await page.getByRole("button", { name: "Attach image" }).click();
  await page.getByTestId("chat-image-input").setInputFiles(filePath);

  const sendButton = page.getByRole("button", { name: "Send" });
  await expect(sendButton).toBeDisabled();
  await expect(page.getByTestId("composer-image-preview")).toBeVisible();
  await expect(sendButton).toBeEnabled({ timeout: 5_000 });
});''',
          )

          replace_once(
              "tests/e2e/smoke.spec.ts",
              '''test("creates the first prompt directly from an empty flow canvas", async ({ page }) => {
  await gotoChat(page);
  await page.getByRole("button", { name: "Show canvas panel" }).click();
  await expect(page.getByRole("button", { name: "Create prompt node" })).toBeVisible({
    timeout: 15_000,
  });

  await page.getByRole("button", { name: "Create prompt node" }).click();
  const draftNode = page.locator('.react-flow__node[data-id="__CANVAS_PROMPT_DRAFT__"]');
  await expect(draftNode).toBeVisible({ timeout: 15_000 });
  await draftNode.getByRole("textbox", { name: "Draft prompt" }).fill("Canvas first prompt");

  const responsePromise = page.waitForResponse(
    (response) => response.url().includes("/api/chat") && response.request().method() === "POST",
  );
  await draftNode
    .getByRole("button", { name: "Send prompt node" })
    .evaluate((button: HTMLButtonElement) => button.click());
  const response = await responsePromise;
  expect(response.ok()).toBe(true);

  const rawSelectedModel = await page.getByRole("combobox", { name: "Model" }).evaluate((element) => {
    if (element instanceof HTMLSelectElement) {
      return element.value;
    }
    return element.getAttribute("value") ?? "";
  });
  const normalizedSelection = rawSelectedModel
    ? normalizeSelectedModelValue(rawSelectedModel)
    : null;
  const reply = expectedReply("Canvas first prompt", {
    model: normalizedSelection?.model,
    provider: normalizedSelection?.provider ?? "openrouter",
  });
  await page.getByRole("button", { name: "Show chat panel" }).click();
  await expect(threadMessage(page, "Canvas first prompt")).toBeVisible({ timeout: 15_000 });
  await expect(threadMessage(page, reply)).toBeVisible({ timeout: 15_000 });
});''',
              '''test("runs the first prompt directly from an empty flow canvas", async ({ page }) => {
  await gotoChat(page);
  await page.getByRole("button", { name: "Show canvas panel" }).click();
  const createPromptButton = page.getByRole("button", { name: "Create prompt node" });
  await expect(createPromptButton).toBeVisible({ timeout: 15_000 });

  await createPromptButton.click();
  const promptNode = page
    .locator(".react-flow__node")
    .filter({ has: page.getByRole("textbox", { name: "Canvas prompt" }) })
    .last();
  await expect(promptNode).toBeVisible({ timeout: 15_000 });
  await promptNode.getByRole("textbox", { name: "Canvas prompt" }).fill("Canvas first prompt");

  const responsePromise = page.waitForResponse(
    (response) =>
      response.url().includes("/api/canvas-runs") &&
      response.request().method() === "POST",
  );
  await promptNode.getByRole("button", { name: "Run canvas prompt" }).click();
  const response = await responsePromise;
  expect(response.ok()).toBe(true);
  await expect(promptNode).toContainText("Mock canvas response: Canvas first prompt", {
    timeout: 15_000,
  });

  const activeSessionId = await getActiveSessionId(page);
  expect(activeSessionId).toBeTruthy();
  const persisted = await fetchAppJson<{
    session: {
      artifacts: Array<{
        artifactType: string;
        content: string;
        promptResult?: string | null;
        promptStatus?: string | null;
      }>;
    };
  }>(page, `/api/sessions/${activeSessionId}`);
  const promptArtifact = persisted.session.artifacts.find(
    (artifact) => artifact.artifactType === "prompt" && artifact.content === "Canvas first prompt",
  );
  expect(promptArtifact).toMatchObject({
    promptResult: "Mock canvas response: Canvas first prompt",
    promptStatus: "completed",
  });
});''',
          )

          stale_terms = {
              "tests/e2e/session-return-send.spec.ts": ["Knowledge Center"],
              "tests/e2e/chat-image-attachment.spec.ts": ["Nemotron Nano 12B V2 VL"],
              "playwright.config.ts": ["nvidia/nemotron-3-super-120b-a12b:free"],
          }
          for path, terms in stale_terms.items():
              text = Path(path).read_text(encoding="utf-8")
              for term in terms:
                  if term in text:
                      raise SystemExit(f"Stale E2E expectation remains in {path}: {term}")
          PY

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Format modified files
        run: >-
          npx eslint
          app/assistant.tsx
          lib/server/chat/request.ts
          lib/server/e2e-auth.ts
          playwright.config.ts
          tests/chat-request.test.ts
          tests/e2e-auth.test.ts
          tests/e2e/chat-image-attachment.spec.ts
          tests/e2e/session-return-send.spec.ts
          tests/e2e/smoke.spec.ts
          --fix

      - name: Validate repository
        run: |
          git diff --check
          npm run format:check
          npm run typecheck
          npm run test:coverage
          npm run test:critical-coverage
          npm run benchmark:canvas:budget
          npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run complete end-to-end suite
        run: npm run test:e2e -- --workers=1

      - name: Publish one final main commit
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/phase1-chat-e2e-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            app/assistant.tsx \
            lib/server/chat/request.ts \
            lib/server/e2e-auth.ts \
            playwright.config.ts \
            tests/chat-request.test.ts \
            tests/e2e-auth.test.ts \
            tests/e2e/chat-image-attachment.spec.ts \
            tests/e2e/session-return-send.spec.ts \
            tests/e2e/smoke.spec.ts
          git commit -m "fix: restore AI SDK 7 chat and E2E compatibility"
          git push origin HEAD:main
