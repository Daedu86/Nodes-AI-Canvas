name: Apply phase 1 chat and E2E fixes

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase1-chat-e2e-fix.yml

permissions:
  contents: write

concurrency:
  group: phase1-chat-e2e-fix
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"
  PHASE1_REVISION: "3"
  PLAYWRIGHT_RUN_ID: phase1-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  apply-test-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Apply phase 1 fixes
        run: python scripts/apply-phase1-fixes.py

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Format modified files
        run: >-
          npx eslint
          app/assistant.tsx
          lib/server/chat/request.ts
          lib/server/e2e-auth.ts
          playwright.config.ts
          tests/chat-request.test.ts
          tests/e2e-auth.test.ts
          tests/e2e
          --fix

      - name: Validate repository
        run: |
          git diff --check
          npm run format:check
          npm run typecheck
          npm run test:coverage
          npm run test:critical-coverage
          npm run benchmark:canvas:budget
          npm run audit:production
          npm run audit:all
          npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run complete end-to-end suite
        run: npm run test:e2e -- --workers=1

      - name: Publish one final main commit
        shell: bash
        run: |
          set -euo pipefail
          git rm \
            .github/workflows/phase1-chat-e2e-fix.yml \
            scripts/apply-phase1-fixes.py \
            phase1-actionlint.txt \
            phase1-check-runs.json \
            phase1-run-detail.json \
            phase1-run-status.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            app/assistant.tsx \
            lib/server/chat/request.ts \
            lib/server/e2e-auth.ts \
            playwright.config.ts \
            tests/chat-request.test.ts \
            tests/e2e-auth.test.ts \
            tests/e2e
          if ! git diff --quiet; then
            echo "Unstaged tracked changes remain:" >&2
            git diff --name-only >&2
            exit 1
          fi
          git diff --cached --check
          git commit -m "fix: restore AI SDK 7 chat and E2E compatibility"
          git push origin HEAD:main
