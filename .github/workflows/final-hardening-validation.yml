name: Final hardening validation

on:
  push:
    branches: [main]
    paths:
      - .ci-validation-trigger

permissions:
  actions: read
  contents: read
  issues: write
  security-events: write

concurrency:
  group: final-hardening-validation
  cancel-in-progress: false

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"
  VALIDATION_ISSUE: "98"
  VALIDATION_REPOSITORY: "Daedu86/Nodes-AI-Canvas"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Report start
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "$VALIDATION_ISSUE" -R "$VALIDATION_REPOSITORY" --body "Final hardening validation started on main."

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Repository checks
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee /tmp/repository-checks.log

      - name: Production build and bundle budget
        shell: bash
        run: |
          set -o pipefail
          npm run build:budget 2>&1 | tee /tmp/build-budget.log

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Full Chromium end-to-end suite
        shell: bash
        run: |
          set -o pipefail
          npm run test:e2e -- --workers=1 2>&1 | tee /tmp/e2e.log

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
          output: /tmp/codeql-results

      - name: Verify CodeQL result set
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          root = pathlib.Path('/tmp/codeql-results')
          sarif_files = list(root.rglob('*.sarif')) if root.exists() else []
          findings = []
          for path in sarif_files:
              with path.open(encoding='utf-8') as handle:
                  sarif = json.load(handle)
              for run in sarif.get('runs', []):
                  rules = {
                      rule.get('id'): rule
                      for rule in run.get('tool', {}).get('driver', {}).get('rules', [])
                  }
                  for result in run.get('results', []):
                      rule_id = result.get('ruleId', 'unknown-rule')
                      message = result.get('message', {}).get('text', '').replace('\n', ' ').strip()
                      level = result.get('level') or rules.get(rule_id, {}).get('defaultConfiguration', {}).get('level', 'unknown')
                      locations = result.get('locations', [])
                      location = ''
                      if locations:
                          physical = locations[0].get('physicalLocation', {})
                          uri = physical.get('artifactLocation', {}).get('uri', '')
                          line = physical.get('region', {}).get('startLine')
                          location = f'{uri}:{line}' if line else uri
                      findings.append((level, rule_id, location, message))

          with open('/tmp/codeql-summary.md', 'w', encoding='utf-8') as output:
              output.write(f'CodeQL SARIF files: {len(sarif_files)}\n\n')
              output.write(f'CodeQL findings: {len(findings)}\n')
              if findings:
                  output.write('\nTop findings:\n')
                  for level, rule_id, location, message in findings[:30]:
                      output.write(f'- [{level}] `{rule_id}` at `{location}`: {message}\n')

          if not sarif_files:
              print('No CodeQL SARIF output was produced.', file=sys.stderr)
              sys.exit(1)
          if findings:
              print(f'CodeQL produced {len(findings)} finding(s).', file=sys.stderr)
              sys.exit(1)
          print('CodeQL produced zero findings.')
          PY

      - name: Report success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo 'Final hardening validation passed on `main`.'
            echo
            echo '- Repository checks: passed'
            echo '- Production build and bundle budget: passed'
            echo '- Full Chromium E2E suite: passed'
            echo '- CodeQL security-extended analysis: zero findings'
            echo
            cat /tmp/codeql-summary.md
          } > /tmp/final-validation-success.md
          gh issue comment "$VALIDATION_ISSUE" -R "$VALIDATION_REPOSITORY" --body-file /tmp/final-validation-success.md
          gh issue close "$VALIDATION_ISSUE" -R "$VALIDATION_REPOSITORY" --reason completed

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo 'Final hardening validation did not pass. No product code was changed by this workflow.'
            echo
            if [ -f /tmp/codeql-summary.md ]; then
              cat /tmp/codeql-summary.md
              echo
            fi
            for file in /tmp/repository-checks.log /tmp/build-budget.log /tmp/e2e.log; do
              if [ -f "$file" ]; then
                echo "### $(basename "$file")"
                echo '```text'
                tail -n 80 "$file"
                echo '```'
                echo
              fi
            done
          } > /tmp/final-validation-failure.md
          gh issue comment "$VALIDATION_ISSUE" -R "$VALIDATION_REPOSITORY" --body-file /tmp/final-validation-failure.md
