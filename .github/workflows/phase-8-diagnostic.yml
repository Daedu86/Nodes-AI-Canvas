name: Phase 8 diagnostic

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: phase-8-diagnostic-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ENV: preview
  NODES_PERSISTENCE_BACKEND: file
  AUTH_ENABLE_DEV_CREDENTIALS: "0"
  OPENROUTER_ALLOW_DEPLOYMENT_KEY: "0"
  OPENROUTER_REQUIRE_USER_KEY: "1"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Mark diagnostic started
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=pending -f context='diag8/started' -f description='Phase 8 validation started'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run format:check 2>&1 | tee lint.log

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck 2>&1 | tee typecheck.log

      - name: Session schema evolution tests
        id: targeted
        continue-on-error: true
        run: npx vitest run tests/session-schema-evolution.test.ts

      - name: Complete unit suite
        id: unit
        continue-on-error: true
        run: npx vitest run --reporter=json --outputFile=unit.json 2>&1 | tee unit.log

      - name: Production build
        id: build
        continue-on-error: true
        run: npm run build

      - name: Publish results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          LINT: ${{ steps.lint.outcome }}
          TYPECHECK: ${{ steps.typecheck.outcome }}
          TARGETED: ${{ steps.targeted.outcome }}
          UNIT: ${{ steps.unit.outcome }}
          BUILD: ${{ steps.build.outcome }}
        shell: bash
        run: |
          publish() {
            if [ "$2" = "success" ]; then state=success; else state=failure; fi
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
              -f state="$state" -f context="diag8/$1" -f description="$1: $2"
          }
          detail() {
            encoded=$(printf '%s' "$2" | cut -c1-96 | base64 -w0 | tr '+/' '-_' | tr -d '=')
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
              -f state=failure -f context="diag8/$1-detail/${encoded}" -f description="$1 failure detail"
          }

          publish lint "$LINT"
          publish typecheck "$TYPECHECK"
          publish targeted "$TARGETED"
          publish unit "$UNIT"
          publish build "$BUILD"

          if [ "$LINT" != "success" ]; then
            line=$(grep -E '[0-9]+:[0-9]+[[:space:]]+(error|warning)' lint.log | head -1)
            detail lint "${line:-$(tail -5 lint.log | tr '\n' ' ')}"
          fi
          if [ "$TYPECHECK" != "success" ]; then
            line=$(grep -E 'error TS[0-9]+:' typecheck.log | head -1)
            detail typecheck "${line:-$(tail -5 typecheck.log | tr '\n' ' ')}"
          fi
          if [ "$UNIT" != "success" ]; then
            node <<'NODE' > unit-detail.txt
          const fs = require('node:fs');
          const path = require('node:path');
          let data = {};
          try { data = JSON.parse(fs.readFileSync('unit.json', 'utf8')); } catch {}
          const result = (data.testResults ?? []).find((entry) => entry.status === 'failed');
          const assertion = result?.assertionResults?.find((entry) => entry.status === 'failed');
          console.log(`${path.basename(result?.name ?? 'unknown')}:${assertion?.fullName ?? 'suite'}:${String(assertion?.failureMessages?.[0] ?? result?.message ?? 'failed').split('\n')[0]}`);
          NODE
            detail unit "$(cat unit-detail.txt)"
          fi

          if [ "$LINT" != "success" ] || [ "$TYPECHECK" != "success" ] || [ "$TARGETED" != "success" ] || [ "$UNIT" != "success" ] || [ "$BUILD" != "success" ]; then
            exit 1
          fi
