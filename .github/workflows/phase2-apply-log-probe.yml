name: Phase 2 apply log probe

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase2-apply-log-probe.yml

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
      - name: Capture failed step
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run view 29265135758 --log-failed > phase2-apply-failure.log
      - name: Publish log and remove probe
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/phase2-apply-log-probe.yml
          git add phase2-apply-failure.log
          git commit -m "test: record final patch application error [skip vercel]"
          git pull --rebase origin main
          git push origin HEAD:main
