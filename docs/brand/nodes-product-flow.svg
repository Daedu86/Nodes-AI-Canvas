    <path d="M1069 312L1073 316L1081 307" stroke="#F8FAFC" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="928" y="344" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14">Promote the rationale and result</text>
    <text x="928" y="363" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14">into reusable project context.</text>
