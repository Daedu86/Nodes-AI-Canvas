    <path d="M676 249H716M676 260H708M774 249H814M774 260H807" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
    <circle cx="794" cy="284" r="9" fill="#A78BFA"/>
    <path d="M790 284L793 287L799 280" stroke="#F8FAFC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="648" y="325" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14">Review branches or sessions</text>
    <text x="648" y="344" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14">side by side and choose a winner.</text>
  </g>

  <g>
    <circle cx="942" cy="184" r="20" fill="#8B5CF6" fill-opacity="0.18" stroke="#A78BFA"/>
    <path d="M934 184C934 178 938 175 942 175C946 175 950 178 950 184C950 190 946 193 942 193C938 193 934 190 934 184Z" stroke="#F3E8FF" stroke-width="2"/>
