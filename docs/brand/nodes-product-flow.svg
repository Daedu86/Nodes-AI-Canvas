    <text x="972" y="181" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Memory</text>
    <text x="972" y="205" fill="#C4B5FD" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600">Carry the outcome forward</text>
    <rect x="939" y="231" width="172" height="66" rx="14" fill="#2E1065" stroke="#A78BFA"/>
    <path d="M960 251H1087M960 263H1068M960 275H1092" stroke="#DDD6FE" stroke-width="3" stroke-linecap="round"/>
