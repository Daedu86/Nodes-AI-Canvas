<svg xmlns="http://www.w3.org/2000/svg" width="1248" height="723" viewBox="0 0 1248 723" fill="none" role="img" aria-label="Canvas and artifacts (Nodes)">
  <!-- Dark-mode README variant: add a light frame so the image has contrast on GitHub dark theme -->
  <rect width="1248" height="723" rx="28" fill="#F8FAFC"/>
  <rect x="12" y="12" width="1224" height="699" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <g transform="translate(24 24)">
    <defs>
      <linearGradient id="bg" x1="120" y1="60" x2="1080" y2="630" gradientUnits="userSpaceOnUse">
        <stop stop-color="#070A12"/>
        <stop offset="1" stop-color="#0E1630"/>
      </linearGradient>
      <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(330 190) rotate(35) scale(560 420)">
        <stop stop-color="#34D399" stop-opacity=".18"/>
        <stop offset=".6" stop-color="#4DD7FF" stop-opacity=".12"/>
        <stop offset="1" stop-color="#070A12" stop-opacity="0"/>
      </radialGradient>
      <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
        <circle cx="2" cy="2" r="1.6" fill="#EAF0FF" fill-opacity=".06"/>
      </pattern>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity=".55"/>
      </filter>
      <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity=".35"/>
      </filter>
    </defs>

    <rect width="1200" height="675" fill="url(#bg)"/>
    <rect width="1200" height="675" fill="url(#glow)"/>
    <rect width="1200" height="675" fill="url(#dots)"/>

    <g filter="url(#shadow)">
      <rect x="86" y="58" width="1028" height="560" rx="24" fill="#0A1023" stroke="#27314A" stroke-opacity=".75"/>
    </g>

    <rect x="86" y="58" width="1028" height="64" rx="24" fill="#0B132A"/>
    <path d="M86 112H1114" stroke="#EAF0FF" stroke-opacity=".06"/>
    <text x="130" y="94" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="14" font-weight="820" fill="#EAF0FF" fill-opacity=".92">Canvas</text>
    <rect x="886" y="76" width="88" height="32" rx="16" fill="#16314E" stroke="#4DD7FF" stroke-opacity=".35"/>
    <text x="914" y="97" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="820" fill="#EAF0FF" fill-opacity=".90">Add</text>
    <rect x="980" y="76" width="104" height="32" rx="16" fill="#0A1023" stroke="#27314A" stroke-opacity=".75"/>
    <text x="1008" y="97" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="760" fill="#EAF0FF" fill-opacity=".78">Tools</text>

    <!-- Stage -->
    <g filter="url(#soft)">
      <rect x="120" y="144" width="742" height="450" rx="18" fill="#081027" stroke="#27314A" stroke-opacity=".75"/>
    </g>
    <text x="148" y="177" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="850" fill="#EAF0FF" fill-opacity=".58" letter-spacing="2">STAGE</text>

    <path d="M252 346C330 346 340 292 418 292" stroke="#4DD7FF" stroke-opacity=".55" stroke-width="3" stroke-linecap="round"/>
    <path d="M418 292C514 292 528 388 628 388" stroke="#34D399" stroke-opacity=".46" stroke-width="3" stroke-linecap="round"/>
    <path d="M628 388C724 388 736 330 836 330" stroke="#4DD7FF" stroke-opacity=".38" stroke-width="3" stroke-linecap="round"/>

    <rect x="210" y="312" width="84" height="68" rx="16" fill="#0B132A" stroke="#27314A" stroke-opacity=".75"/>
    <text x="234" y="348" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="860" fill="#EAF0FF" fill-opacity=".86">Root</text>

    <rect x="370" y="258" width="118" height="68" rx="16" fill="#0B132A" stroke="#4DD7FF" stroke-opacity=".32"/>
    <text x="392" y="294" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="860" fill="#EAF0FF" fill-opacity=".88">Decision</text>
    <rect x="392" y="302" width="56" height="14" rx="7" fill="#16314E" stroke="#4DD7FF" stroke-opacity=".20"/>
    <text x="400" y="313" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="9" font-weight="860" fill="#EAF0FF" fill-opacity=".80">node</text>

    <rect x="586" y="354" width="136" height="68" rx="16" fill="#0B132A" stroke="#34D399" stroke-opacity=".28"/>
    <text x="608" y="390" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="860" fill="#EAF0FF" fill-opacity=".88">Evidence</text>
    <text x="608" y="408" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="520" fill="#EAF0FF" fill-opacity=".66">Links</text>

    <rect x="792" y="296" width="142" height="68" rx="16" fill="#0B132A" stroke="#27314A" stroke-opacity=".75"/>
    <text x="814" y="332" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="860" fill="#EAF0FF" fill-opacity=".88">Draft</text>
    <text x="814" y="350" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="520" fill="#EAF0FF" fill-opacity=".66">Output</text>

    <!-- Artifacts panel -->
    <g filter="url(#soft)">
      <rect x="886" y="144" width="200" height="450" rx="18" fill="#0B132A" stroke="#27314A" stroke-opacity=".75"/>
    </g>
    <text x="914" y="177" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="850" fill="#EAF0FF" fill-opacity=".58" letter-spacing="2">ARTIFACTS</text>

    <rect x="914" y="196" width="144" height="36" rx="14" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
    <text x="934" y="219" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="760" fill="#EAF0FF" fill-opacity=".82">Text</text>
    <rect x="914" y="240" width="144" height="36" rx="14" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
    <text x="934" y="263" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="760" fill="#EAF0FF" fill-opacity=".82">Code</text>
    <rect x="914" y="284" width="144" height="36" rx="14" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
    <text x="934" y="307" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="760" fill="#EAF0FF" fill-opacity=".82">Image</text>
    <rect x="914" y="328" width="144" height="36" rx="14" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
    <text x="934" y="351" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="760" fill="#EAF0FF" fill-opacity=".82">File</text>

    <rect x="914" y="386" width="144" height="56" rx="14" fill="#07253A" stroke="#4DD7FF" stroke-opacity=".28"/>
    <text x="934" y="414" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="820" fill="#EAF0FF" fill-opacity=".90">Pin + reuse</text>
    <text x="934" y="434" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="520" fill="#EAF0FF" fill-opacity=".70">As context</text>

    <text x="120" y="648" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="650" fill="#EAF0FF" fill-opacity=".60">Artifacts are structured context you can pin, branch from, and reuse.</text>
  </g>
</svg>

