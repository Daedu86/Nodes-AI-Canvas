<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none" role="img" aria-label="LLM models and per-user keys (Nodes)">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1080" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="1" stop-color="#0E1630"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(910 185) rotate(125) scale(560 420)">
      <stop stop-color="#34D399" stop-opacity=".16"/>
      <stop offset=".55" stop-color="#4DD7FF" stop-opacity=".12"/>
      <stop offset="1" stop-color="#070A12" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#EAF0FF" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity=".55"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <g filter="url(#shadow)">
    <rect x="86" y="58" width="1028" height="560" rx="24" fill="#0A1023" stroke="#27314A" stroke-opacity=".75"/>
  </g>

  <rect x="86" y="58" width="1028" height="64" rx="24" fill="#0B132A"/>
  <path d="M86 112H1114" stroke="#EAF0FF" stroke-opacity=".06"/>
  <text x="130" y="94" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="14" font-weight="820" fill="#EAF0FF" fill-opacity=".92">Profile</text>
  <text x="198" y="94" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="14" font-weight="900" fill="#EAF0FF" fill-opacity=".92">LLM Models</text>
  <rect x="890" y="76" width="208" height="32" rx="16" fill="#0A1023" stroke="#27314A" stroke-opacity=".75"/>
  <text x="908" y="97" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".70">Models ready: 6</text>

  <!-- Left column: providers -->
  <g filter="url(#soft)">
    <rect x="120" y="144" width="470" height="240" rx="18" fill="#0B132A" stroke="#27314A" stroke-opacity=".75"/>
  </g>
  <text x="148" y="177" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="850" fill="#EAF0FF" fill-opacity=".58" letter-spacing="2">OPENROUTER</text>
  <text x="148" y="220" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="18" font-weight="900" fill="#EAF0FF" fill-opacity=".94">Bring your own key</text>
  <rect x="148" y="244" width="414" height="42" rx="15" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="168" y="270" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".62">API key (masked)</text>
  <circle cx="514" cy="266" r="6" fill="#34D399"/>
  <text x="528" y="270" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="850" fill="#EAF0FF" fill-opacity=".78">Saved</text>

  <rect x="148" y="298" width="126" height="30" rx="15" fill="#07253A" stroke="#4DD7FF" stroke-opacity=".28"/>
  <text x="166" y="318" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="800" fill="#EAF0FF" fill-opacity=".90">Gemma 4</text>
  <rect x="282" y="298" width="146" height="30" rx="15" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="300" y="318" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="750" fill="#EAF0FF" fill-opacity=".78">Nemotron</text>
  <rect x="436" y="298" width="126" height="30" rx="15" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="454" y="318" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="750" fill="#EAF0FF" fill-opacity=".78">Qwen</text>

  <g filter="url(#soft)">
    <rect x="120" y="404" width="470" height="190" rx="18" fill="#0B132A" stroke="#27314A" stroke-opacity=".75"/>
  </g>
  <text x="148" y="437" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="850" fill="#EAF0FF" fill-opacity=".58" letter-spacing="2">OLLAMA</text>
  <text x="148" y="480" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="18" font-weight="900" fill="#EAF0FF" fill-opacity=".94">Local models</text>
  <rect x="148" y="504" width="414" height="42" rx="15" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="168" y="530" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".70">http://localhost:11434</text>
  <rect x="148" y="552" width="154" height="30" rx="15" fill="#0B2D22" stroke="#34D399" stroke-opacity=".28"/>
  <text x="166" y="572" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="820" fill="#EAF0FF" fill-opacity=".90">gemma3:4b</text>

  <!-- Right column: selector -->
  <g filter="url(#soft)">
    <rect x="620" y="144" width="466" height="450" rx="18" fill="#081027" stroke="#27314A" stroke-opacity=".75"/>
  </g>
  <text x="648" y="177" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="850" fill="#EAF0FF" fill-opacity=".58" letter-spacing="2">MODEL SELECTOR</text>
  <text x="648" y="220" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="18" font-weight="900" fill="#EAF0FF" fill-opacity=".94">Only usable models show up</text>
  <text x="648" y="248" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="520" fill="#EAF0FF" fill-opacity=".70">Your list matches enabled providers and permissions.</text>

  <rect x="648" y="270" width="410" height="44" rx="15" fill="#0B132A" stroke="#27314A" stroke-opacity=".65"/>
  <text x="668" y="297" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".72">OpenRouter</text>
  <text x="760" y="297" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="860" fill="#EAF0FF" fill-opacity=".92">google/gemma-4-31b-it:free</text>

  <rect x="648" y="322" width="410" height="44" rx="15" fill="#0B132A" stroke="#27314A" stroke-opacity=".65"/>
  <text x="668" y="349" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".72">OpenRouter</text>
  <text x="760" y="349" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="860" fill="#EAF0FF" fill-opacity=".92">google/gemma-4-26b-a4b-it:free</text>

  <rect x="648" y="374" width="410" height="44" rx="15" fill="#0B132A" stroke="#27314A" stroke-opacity=".65"/>
  <text x="668" y="401" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".72">OpenRouter</text>
  <text x="760" y="401" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="860" fill="#EAF0FF" fill-opacity=".92">nvidia/nemotron-3-super-120b-a12b:free</text>

  <rect x="648" y="426" width="410" height="44" rx="15" fill="#0B132A" stroke="#27314A" stroke-opacity=".65"/>
  <text x="668" y="453" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".72">Ollama</text>
  <text x="724" y="453" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="860" fill="#EAF0FF" fill-opacity=".92">gemma3:4b</text>

  <text x="120" y="648" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="650" fill="#EAF0FF" fill-opacity=".60">Connect your own keys and keep the model list clean and usable.</text>
</svg>

