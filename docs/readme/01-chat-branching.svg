<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none" role="img" aria-label="Chat and branching">
  <defs>
    <linearGradient id="bg" x1="140" y1="70" x2="1060" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#EEF2F9"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#0B1220" stroke-opacity=".06" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0B1220" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="70" width="1020" height="535" rx="22" fill="#fff" stroke="#0B1220" stroke-opacity=".10"/>
  </g>

  <rect x="90" y="70" width="1020" height="62" rx="22" fill="#FBFCFF"/>
  <path d="M90 120H1110" stroke="#0B1220" stroke-opacity=".08"/>
  <text x="130" y="109" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="14" font-weight="750" fill="#0B1220" fill-opacity=".90">Nodes</text>
  <rect x="820" y="86" width="270" height="30" rx="15" fill="#0B1220" fill-opacity=".05" stroke="#0B1220" stroke-opacity=".08"/>
  <text x="838" y="106" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#0B1220" fill-opacity=".75">Model: Free Router</text>

  <!-- Chat panel -->
  <rect x="120" y="155" width="470" height="420" rx="18" fill="#fff" stroke="#0B1220" stroke-opacity=".10"/>
  <text x="144" y="185" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="800" fill="#0B1220" fill-opacity=".55" letter-spacing="2">CHAT</text>
  <rect x="144" y="205" width="360" height="56" rx="14" fill="#0B1220" fill-opacity=".04" stroke="#0B1220" stroke-opacity=".06"/>
  <text x="162" y="236" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="650" fill="#0B1220" fill-opacity=".82">User</text>
  <text x="162" y="254" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="520" fill="#0B1220" fill-opacity=".62">Give options and tradeoffs.</text>
  <rect x="170" y="274" width="396" height="72" rx="14" fill="#0EA5E9" fill-opacity=".10" stroke="#0EA5E9" stroke-opacity=".22"/>
  <text x="188" y="306" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="700" fill="#0B1220" fill-opacity=".86">Assistant</text>
  <text x="188" y="324" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="520" fill="#0B1220" fill-opacity=".62">Branch to explore each approach.</text>
  <rect x="144" y="365" width="422" height="70" rx="14" fill="#0B1220" fill-opacity=".03" stroke="#0B1220" stroke-opacity=".06"/>
  <text x="162" y="397" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#0B1220" fill-opacity=".74">Follow-up</text>
  <rect x="444" y="387" width="104" height="26" rx="13" fill="#22C55E" fill-opacity=".14" stroke="#22C55E" stroke-opacity=".26"/>
  <text x="470" y="404" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="750" fill="#0B1220" fill-opacity=".80">Branch</text>
  <rect x="144" y="455" width="422" height="78" rx="14" fill="#fff" stroke="#0B1220" stroke-opacity=".12"/>
  <rect x="156" y="467" width="280" height="54" rx="12" fill="#0B1220" fill-opacity=".03" stroke="#0B1220" stroke-opacity=".06"/>
  <text x="174" y="499" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="520" fill="#0B1220" fill-opacity=".55">Write, attach, then send…</text>
  <rect x="450" y="477" width="116" height="34" rx="12" fill="#0EA5E9" fill-opacity=".18" stroke="#0EA5E9" stroke-opacity=".30"/>
  <text x="486" y="499" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="800" fill="#0B1220" fill-opacity=".86">Send</text>

  <!-- Branch graph -->
  <rect x="620" y="155" width="460" height="420" rx="18" fill="#0B1220" fill-opacity=".03" stroke="#0B1220" stroke-opacity=".10"/>
  <text x="644" y="185" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="800" fill="#0B1220" fill-opacity=".55" letter-spacing="2">BRANCHES</text>
  <path d="M700 290H820" stroke="#0EA5E9" stroke-opacity=".55" stroke-width="3" stroke-linecap="round"/>
  <path d="M820 290C890 290 900 250 970 250" stroke="#0EA5E9" stroke-opacity=".46" stroke-width="3" stroke-linecap="round"/>
  <path d="M820 290C890 290 900 330 970 330" stroke="#22C55E" stroke-opacity=".40" stroke-width="3" stroke-linecap="round"/>
  <rect x="664" y="256" width="72" height="68" rx="16" fill="#fff" stroke="#0B1220" stroke-opacity=".10"/>
  <text x="686" y="292" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="800" fill="#0B1220" fill-opacity=".78">Root</text>
  <rect x="794" y="256" width="86" height="68" rx="16" fill="#fff" stroke="#0EA5E9" stroke-opacity=".28"/>
  <text x="812" y="292" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="800" fill="#0B1220" fill-opacity=".80">Prompt</text>
  <rect x="950" y="218" width="110" height="64" rx="16" fill="#fff" stroke="#0EA5E9" stroke-opacity=".24"/>
  <text x="968" y="252" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="800" fill="#0B1220" fill-opacity=".80">Branch A</text>
  <rect x="950" y="298" width="110" height="64" rx="16" fill="#fff" stroke="#22C55E" stroke-opacity=".22"/>
  <text x="968" y="332" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="800" fill="#0B1220" fill-opacity=".80">Branch B</text>
  <rect x="880" y="420" width="100" height="60" rx="16" fill="#0B1220" fill-opacity=".04" stroke="#0B1220" stroke-opacity=".10"/>
  <text x="906" y="453" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="800" fill="#0B1220" fill-opacity=".72">Merge</text>

  <text x="120" y="635" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="650" fill="#0B1220" fill-opacity=".55">Branch, compare, and merge without losing context.</text>
</svg>

