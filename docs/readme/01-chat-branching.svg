<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none" role="img" aria-label="Chat and branching (Nodes)">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1080" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="1" stop-color="#0E1630"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 170) rotate(120) scale(520 420)">
      <stop stop-color="#4DD7FF" stop-opacity=".22"/>
      <stop offset=".6" stop-color="#A78BFA" stop-opacity=".10"/>
      <stop offset="1" stop-color="#070A12" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#EAF0FF" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity=".55"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- App window -->
  <g filter="url(#shadow)">
    <rect x="86" y="58" width="1028" height="560" rx="24" fill="#0A1023" stroke="#27314A" stroke-opacity=".75"/>
  </g>

  <!-- Title bar -->
  <rect x="86" y="58" width="1028" height="64" rx="24" fill="#0B132A"/>
  <path d="M86 112H1114" stroke="#EAF0FF" stroke-opacity=".06"/>
  <circle cx="120" cy="88" r="8" fill="#EAF0FF" fill-opacity=".12"/>
  <circle cx="146" cy="88" r="8" fill="#EAF0FF" fill-opacity=".12"/>
  <circle cx="172" cy="88" r="8" fill="#EAF0FF" fill-opacity=".12"/>
  <text x="212" y="94" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="14" font-weight="780" fill="#EAF0FF" fill-opacity=".92">Nodes</text>
  <rect x="820" y="76" width="278" height="32" rx="16" fill="#0A1023" stroke="#27314A" stroke-opacity=".75"/>
  <text x="838" y="97" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".70">Model</text>
  <text x="888" y="97" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="760" fill="#EAF0FF" fill-opacity=".90">OpenRouter · Free</text>

  <!-- Left: Chat -->
  <g filter="url(#soft)">
    <rect x="120" y="144" width="486" height="450" rx="18" fill="#0B132A" stroke="#27314A" stroke-opacity=".75"/>
  </g>
  <text x="148" y="177" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="850" fill="#EAF0FF" fill-opacity=".58" letter-spacing="2">CHAT</text>

  <rect x="148" y="196" width="384" height="60" rx="14" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="168" y="225" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="720" fill="#EAF0FF" fill-opacity=".88">User</text>
  <text x="168" y="245" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="520" fill="#EAF0FF" fill-opacity=".70">Give options and tradeoffs.</text>

  <rect x="180" y="270" width="398" height="78" rx="14" fill="#07253A" stroke="#4DD7FF" stroke-opacity=".32"/>
  <text x="200" y="303" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="760" fill="#EAF0FF" fill-opacity=".92">Assistant</text>
  <text x="200" y="323" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="520" fill="#EAF0FF" fill-opacity=".74">Branch to explore each approach</text>
  <text x="200" y="341" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="520" fill="#EAF0FF" fill-opacity=".74">without losing your thread.</text>

  <rect x="148" y="366" width="430" height="74" rx="14" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="168" y="398" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".80">Follow-up</text>
  <text x="168" y="418" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="520" fill="#EAF0FF" fill-opacity=".68">Compare two answers and keep the best.</text>
  <rect x="470" y="386" width="92" height="26" rx="13" fill="#0B2D22" stroke="#34D399" stroke-opacity=".30"/>
  <text x="494" y="404" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="820" fill="#EAF0FF" fill-opacity=".88">Branch</text>

  <!-- Composer -->
  <rect x="148" y="460" width="430" height="92" rx="16" fill="#0B132A" stroke="#27314A" stroke-opacity=".75"/>
  <rect x="162" y="474" width="276" height="64" rx="12" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="180" y="510" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="520" fill="#EAF0FF" fill-opacity=".62">Write. Attach. Send.</text>
  <rect x="450" y="490" width="56" height="36" rx="12" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <path d="M470 508h16" stroke="#EAF0FF" stroke-opacity=".70" stroke-width="2" stroke-linecap="round"/>
  <path d="M478 500v16" stroke="#EAF0FF" stroke-opacity=".70" stroke-width="2" stroke-linecap="round"/>
  <rect x="512" y="490" width="66" height="36" rx="12" fill="#16314E" stroke="#4DD7FF" stroke-opacity=".35"/>
  <text x="530" y="513" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="860" fill="#EAF0FF" fill-opacity=".92">Send</text>

  <!-- Right: Branch graph -->
  <g filter="url(#soft)">
    <rect x="636" y="144" width="450" height="450" rx="18" fill="#081027" stroke="#27314A" stroke-opacity=".75"/>
  </g>
  <text x="664" y="177" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="850" fill="#EAF0FF" fill-opacity=".58" letter-spacing="2">BRANCHES</text>

  <path d="M720 292H834" stroke="#4DD7FF" stroke-opacity=".55" stroke-width="3" stroke-linecap="round"/>
  <path d="M834 292C896 292 904 254 966 254" stroke="#4DD7FF" stroke-opacity=".45" stroke-width="3" stroke-linecap="round"/>
  <path d="M834 292C896 292 904 334 966 334" stroke="#34D399" stroke-opacity=".42" stroke-width="3" stroke-linecap="round"/>
  <path d="M966 254H1018" stroke="#4DD7FF" stroke-opacity=".35" stroke-width="3" stroke-linecap="round"/>
  <path d="M966 334H1018" stroke="#34D399" stroke-opacity=".33" stroke-width="3" stroke-linecap="round"/>

  <rect x="686" y="258" width="68" height="68" rx="16" fill="#0B132A" stroke="#27314A" stroke-opacity=".75"/>
  <text x="706" y="295" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="860" fill="#EAF0FF" fill-opacity=".86">Root</text>

  <rect x="804" y="258" width="86" height="68" rx="16" fill="#0B132A" stroke="#4DD7FF" stroke-opacity=".35"/>
  <text x="822" y="295" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="860" fill="#EAF0FF" fill-opacity=".88">Prompt</text>

  <rect x="944" y="220" width="118" height="66" rx="16" fill="#0B132A" stroke="#4DD7FF" stroke-opacity=".30"/>
  <text x="962" y="255" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="860" fill="#EAF0FF" fill-opacity=".88">Branch A</text>
  <text x="962" y="273" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="520" fill="#EAF0FF" fill-opacity=".66">Rewrite</text>

  <rect x="944" y="300" width="118" height="66" rx="16" fill="#0B132A" stroke="#34D399" stroke-opacity=".28"/>
  <text x="962" y="335" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="860" fill="#EAF0FF" fill-opacity=".88">Branch B</text>
  <text x="962" y="353" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="520" fill="#EAF0FF" fill-opacity=".66">Follow-up</text>

  <rect x="890" y="418" width="108" height="60" rx="16" fill="#0A1023" stroke="#27314A" stroke-opacity=".75"/>
  <text x="918" y="451" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="860" fill="#EAF0FF" fill-opacity=".78">Merge</text>

  <text x="120" y="648" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="650" fill="#EAF0FF" fill-opacity=".60">Branch, compare, and merge without losing context.</text>
</svg>

