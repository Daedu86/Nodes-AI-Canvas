<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none" role="img" aria-label="Knowledge Center (Nodes)">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1080" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="1" stop-color="#0E1630"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(350 170) rotate(20) scale(560 420)">
      <stop stop-color="#A78BFA" stop-opacity=".18"/>
      <stop offset=".55" stop-color="#4DD7FF" stop-opacity=".10"/>
      <stop offset="1" stop-color="#070A12" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#EAF0FF" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity=".55"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <g filter="url(#shadow)">
    <rect x="86" y="58" width="1028" height="560" rx="24" fill="#0A1023" stroke="#27314A" stroke-opacity=".75"/>
  </g>

  <rect x="86" y="58" width="1028" height="64" rx="24" fill="#0B132A"/>
  <path d="M86 112H1114" stroke="#EAF0FF" stroke-opacity=".06"/>
  <text x="130" y="94" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="14" font-weight="820" fill="#EAF0FF" fill-opacity=".92">Knowledge Center</text>
  <rect x="850" y="76" width="248" height="32" rx="16" fill="#0A1023" stroke="#27314A" stroke-opacity=".75"/>
  <text x="868" y="97" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".70">Search docs…</text>

  <!-- TOC -->
  <g filter="url(#soft)">
    <rect x="120" y="144" width="300" height="450" rx="18" fill="#0B132A" stroke="#27314A" stroke-opacity=".75"/>
  </g>
  <text x="148" y="177" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="850" fill="#EAF0FF" fill-opacity=".58" letter-spacing="2">CONTENTS</text>

  <rect x="148" y="196" width="244" height="38" rx="14" fill="#1C1A3A" stroke="#A78BFA" stroke-opacity=".28"/>
  <text x="168" y="221" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="780" fill="#EAF0FF" fill-opacity=".88">Getting started</text>

  <rect x="148" y="242" width="244" height="38" rx="14" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="168" y="267" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".74">Sessions</text>

  <rect x="148" y="288" width="244" height="38" rx="14" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="168" y="313" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".74">Branching</text>

  <rect x="148" y="334" width="244" height="38" rx="14" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="168" y="359" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".74">Canvas artifacts</text>

  <rect x="148" y="380" width="244" height="38" rx="14" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="168" y="405" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".74">Projects</text>

  <rect x="148" y="426" width="244" height="38" rx="14" fill="#0A1023" stroke="#27314A" stroke-opacity=".65"/>
  <text x="168" y="451" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="650" fill="#EAF0FF" fill-opacity=".74">LLM models</text>

  <!-- Main -->
  <g filter="url(#soft)">
    <rect x="440" y="144" width="646" height="450" rx="18" fill="#081027" stroke="#27314A" stroke-opacity=".75"/>
  </g>
  <text x="468" y="177" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="10" font-weight="850" fill="#EAF0FF" fill-opacity=".58" letter-spacing="2">WIKI</text>
  <text x="468" y="224" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="22" font-weight="880" fill="#EAF0FF" fill-opacity=".94">How Nodes works</text>
  <text x="468" y="252" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="520" fill="#EAF0FF" fill-opacity=".70">Onboarding, patterns, and “how-to” docs inside the workspace.</text>

  <rect x="468" y="276" width="590" height="92" rx="16" fill="#0B132A" stroke="#27314A" stroke-opacity=".65"/>
  <text x="490" y="312" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="760" fill="#EAF0FF" fill-opacity=".90">Searchable docs</text>
  <text x="490" y="334" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="520" fill="#EAF0FF" fill-opacity=".70">Fast answers for users and teams.</text>

  <rect x="468" y="386" width="284" height="128" rx="16" fill="#1C1A3A" stroke="#A78BFA" stroke-opacity=".28"/>
  <text x="490" y="424" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="820" fill="#EAF0FF" fill-opacity=".92">Guided onboarding</text>
  <text x="490" y="446" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="520" fill="#EAF0FF" fill-opacity=".72">Teach workflows: branching, artifacts, Arena.</text>

  <rect x="774" y="386" width="284" height="128" rx="16" fill="#07253A" stroke="#4DD7FF" stroke-opacity=".28"/>
  <text x="796" y="424" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="820" fill="#EAF0FF" fill-opacity=".92">Reusable patterns</text>
  <text x="796" y="446" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="11" font-weight="520" fill="#EAF0FF" fill-opacity=".72">Decisions, evidence, drafts, checklists.</text>

  <text x="120" y="648" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="12" font-weight="650" fill="#EAF0FF" fill-opacity=".60">A built-in wiki keeps the product learnable as it grows.</text>
</svg>

